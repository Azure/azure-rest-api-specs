parameters:
  AzureSDKEmailUri: '$(AzureSDKEmailerSasURL)'
  PullRequestNumber: 0
  Repository: '$(Build.Repository.Name)'
  GitHubUser: ''
  ReleasePlanLink: ''
  SpecPullRequestUrl: ''
  EmailCC: 'azsdkapex@microsoft.com'
  SourceRootPath: $(Build.SourcesDirectory)

steps:
  - task: AzureCLI@2
    displayName: Notify release plan owner
    condition: and(succeeded(), ne(variables['Skip.NotifyReleasePlanOwner'], 'true'))
    continueOnError: true
    env:
      GH_TOKEN: $(GH_TOKEN)
      AZURE_SDK_EMAIL_URI: ${{ parameters.AzureSDKEmailUri }}
      PR_NUMBER: ${{ parameters.PullRequestNumber }}
      BUILD_REPOSITORY_NAME: ${{ parameters.Repository }}
      NOTIFY_GITHUB_USER: ${{ parameters.GitHubUser }}
      RELEASE_PLAN_LINK: ${{ parameters.ReleasePlanLink }}
      SPEC_PULL_REQUEST_URL: ${{ parameters.SpecPullRequestUrl }}
      EMAIL_CC: ${{ parameters.EmailCC }}
    inputs:
      azureSubscription: opensource-api-connection
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        node "${{ parameters.SourceRootPath }}/eng/common/scripts/notify-release-plan-owner.js"
