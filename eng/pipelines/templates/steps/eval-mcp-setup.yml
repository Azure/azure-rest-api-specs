# Repo-local override of the mcpSetupTemplate swap point (see
# /eng/common/pipelines/templates/jobs/build-mcp.yml). Builds azure-sdk-tools' MCP server(s),
# side-checked-out via sparse-checkout.yml with a PAT (azuresdk-copilot-github-pat).
#
# Sparse-checks out all of /tools (not just /tools/azsdk-cli): Cli.csproj project-references
# sibling projects (e.g. codeowners-utils), so a narrower checkout fails restore with CS0234/CS0246.
#
# Also runs `vally lint` on .github/skills first: archetype-eval.yml (eng/common, synced verbatim)
# has no lint swap point, so this repo-owned template is the only safe place to fail fast on
# broken skill/eval schema before spending time on the sparse checkout + dotnet build below.

parameters:
  - name: TestType
    type: string
    default: mock
    values:
      - mock
      - live
  - name: toolsRepo
    # Unused here (no repository-resource alias needed): kept only so this template accepts the
    # same (TestType, toolsRepo) shape build-mcp.yml always forwards to mcpSetupTemplate.
    type: string
    default: ''

steps:
  - task: UseNode@1
    displayName: 'Use Node.js 22.x'
    inputs:
      version: 22.x

  - script: |
      set -e
      npx --yes @microsoft/vally-cli@0.7.0 lint .
    displayName: 'vally lint .github/skills'
    workingDirectory: $(Build.SourcesDirectory)/.github/skills

  - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
    parameters:
      SkipCheckoutNone: true
      TokenToUseForAuth: $(azuresdk-copilot-github-pat)
      Paths:
        - '/tools'
      Repositories:
        - Name: Azure/azure-sdk-tools
          Commitish: main
          WorkingDirectory: azure-sdk-tools

  - ${{ if eq(parameters.TestType, 'live') }}:
    - script: |
        set -e
        dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Cli -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/cli" --nologo
      displayName: 'Build MCP: Cli (live) server'
      workingDirectory: $(Build.SourcesDirectory)/azure-sdk-tools

  - ${{ else }}:
    - script: |
        set -e
        dotnet build tools/azsdk-cli/Azure.Sdk.Tools.Mock -c Release -o "$(Build.SourcesDirectory)/artifacts/mcp/mock" --nologo
      displayName: 'Build MCP: Mock server'
      workingDirectory: $(Build.SourcesDirectory)/azure-sdk-tools
