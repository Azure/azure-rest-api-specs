# Reusable cross-repo eval entrypoint: wraps archetype-eval.yml's MCP build plumbing so a repo
# outside azure-sdk-tools doesn't have to hand-roll its own `extends: archetype-eval.yml` wiring.
# Lives under eng/pipelines/, not eng/common/, since eng/common/** is synced verbatim from
# azure-sdk-tools and would drop repo-local additions on the next sync.

parameters:
  - name: mcpSetupTemplate
    # Swap point for the MCP build step template; override if a consumer needs different
    # checkout/build logic (e.g. a different auth mechanism or tools-repo ref).
    type: string
    default: /eng/pipelines/templates/steps/eval-mcp-setup.yml
  - name: TestType
    type: string
    default: mock
    values:
      - mock
      - live
  - name: vallyRoot
    type: string
  - name: evalGlobs
    type: object
    default: []
  - name: shardTimeoutInMinutes
    type: number
    default: 20
  - name: threshold
    type: number
    default: 0.8

extends:
  template: /eng/common/pipelines/templates/stages/archetype-eval.yml
  parameters:
    # Shared mock/live builder; TestType selects the tier it builds.
    mcpSetupTemplate: ${{ parameters.mcpSetupTemplate }}
    TestType: ${{ parameters.TestType }}
    vallyRoot: ${{ parameters.vallyRoot }}
    evalGlobs: ${{ parameters.evalGlobs }}
    shardTimeoutInMinutes: ${{ parameters.shardTimeoutInMinutes }}
    threshold: ${{ parameters.threshold }}
