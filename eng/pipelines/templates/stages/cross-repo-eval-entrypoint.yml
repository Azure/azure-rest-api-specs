# Reusable cross-repo eval entrypoint: wraps archetype-eval.yml's cross-repo MCP build plumbing
# so any repo outside azure-sdk-tools that wants to run Vally evals against the mock/live MCP
# server doesn't have to hand-roll its own `extends: archetype-eval.yml` parameter wiring — only
# the values below need to differ per repo/run.
# (This intentionally lives under eng/pipelines/, not eng/common/, since eng/common/** is synced
# verbatim from azure-sdk-tools and would drop repo-local additions on the next sync.)
#
# No ADO GitHub service connection is required: mcpSetupTemplate defaults to this repo's own
# /eng/pipelines/templates/steps/eval-mcp-setup.yml, which side-checks-out azure-sdk-tools via
# sparse-checkout.yml authenticated with the azuresdk-copilot-github-pat secret -- the same
# PAT-based pattern already used elsewhere in this repo (e.g. swagger-api-doc-preview.yml,
# archetype-spec-gen-sdk.yml) for cross-repo checkouts, instead of a resources.repositories +
# service-connection endpoint. (An earlier version of this template tried to declare
# resources.repositories here, parameterized via `${{ parameters.x }}`; that's rejected by Azure
# Pipelines at pipeline-run time with "A template expression is not allowed in this context",
# since `resources:` is resolved before a template's `extends` parameters are bound.)

parameters:
  - name: mcpSetupTemplate
    # Swap point for the MCP build step template; override if a consumer needs different
    # checkout/build logic (e.g. a different auth mechanism or tools-repo ref).
    type: string
    default: /eng/pipelines/templates/steps/eval-mcp-setup.yml
  - name: TestType
    type: string
    default: mock
    values:
      - mock
      - live
  - name: vallyRoot
    type: string
  - name: evalGlobs
    type: object
    default: []
  - name: shardTimeoutInMinutes
    type: number
    default: 20
  - name: threshold
    type: number
    default: 0.8

extends:
  template: /eng/common/pipelines/templates/stages/archetype-eval.yml
  parameters:
    # Shared mock/live builder; TestType selects the tier it builds.
    mcpSetupTemplate: ${{ parameters.mcpSetupTemplate }}
    TestType: ${{ parameters.TestType }}
    vallyRoot: ${{ parameters.vallyRoot }}
    evalGlobs: ${{ parameters.evalGlobs }}
    shardTimeoutInMinutes: ${{ parameters.shardTimeoutInMinutes }}
    threshold: ${{ parameters.threshold }}
