# Reusable cross-repo eval entrypoint: wraps archetype-eval.yml's cross-repo MCP build
# (toolsRepo) together with the resources.repositories declaration that pattern requires.
#
# Any repo outside azure-sdk-tools that wants to run Vally evals against the mock/live MCP
# server can `extends` this template instead of hand-rolling its own `resources.repositories` +
# `extends: archetype-eval.yml` boilerplate — only the values below need to differ per repo/run.
# (This intentionally lives under eng/pipelines/, not eng/common/, since eng/common/** is synced
# verbatim from azure-sdk-tools and would drop repo-local additions on the next sync.)
#
# Per Azure Pipelines' documented "Extend from a template with resources" pattern, a
# `resources:` block is allowed inside a template consumed via `extends` (not just the entry
# pipeline file) — see https://learn.microsoft.com/azure/devops/pipelines/process/templates#extend-from-a-template-with-resources.
#
# Still repo-specific and NOT solved by this template: `githubServiceConnection` must name a
# real GitHub service connection, already configured in the consuming ADO project, that's
# authorized for `toolsRepoName`. That's an ADO project-admin action this template can't perform
# or discover on your behalf.

parameters:
  - name: githubServiceConnection
    type: string
    # No default: every consumer must supply its own ADO service-connection name.
  - name: toolsRepoName
    # GitHub org/repo supplying the mock/live MCP server source (azure-sdk-tools' azsdk-cli).
    type: string
    default: Azure/azure-sdk-tools
  - name: toolsRepoRef
    type: string
    default: refs/heads/main
  - name: TestType
    type: string
    default: mock
    values:
      - mock
      - live
  - name: vallyRoot
    type: string
  - name: evalGlobs
    type: object
    default: []
  - name: shardTimeoutInMinutes
    type: number
    default: 20
  - name: threshold
    type: number
    default: 0.8

resources:
  repositories:
    - repository: azure-sdk-tools
      type: github
      name: ${{ parameters.toolsRepoName }}
      ref: ${{ parameters.toolsRepoRef }}
      endpoint: ${{ parameters.githubServiceConnection }}

extends:
  template: /eng/common/pipelines/templates/stages/archetype-eval.yml
  parameters:
    # Shared mock/live builder; TestType selects the tier it builds.
    mcpSetupTemplate: /eng/common/pipelines/templates/steps/eval-mcp-setup.yml
    TestType: ${{ parameters.TestType }}
    # Cross-repo MCP build: side-checkout azure-sdk-tools via the repository resource above.
    toolsRepo: azure-sdk-tools
    vallyRoot: ${{ parameters.vallyRoot }}
    evalGlobs: ${{ parameters.evalGlobs }}
    shardTimeoutInMinutes: ${{ parameters.shardTimeoutInMinutes }}
    threshold: ${{ parameters.threshold }}
