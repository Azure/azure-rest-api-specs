# Shared 1ES stage-list redirect: selects the Official (internal project, non-PR) vs Unofficial
# 1ES pipeline template so callers only ever author a plain `stages:` list. This is the repo-local
# SWAP POINT that eng/common's stage archetypes (e.g. archetype-eval.yml) extend by convention.

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

parameters:
  - name: stages
    type: stageList
    default: []
  - name: Use1ESOfficial
    type: boolean
    default: true

extends:
  ${{ if and(parameters.Use1ESOfficial, eq(variables['System.TeamProject'], 'internal')) }}:
    template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  ${{ else }}:
    template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      skipBuildTagsForGitHubPullRequests: true
    sdl:
      sourceAnalysisPool:
        name: $(LINUXPOOL)
        image: $(LINUXVMIMAGE)
        os: linux
      # sourceAnalysisPool is Linux-only: Windows-only SDL tools (e.g. AntiMalware, which requires
      # Windows Defender) can never run here. antimalwareScan.enabled: false alone wasn't enough -
      # it only suppressed the Binary-scan pass; the Source-scan pass still ran and failed with
      # ConfigurationPathNotFoundException: antimalware-linux. Comprehensive SDL/Guardian scanning
      # already happens via the dedicated /eng/pipelines/guardian.yml pipeline on a Windows pool,
      # so disable all SDL tools here instead of re-enabling them one by one.
      enableAllTools: false
    stages: ${{ parameters.stages }}
