parameters:
  - name: SpecRepoUrl
    type: string
  - name: SdkRepoUrl
    type: string
  - name: SdkRepoBranch
    type: string
    default: 'main'
  - name: ConfigType
    type: string
    default: ''
    displayName: 'API specification type'
  - name: ConfigPath
    type: string
    default: ''
    displayName: 'Path to API specification file (TypeSpec/OpenAPI)'
  - name: ApiVersion
    type: string
    default: ''
    displayName: 'API version'
  - name: SdkReleaseType
    type: string
    default: ''
    displayName: 'SDK release type'
  - name: CreatePullRequest
    type: boolean
    default: false
  - name: ForceCreateEvenWithFailures
    type: boolean
    default: false
  - name: SpecBatchTypes
    type: string
    default: ''
  - name: ReleasePlanWorkItemId
    type: number
    default: 0

stages:
- stage: ${{ iif(eq(parameters.SpecBatchTypes, ''), 'Build', format('Build_{0}', replace(parameters.SpecBatchTypes, '-', '_'))) }}
  displayName: ${{ iif(eq(parameters.SpecBatchTypes, ''), 'SDK Generation', format('Batch SDK Generation for ({0})', parameters.SpecBatchTypes)) }}
  # Explicitly set to no dependencies so multiple instances of this template can run in parallel when called in a loop
  dependsOn: []
  jobs:
  - job:
    timeoutInMinutes: 2400

    variables:
      - template: /eng/pipelines/templates/variables/image.yml
      - name: NodeVersion
        value: '22.13.x'
      - name: PythonVersion
        value: '3.13'
      - name: PipelineArtifactsName
        value: 'packages'
      - name: SpecRepoCommit
        value: $(Build.SourceVersion)

    pool:
      name: $(LINUXPOOL)
      vmImage: $(LINUXVMIMAGE)
      os: linux

    steps:
      - checkout: none

      - pwsh: |
          $tspConfigPathPattern = '^specification\/([^\/]+\/)+tspconfig\.yaml$'
          $readmePathPattern = '^specification\/([^\/]+\/){2,}readme\.md$'
          if (('${{ parameters.ConfigType }}' -eq 'TypeSpec') -and ('${{ parameters.ConfigPath }}' -notmatch $tspConfigPathPattern)) {
            Write-Host "##vso[task.logissue type=error]'ConfigPath' must be a valid 'tspconfig.yaml' file path when 'ConfigType' is set to 'TypeSpec'. For example, 'specification/contosowidgetmanager/Contoso.Management/tspconfig.yaml'"
            Exit 1
          } elseif (('${{ parameters.ConfigType }}' -eq 'OpenAPI') -and ('${{ parameters.ConfigPath }}' -notmatch $readmePathPattern)) {
            Write-Host "##vso[task.logissue type=error]'ConfigPath' must be a valid 'readme.md' file path when 'ConfigType' is set to 'OpenAPI'. For example, 'specification/appplatform/resource-manager/readme.md'"
            Exit 1
          }
          if (('$(Build.Reason)' -ne 'PullRequest') -and ('${{ parameters.SpecBatchTypes }}' -eq '')) {
            if (('${{ parameters.SdkReleaseType }}' -eq 'stable') -and ('${{ parameters.ApiVersion}}' -match 'preview')) {
              Write-Host "##vso[task.logissue type=error]'SDK release type' must be set to 'beta' for the preview API specifications."
              Exit 1
            }
          }
          $urlPattern = '^https://github\.com/(?<organization>[^/]+)/(?<repository>[^/]+)'
          if ('${{ parameters.SpecRepoUrl }}' -match $urlPattern) {
            $specRepoOwner = $Matches['organization']
            Write-Host "##vso[task.setvariable variable=SpecRepoOwner]$specRepoOwner"
            Write-Host "SpecRepoOwner variable set to: $specRepoOwner"

            $specRepoName = $Matches['repository']
            Write-Host "##vso[task.setvariable variable=SpecRepoName]$specRepoName"
            Write-Host "SpecRepoName variable set to: $specRepoName"

            $specRepoDirectory = "$(System.DefaultWorkingDirectory)/$specRepoName"
            Write-Host "##vso[task.setvariable variable=SpecRepoDirectory]$specRepoDirectory"
            Write-Host "SpecRepoDirectory variable set to: $specRepoDirectory"
          }

          if ('${{ parameters.SdkRepoUrl }}' -match $urlPattern) {
            if ('${{ parameters.SpecRepoUrl }}'.EndsWith('-pr') -and (-not '${{ parameters.SdkRepoUrl }}'.EndsWith('-pr'))) {
              Write-Host "##vso[task.logissue type=error]SdkRepoUrl must be a private repository if SpecRepoUrl is a private repository."
              Exit 1
            }

            $sdkRepoOwner = $Matches['organization']
            Write-Host "##vso[task.setvariable variable=SdkRepoOwner]$sdkRepoOwner"
            Write-Host "SdkRepoOwner variable set to: $sdkRepoOwner"

            $sdkRepoName = $Matches['repository']
            Write-Host "##vso[task.setvariable variable=SdkRepoName]$sdkRepoName"
            Write-Host "SdkRepoName variable set to: $sdkRepoName"

            $sdkRepoDirectory = "$(System.DefaultWorkingDirectory)/$sdkRepoName"
            Write-Host "##vso[task.setvariable variable=SdkRepoDirectory]$sdkRepoDirectory"
            Write-Host "SdkRepoDirectory variable set to: $sdkRepoDirectory"

            $publicSdkRepoDirectory = "$(System.DefaultWorkingDirectory)/$sdkRepoName-public"
            Write-Host "##vso[task.setvariable variable=publicSdkRepoDirectory]$publicSdkRepoDirectory"
            Write-Host "publicSdkRepoDirectory variable set to: $publicSdkRepoDirectory"
          }

          if ([string]::IsNullOrEmpty($SpecRepoOwner) -or [string]::IsNullOrEmpty($SpecRepoName) -or [string]::IsNullOrEmpty($SdkRepoOwner) -or [string]::IsNullOrEmpty($SdkRepoName)) {
            Write-Host "##vso[task.logissue type=error]One or more required variables is empty or invalid. Ensure that SpecRepoUrl and SdkRepoUrl are set to valid GitHub repository URLs."
            Exit 1
          }

          $checkoutCommitish = '${{ parameters.SdkRepoBranch }}'
          Write-Host "##vso[task.setvariable variable=CheckoutCommitish]$checkoutCommitish"
          Write-Host "Will use commitish for SDK repo checkout: '$checkoutCommitish'"
          $prStatus = 'draft'
          Write-Host "##vso[task.setvariable variable=SdkPrStatus]$prStatus"
          $releasePlanInfo = ''
          Write-Host "##vso[task.setvariable variable=ReleasePlanInfo]$releasePlanInfo"
          $prUrl = ""
          Write-Host "##vso[task.setvariable variable=PullRequestUrl]$prUrl"
        displayName: "Create Run Time Variables"

      - ${{ if and(eq(variables['System.TeamProject'], 'internal'), ne(variables['Build.Reason'], 'PullRequest')) }}:
        - pwsh: |
            $sdkRepoBranch = '${{ parameters.SdkRepoBranch }}'
            $sdkRepoUrl = '${{ parameters.SdkRepoUrl }}'
            Write-Host "Validating SDK repo branch: '$SdkRepoBranch'"

            if (($sdkRepoBranch -ne 'main') -and (-not [string]::IsNullOrWhiteSpace($sdkRepoBranch))) {

              # GitHub's limit is around 250 characters
              if ($sdkRepoBranch.Length -gt 250) {
                Write-Host "##vso[task.logissue type=error]The provided SDK branch name exceeds 250 characters."
                Exit 1
              }

              # Validate branch name
              if ($sdkRepoBranch -notmatch '^(?!refs/)(?!/)(?!.*//)(?!.*\.\.)(?!.*\.lock$)(?!@$)(?!.*\.$)(?!.*\/$)(?!.*\\)(?!.*[~^:?*\[\]\s])[\u0020-\u007E]+$') {
                  Write-Host "##vso[task.logissue type=error]The provided SDK branch name '$sdkRepoBranch' is invalid."
                  Exit 1
              }

              # Check if branch exists remotely
              Write-Host "Checking if branch '$SdkRepoBranch' exists in remote repository '$sdkRepoUrl'..."
              $branchExists = git ls-remote --heads $sdkRepoUrl "refs/heads/$SdkRepoBranch"
              $gitExitCode = $LASTEXITCODE

              if ($gitExitCode -ne 0) {
                Write-Host "##vso[task.logissue type=error]Failed to validate branch remotely (git exit code: $gitExitCode)"
                Exit $gitExitCode
              }

              if ([string]::IsNullOrEmpty($branchExists)) {
                Write-Host "Branch '$SdkRepoBranch' does not exist in remote repository"
                $checkoutCommitish = 'main'
              } else {
                Write-Host "Branch '$SdkRepoBranch' exists in remote repository"
                $checkoutCommitish = $SdkRepoBranch
              }
            } else {
              Write-Host "Using commitish as-is: '$SdkRepoBranch' (main branch)"
              $checkoutCommitish = $SdkRepoBranch
            }

            Write-Host "##vso[task.setvariable variable=CheckoutCommitish]$checkoutCommitish"
            Write-Host "Will use commitish for SDK repo checkout: '$checkoutCommitish'"
          displayName: "Validate and update SDK repository commitish"

      - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
        parameters:
          Paths:
            - '/*'
            - '!sdk/**/test-recordings/*'
            - '!sdk/**/recordings/*'
            - '!sdk/**/SessionRecords/*'
            - '!sdk/**/session-records/*'
          Repositories:
            # - Name: $(SpecRepoOwner)/$(SpecRepoName)
            #   Commitish: $(SpecRepoCommit)
            #   WorkingDirectory: $(SpecRepoDirectory)
            - Name: $(SdkRepoOwner)/$(SdkRepoName)
              Commitish: $(CheckoutCommitish)
              WorkingDirectory: $(SdkRepoDirectory)
            - Name: Azure/$(SdkRepoName)
              Commitish: main
              WorkingDirectory: $(publicSdkRepoDirectory)
          SkipCheckoutNone: true
          ${{ if and(eq(variables['System.TeamProject'], 'internal'), endsWith(variables['Build.Repository.Name'], '-pr')) }}:
            TokenToUseForAuth: $(azuresdk-github-pat)
            PreserveAuthToken: true

      # ============================================================
      # DIAGNOSTIC: Validate sparse-checkout impact on git tag/tree commands
      # Remove after validation
      # ============================================================

      # [Step 1] Observe state immediately after treeless clone: git tag and git ls-tree behavior
      - pwsh: |
          Write-Host "=== [Diag 1] SdkRepoDirectory: $(SdkRepoDirectory) ==="
          $pkgDir = "$(SdkRepoDirectory)/sdk/commerce/arm-commerce"
          if (-not (Test-Path $pkgDir)) {
            Write-Host "##[warning]Directory does not exist: $pkgDir"
            Write-Host "Listing $(SdkRepoDirectory)/sdk/commerce/arm-commerce if it exists:"
            Get-ChildItem "$(SdkRepoDirectory)/sdk/commerce/arm-commerce" -ErrorAction SilentlyContinue
            exit 0
          }
          Push-Location $pkgDir
          Write-Host "CWD: $PWD"
          Write-Host "=== [Diag 1] Clone filter in use ==="
          git config remote.origin.partialclonefilter

          Write-Host "`n=== [Diag 1] Tag count and samples ==="
          $tags = git tag -l
          Write-Host "Tag count: $($tags.Count)"
          $commerceTags = $tags | Where-Object { $_ -match 'arm-commerce' }
          Write-Host "arm-commerce tags: $($commerceTags.Count)"
          $commerceTags

          $testTag = '@azure/arm-commerce_3.0.0'
          Write-Host "`n=== [Diag 1] Check tag object type for $testTag ==="
          $tagSha = git rev-parse "refs/tags/$testTag"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Tag SHA: $tagSha"
            git cat-file -t $tagSha
          } else {
            Write-Host "Tag not found: $testTag"
          }

          Write-Host "`n=== [Diag 1][$(SdkRepoOwner)/azure-sdk-for-js] git ls-tree (treeless clone) ==="
          git ls-tree -d "$testTag" src/api 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
          Pop-Location

          # --- Azure/azure-sdk-for-js public repo comparison ---
          $azurePkgDir = "$(publicSdkRepoDirectory)/sdk/commerce/arm-commerce"
          Write-Host "`n=== [Diag 1][Azure/azure-sdk-for-js] CWD: $azurePkgDir ==="
          Push-Location $azurePkgDir
          git config remote.origin.partialclonefilter
          $tags2 = git tag -l
          Write-Host "Tag count: $($tags2.Count)"
          $commerceTags2 = $tags2 | Where-Object { $_ -match 'arm-commerce' }
          Write-Host "[Azure/azure-sdk-for-js] arm-commerce tags: $($commerceTags2.Count)"
          $commerceTags2
          $tagSha2 = git rev-parse "refs/tags/$testTag"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[Azure/azure-sdk-for-js] Tag SHA: $tagSha2"
            git cat-file -t $tagSha2
          } else {
            Write-Host "[Azure/azure-sdk-for-js] Tag not found: $testTag"
          }
          Write-Host "`n=== [Diag 1][Azure/azure-sdk-for-js] git ls-tree (treeless clone) ==="
          git ls-tree -d "$testTag" src/api 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
          Pop-Location
        displayName: '[Diag 1] Baseline: treeless clone git tag + git ls-tree'
        continueOnError: true

      # [Step 2] Try git fetch --tags as a lightweight fix, then retry git ls-tree
      - pwsh: |
          $testTag = '@azure/arm-commerce_3.0.0'

          Write-Host "=== [Diag 2][$(SdkRepoOwner)/azure-sdk-for-js] CWD: $(SdkRepoDirectory)/sdk/commerce/arm-commerce ==="
          Push-Location "$(SdkRepoDirectory)/sdk/commerce/arm-commerce"
          git fetch --tags
          Write-Host "git fetch --tags exit code: $LASTEXITCODE"
          git ls-tree -d "$testTag" src/api 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
          Pop-Location

          # --- Azure/azure-sdk-for-js public repo comparison ---
          $azurePkgDir = "$(publicSdkRepoDirectory)/sdk/commerce/arm-commerce"
          Write-Host "`n=== [Diag 2][Azure/azure-sdk-for-js] CWD: $azurePkgDir ==="
          Push-Location $azurePkgDir
          git fetch --tags
          Write-Host "[Azure/azure-sdk-for-js] git fetch --tags exit code: $LASTEXITCODE"
          git ls-tree -d "$testTag" src/api 2>&1
          Write-Host "[Azure/azure-sdk-for-js] Exit code: $LASTEXITCODE"
          Pop-Location
        displayName: '[Diag 2] git fetch --tags: does this fix git ls-tree?'
        continueOnError: true

      # [Step 3] Full re-clone (no --filter), verify git ls-tree is stable
      - pwsh: |
          $testTag = '@azure/arm-commerce_3.0.0'

          Write-Host "=== [Diag 3][$(SdkRepoOwner)/azure-sdk-for-js] Full re-clone ==="
          Remove-Item -Recurse -Force "$(SdkRepoDirectory)"
          New-Item -ItemType Directory -Force -Path "$(SdkRepoDirectory)" | Out-Null
          Push-Location "$(SdkRepoDirectory)"
          git clone --single-branch --branch "$(CheckoutCommitish)" "https://github.com/$(SdkRepoOwner)/$(SdkRepoName)" .
          Write-Host "Clone exit code: $LASTEXITCODE"
          git config gc.auto 0
          Pop-Location
          $pkgDir = "$(SdkRepoDirectory)/sdk/commerce/arm-commerce"
          Write-Host "CWD: $pkgDir"
          Push-Location $pkgDir
          git config remote.origin.partialclonefilter 2>&1
          git ls-tree -d "$testTag" src/api 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
          Pop-Location

          # --- Azure/azure-sdk-for-js public repo full re-clone comparison ---
          $azureDir = "$(publicSdkRepoDirectory)"
          Write-Host "`n=== [Diag 3][Azure/azure-sdk-for-js] Full re-clone ==="
          Remove-Item -Recurse -Force $azureDir
          New-Item -ItemType Directory -Force -Path $azureDir | Out-Null
          Push-Location $azureDir
          git clone --single-branch --branch main https://github.com/Azure/azure-sdk-for-js .
          Write-Host "[Azure/azure-sdk-for-js] Clone exit code: $LASTEXITCODE"
          git config gc.auto 0
          Pop-Location
          $azurePkgDir = "$azureDir/sdk/commerce/arm-commerce"
          Write-Host "[Azure/azure-sdk-for-js] CWD: $azurePkgDir"
          Push-Location $azurePkgDir
          git config remote.origin.partialclonefilter 2>&1
          git ls-tree -d "$testTag" src/api 2>&1
          Write-Host "[Azure/azure-sdk-for-js] Exit code: $LASTEXITCODE"
          Pop-Location
        displayName: '[Diag 3] Full re-clone: verify git ls-tree is stable'
        continueOnError: true

