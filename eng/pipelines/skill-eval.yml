# Vally eval CI for .github/skills, using the eval framework synced from azure-sdk-tools under
# eng/common. Cross-repo MCP build wiring lives in
# /eng/pipelines/templates/stages/cross-repo-eval-entrypoint.yml, extended below.
#
# Single CI mechanism for .github/skills: runs on every PR touching it (mock MCP tier) and
# nightly on main to catch drift unrelated to a code change.

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - .github/skills/**

schedules:
  - cron: '0 8 * * *'
    displayName: 'Daily skill-eval run'
    branches:
      include:
        - main
    always: true

variables:
  # Managed-pool image selection (LINUXPOOL/LINUXVMIMAGE). Repo-local.
  - template: /eng/pipelines/templates/variables/image.yml
  # Provides the secret azuresdk-copilot-github-pat, mapped into GITHUB_TOKEN in the invoke step.
  # Already exists in this ADO project.
  - group: AzSDK_Eval_Variable_group

extends:
  template: /eng/pipelines/templates/stages/cross-repo-eval-entrypoint.yml
  parameters:
    vallyRoot: .github/skills
    # All rooted at .github/skills, so one Prepare/Eval/Summary run covers every suite
    # (collect-stimuli.ts shards by `area` tag, falling back to parent folder name):
    #   - '*/evals/*.eval.yaml' — trigger.eval.yaml suites, one per skill.
    #   - '*/evals/eval.yaml'   — capability suites (plain eval.yaml, doesn't match *.eval.yaml).
    #   - 'evals/arm-api-reviewer/vally/eval-*.yaml' — ARM API Reviewer suite (own nested
    #     .vally.yaml/fixtures, no MCP server needed; folded in here instead of a second
    #     pipeline since eval-shard.yml only supports one Prepare stage per pipeline).
    # Not covered yet (no eval files): azure-api-review, openai-typespec-update.
    evalGlobs:
      - '*/evals/*.eval.yaml'
      - '*/evals/eval.yaml'
      - 'evals/arm-api-reviewer/vally/eval-*.yaml'
    # Raised from 20 to 45m to cover the ARM suite's single fallback shard (17 files, no area tags).
    shardTimeoutInMinutes: 45
