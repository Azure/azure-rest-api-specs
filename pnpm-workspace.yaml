packages:
  - ".github"
  - ".github/shared"
  - "eng/tools"
  - "eng/tools/*"

# Lowered from the pnpm 11 default of 1440 (24h) to unblock recently published
# dependencies. Packages must be at least this many minutes old before install.
minimumReleaseAge: 720

allowBuilds:
  # Git-hosted dependency (github:actions/github-script) that pnpm builds via its
  # "prepare" script. pnpm 11 refuses to build git deps with build scripts unless
  # they are allowlisted here, failing install with ERR_PNPM_GIT_DEP_PREPARE_NOT_ALLOWED.
  "@actions/github-script": true
  autorest: true

overrides:
  "@typespec/asset-emitter": "0.79.1"
  "get-uri": "^6.0.5"
  "lodash": "^4.18.1"
  "minimatch@^3.0.0": "^3.1.5"
  "superagent": "^10.2.3"
  "undici@^5.0.0": "^6.0.0"

catalog:
  "@apidevtools/json-schema-ref-parser": ^15.1.3
  "@eslint/js": ^10.0.0
  "@types/cross-spawn": ^6.0.6
  "@types/debug": ^4.1.12
  "@types/js-yaml": ^4.0.9
  "@types/node": ^20.0.0
  "@types/semver": ^7.7.1
  "@vitest/coverage-v8": ^4.1.0
  autorest: ^3.8.0
  cross-env: ^10.1.0
  cross-spawn: ^7.0.6
  debug: ^4.4.3
  eslint: ^10.0.0
  globals: ^17.0.0
  js-yaml: ^4.1.0
  marked: ^18.0.0
  prettier: 3.8.3
  prettier-plugin-organize-imports: ^4.2.0
  semver: ^7.7.1
  simple-git: ^3.36.0
  typescript: ~6.0.2
  typescript-eslint: ^8.58.0
  vitest: ^4.1.0
  zod: ^4.3.5
