name: Install dependencies for github-script actions
description: Installs dependencies for github-script actions

runs:
  using: composite

  steps:
    - uses: ./.github/actions/setup-node-install-deps
      with:
        # actions/github-script@v8 uses Node 24
        node-version: 24.x
        install-command: "pnpm ci --prod --prefer-offline --filter=azure-rest-api-specs-github..."
        # Minimal prod-only install (~22 packages). Skip the pnpm store cache: in CI
        # the store starts empty each run anyway, and the cache restore/save round-trip
        # (plus the "pnpm store path" probe) costs more than just downloading the few
        # packages directly.
        cache: "false"
        # Trust the already-vetted committed lockfile and skip pnpm's per-install
        # supply-chain re-verification (cold every CI run, scales with lockfile size).
        trust-lockfile: "true"
