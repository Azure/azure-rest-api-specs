name: Install dependencies for github-script actions
description: Installs dependencies for github-script actions

runs:
  using: composite

  steps:
    - uses: ./.github/actions/setup-node-install-deps
      with:
        # actions/github-script@v8 uses Node 24
        node-version: 24.x
        # "--frozen-lockfile": ensures reproducible installs
        # "--prod": not needed at runtime, improves performance
        install-command: "pnpm install --frozen-lockfile --prod"
        working-directory: ./.github
