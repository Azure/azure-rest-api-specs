name: Install dependencies for github-script actions
description: Installs dependencies for github-script actions

runs:
  using: composite

  steps:
    - uses: ./.github/actions/setup-node-install-deps
      with:
        # actions/github-script@v8 uses Node 24
        node-version: 24.x
        install-command: "pnpm ci --prod --prefer-offline --filter=azure-rest-api-specs-github..."
        # Minimal prod-only install; keep its store cache separate from the full
        # install so it can't shrink the cache that full installs rely on.
        cache-name: "github-script"
