name: Setup Node and install dependencies
description: Uses specified Node version and installs dependencies using pnpm

inputs:
  node-version:
    description: "Node version to use"
    default: 24.x
  install-command:
    description: "Command to install dependencies"
    default: "pnpm ci --prefer-offline"
  working-directory:
    description: "Working directory"
    default: "."
  package-json-file:
    description: 'Path (relative to the repository root) of the package.json containing the "packageManager" field used to select the pnpm version'
    default: "package.json"

runs:
  using: "composite"

  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        package_json_file: ${{ inputs.package-json-file }}

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
        cache-dependency-path: "**/pnpm-lock.yaml"

    - run: |
        echo "::group::$INSTALL_COMMAND"
        $INSTALL_COMMAND
        echo "::endgroup::"
      shell: bash
      env:
        INSTALL_COMMAND: ${{ inputs.install-command }}
      working-directory: ${{ inputs.working-directory }}

    - run: |
        echo "::group::pnpm ls"
        pnpm ls || true
        echo "::endgroup::"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
