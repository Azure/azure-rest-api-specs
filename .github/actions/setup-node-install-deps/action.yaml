name: Setup Node and install dependencies
description: Uses specified Node version and installs dependencies using pnpm

inputs:
  node-version:
    description: "Node version to use"
    default: 24.x
  install-command:
    description: "Command to install dependencies"
    default: "pnpm install --frozen-lockfile"
  working-directory:
    description: "Working directory"
    default: "."
  package-json-file:
    description: 'Path (relative to the repository root) of the package.json containing the "devEngines.packageManager" field used to select the pnpm version'
    default: "package.json"

runs:
  using: "composite"

  steps:
    - name: Read pnpm version from devEngines
      id: pnpm-version
      shell: bash
      run: |
        VERSION="$(node -p "require('./${PACKAGE_JSON_FILE}').devEngines.packageManager.version")"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      env:
        PACKAGE_JSON_FILE: ${{ inputs.package-json-file }}

    - uses: pnpm/action-setup@v6
      with:
        version: ${{ steps.pnpm-version.outputs.version }}

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
        cache-dependency-path: "**/pnpm-lock.yaml"

    - run: |
        echo "::group::$INSTALL_COMMAND"
        $INSTALL_COMMAND
        echo "::endgroup::"
      shell: bash
      env:
        INSTALL_COMMAND: ${{ inputs.install-command }}
      working-directory: ${{ inputs.working-directory }}

    - run: |
        echo "::group::pnpm ls"
        pnpm ls || true
        echo "::endgroup::"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
