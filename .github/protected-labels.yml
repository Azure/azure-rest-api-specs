# Protected Labels Configuration
# This file defines which labels can only be applied by authorized users.
# If an unauthorized user applies a protected label, the bot removes it.
#
# The problem: service teams self-applying "Approved" labels to bypass architect review.
# This workflow ensures only authorized reviewers can sign off via labels.
#
# Format:
#   global-approvers: users who can apply ANY protected label
#   LabelName: users who can apply THIS specific label (in addition to global)
#
# To update: submit a PR modifying this file.

# Global approvers can apply any protected label.
global-approvers:
  - lmazuel
  - samvaity
  - praveenkuttappan

