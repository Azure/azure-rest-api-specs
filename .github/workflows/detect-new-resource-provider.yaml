name: Detect New Resource Provider

on:
  pull_request:
    branches:
      - main
      - RPSaaSMaster
    types:
      # default
      - opened
      - synchronize
      - reopened
      # re-run if base branch is changed, since previous merge commit may generate incorrect diff
      - edited
    paths:
      - "specification/**/resource-manager/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-new-rp:
    name: Detect New Resource Provider
    runs-on: ubuntu-24.04
    # TODO: Set to true to enable new RP detection
    if: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          sparse-checkout: |
            .github

      - name: Install dependencies for github-script actions
        uses: ./.github/actions/install-deps-github-script

      - name: Detect new resource providers
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const { default: detectNewResourceProvider } =
              await import('${{ github.workspace }}/.github/workflows/src/detect-new-resource-provider.js');
            return await detectNewResourceProvider({ github, context, core });

      - if: fromJson(steps.detect.outputs.result).labelActions['ARMModelingReviewRequired'] != 'none'
        name: Upload artifact for ARMModelingReviewRequired label
        uses: ./.github/actions/add-label-artifact
        with:
          name: "ARMModelingReviewRequired"
          value: "${{ fromJson(steps.detect.outputs.result).labelActions['ARMModelingReviewRequired'] == 'add' }}"
