name: Update Labels

on:
  # TODO: If a pull request is manually labeled or unlabeled, get all artifacts associated with PR, and update labels
  # pull_request:
  #   types: [labeled, unlabeled]
  # If an upstream workflow if completed, get only the artifacts from that workflow, and update labels
  workflow_run:
    workflows:
      [
        "ARM Auto SignOff - Set Status",
        "ARM Modeling Review",
        "SDK Breaking Change Labels",
        "SDK Suppressions",
        "TypeSpec Requirement",
        "Breaking Change - Add Label Artifacts",
      ]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  update-labels:
    name: Update Labels

    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github

      - name: Update Labels
        id: update-labels
        uses: actions/github-script@v8
        with:
          script: |
            const { default: updateLabels } =
              await import('${{ github.workspace }}/.github/workflows/src/update-labels.js');
            await updateLabels({ github, context, core });

      - name: Ensure ARM Modeling labels exist
        if: github.event.workflow_run.name == 'ARM Modeling Review'
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              "ARMModelingReviewRequired",
              "ARMModelingSignedOff",
              "ARMModelingAutoSignedOff",
            ];
            for (const name of labels) {
              try {
                // Check whether the label already exists; result is intentionally unused.
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
                core.info(`Label '${name}' already exists`);
              } catch (error) {
                if (error.status === 404) {
                  // Use GitHub's default "light gray" color so the label is neutral and
                  // distinguishable from labels that carry semantic color coding.
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color: "ededed" });
                  core.info(`Created label '${name}'`);
                } else {
                  throw error;
                }
              }
            }

      - if: ${{ always() && steps.update-labels.outputs.head_sha }}
        name: Upload artifact with head SHA
        uses: ./.github/actions/add-empty-artifact
        with:
          name: head-sha
          value: ${{ steps.update-labels.outputs.head_sha }}

      - if: ${{ always() && steps.update-labels.outputs.issue_number }}
        name: Upload artifact with issue number
        uses: ./.github/actions/add-empty-artifact
        with:
          name: issue-number
          value: ${{ steps.update-labels.outputs.issue_number }}
