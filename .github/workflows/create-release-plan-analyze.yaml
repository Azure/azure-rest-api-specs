name: "Create Release Plan - Analyze"

on:
  pull_request:
    types: [labeled]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to analyze"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    name: "Create Release Plan - Analyze"
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.state == 'open' &&
      github.event.label.name == 'new-api-version')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            specification

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        shell: bash
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Analyze TypeSpec project changes
        id: analyze
        uses: actions/github-script@v8
        with:
          script: |
            const { getTypeSpecProjectInfo } =
              await import('${{ github.workspace }}/.github/workflows/src/typespec-project-info.js');

            let prNumber;
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt('${{ inputs.pr_number }}', 10);
            }

            const info = await getTypeSpecProjectInfo(github, context, core, { prNumber });

            const shouldCreateReleasePlan =
              info.tspProjectPaths.length === 1 && info.apiVersions.length === 1;

            core.setOutput('should_create_release_plan', String(shouldCreateReleasePlan));
            core.setOutput('tsp_project_count', String(info.tspProjectPaths.length));
            core.setOutput('api_version_count', String(info.apiVersions.length));

            core.info(`Should create release plan: ${shouldCreateReleasePlan}`);
            core.info(`TypeSpec projects: ${info.tspProjectPaths.length}`);
            core.info(`API versions: ${info.apiVersions.length}`);

            if (shouldCreateReleasePlan) {
              core.setOutput('tsp_project_path', info.tspProjectUrls[0]);
              core.setOutput('api_version', info.apiVersions[0]);
              // Encode URL so slashes are safe in artifact names
              core.setOutput('tsp_project_path_encoded', encodeURIComponent(info.tspProjectUrls[0]));
            }

            if (!shouldCreateReleasePlan && info.tspProjectPaths.length > 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body:
                  "Multiple TypeSpec project changes are identified in this PR. " +
                  "The release plan cannot be automatically created. " +
                  "Please create it manually using the **azsdk agent** in VS Code. " +
                  "See [release plan documentation](https://aka.ms/azsdk/releaseplan-dashboard) for details.",
              });
              core.info("Posted comment: multiple TypeSpec projects detected.");
            }

      - name: Upload analysis result artifact
        uses: ./.github/actions/add-empty-artifact
        with:
          name: release-plan-eligible
          value: ${{ steps.analyze.outputs.should_create_release_plan }}
      - name: Upload tsp-project-path artifact
        if: steps.analyze.outputs.should_create_release_plan == 'true'
        uses: ./.github/actions/add-empty-artifact
        with:
          name: tsp-project-path
          value: ${{ steps.analyze.outputs.tsp_project_path_encoded }}

      - name: Upload api-version artifact
        if: steps.analyze.outputs.should_create_release_plan == 'true'
        uses: ./.github/actions/add-empty-artifact
        with:
          name: api-version
          value: ${{ steps.analyze.outputs.api_version }}

      - if: ${{ always() && github.event.pull_request.head.sha }}
        name: Upload artifact with head SHA
        uses: ./.github/actions/add-empty-artifact
        with:
          name: head-sha
          value: ${{ github.event.pull_request.head.sha }}

      - if: ${{ always() && github.event.pull_request.number }}
        name: Upload artifact with issue number
        uses: ./.github/actions/add-empty-artifact
        with:
          name: issue-number
          value: ${{ github.event.pull_request.number }}
