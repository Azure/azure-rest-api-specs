name: "Create Release Plan - Generate"

on:
  workflow_run:
    workflows: ["Create Release Plan - Analyze"]
    types: [completed]

  # Manual trigger — provide TypeSpec project path, API version, and PR number
  workflow_dispatch:
    inputs:
      tsp_project_path:
        description: "TypeSpec project path (e.g. specification/foo/Bar)"
        required: true
        type: string
      api_version:
        description: "API version (e.g. 2025-06-01-preview)"
        required: true
        type: string
      pr_number:
        description: "Pull request number to create a release plan for"
        required: true
        type: number

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  create-release-plan:
    name: "Create Release Plan - Generate"
    # Only run if the analysis workflow succeeded
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve raw inputs
        id: raw
        uses: actions/github-script@v8
        with:
          script: |
            // Default to skip; overridden only when raw inputs resolve successfully
            core.setOutput('skip', 'true');

            let prNumber, tspProjectPath, apiVersion;

            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt('${{ inputs.pr_number }}', 10);
              tspProjectPath = '${{ inputs.tsp_project_path }}';
              apiVersion = '${{ inputs.api_version }}';
              core.info(`Manual trigger for PR #${prNumber}`);
            } else {
              // workflow_run: extract raw inputs from artifacts of the triggering workflow
              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: context.payload.workflow_run.id,
                  per_page: 100,
                }
              );

              const artifactNames = artifacts.map(a => a.name);
              core.info(`Artifacts: ${JSON.stringify(artifactNames)}`);

              const eligibleArtifact = artifactNames.find(n => n.startsWith('release-plan-eligible='));
              if (!eligibleArtifact || eligibleArtifact.split('=')[1] !== 'true') {
                core.info('Release plan not eligible. Skipping.');
                return;
              }

              const prArtifact = artifactNames.find(n => n.startsWith('issue-number='));
              const tspArtifact = artifactNames.find(n => n.startsWith('tsp-project-path='));
              const apiVersionArtifact = artifactNames.find(n => n.startsWith('api-version='));

              if (!prArtifact || !tspArtifact || !apiVersionArtifact) {
                core.setFailed('Missing required artifacts from analyze workflow.');
                return;
              }

              prNumber = parseInt(prArtifact.split('=')[1], 10);
              // Decode the URL-encoded path from analyze workflow artifacts.
              tspProjectPath = decodeURIComponent(tspArtifact.substring(tspArtifact.indexOf('=') + 1));
              apiVersion = apiVersionArtifact.split('=')[1];
            }

            core.setOutput('skip', 'false');
            core.setOutput('pr_number_raw', String(prNumber || ''));
            core.setOutput('tsp_project_path_raw', String(tspProjectPath || ''));
            core.setOutput('api_version_raw', String(apiVersion || ''));

      - name: Checkout workflow scripts
        if: steps.raw.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            eng

      - name: Validate and prepare inputs
        id: prepare
        if: steps.raw.outputs.skip != 'true'
        uses: actions/github-script@v8
        env:
          PR_NUMBER_RAW: ${{ steps.raw.outputs.pr_number_raw }}
          TSP_PROJECT_PATH_RAW: ${{ steps.raw.outputs.tsp_project_path_raw }}
          API_VERSION_RAW: ${{ steps.raw.outputs.api_version_raw }}
        with:
          script: |
            const { validateAndSetReleasePlanInputs } = await import(
              '${{ github.workspace }}/.github/workflows/src/create-release-plan.js'
            );
            await validateAndSetReleasePlanInputs({
              core,
              prNumberRaw: process.env.PR_NUMBER_RAW,
              tspProjectPathRaw: process.env.TSP_PROJECT_PATH_RAW,
              apiVersionRaw: process.env.API_VERSION_RAW,
            });

      - name: Azure Login with Workload Identity Federation
        if: steps.prepare.outputs.skip != 'true' && github.repository_owner == 'Azure'
        uses: azure/login@v3
        with:
          client-id: "c277c2aa-5326-4d16-90de-98feeca69cbc"
          tenant-id: "72f988bf-86f1-41af-91ab-2d7cd011db47"
          allow-no-subscriptions: true

      - name: Install azsdk CLI
        if: steps.prepare.outputs.skip != 'true'
        shell: pwsh
        run: |
          ./eng/common/mcp/azure-sdk-mcp.ps1 -InstallDirectory $HOME/bin

      - name: Create release plan and comment on PR
        id: create-plan
        continue-on-error: true
        if: steps.prepare.outputs.skip != 'true'
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.prepare.outputs.pr_number }}
          TSP_PROJECT_PATH: ${{ steps.prepare.outputs.tsp_project_path }}
          API_VERSION: ${{ steps.prepare.outputs.api_version }}
        with:
          script: |
            const { createReleasePlanWithKnownInputs } = await import(
              '${{ github.workspace }}/.github/workflows/src/create-release-plan.js'
            );
            await createReleasePlanWithKnownInputs({
              github,
              context,
              core,
              prNumber: process.env.PR_NUMBER,
              tspProjectPath: process.env.TSP_PROJECT_PATH,
              apiVersion: process.env.API_VERSION,
            });
