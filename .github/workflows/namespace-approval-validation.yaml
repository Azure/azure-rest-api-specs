name: "Namespace Approval - Validate Labels"

on:
  pull_request_target:
    types:
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  validate-approval:
    name: Validate Namespace Approval
    runs-on: ubuntu-24.04
    steps:
      # IMPORTANT: This workflow uses pull_request_target, which runs with repo write permissions.
      # Only base-branch code is checked out below. Do NOT checkout or run code from the PR head.
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github/

      - name: Install dependencies for github-script actions
        uses: ./.github/actions/install-deps-github-script

      - name: Validate namespace approval label
        uses: actions/github-script@v8
        with:
          script: |
            const { default: validateApproval } =
              await import('${{ github.workspace }}/.github/workflows/src/namespace-approval/validate-approval.js');
            await validateApproval({ github, context, core });

      - name: Update namespace approval status
        uses: actions/github-script@v8
        with:
          script: |
            const { default: statusCheck } =
              await import('${{ github.workspace }}/.github/workflows/src/namespace-approval/status-check.js');
            await statusCheck({ github, context, core });
