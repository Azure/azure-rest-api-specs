name: "Summarize PR Impact"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read
  pull-requests: read

jobs:
  impact:
    name: "Summarize PR Impact"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 'after' state
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
          path: after

      - name: Checkout 'before' state
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: before

      - name: Setup Node and install deps
        working-directory: after
        shell: bash
        run: |
          tool_cache_root="${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}"
          shopt -s nullglob
          node_bins=("$tool_cache_root"/node/24.*/x64/bin)
          shopt -u nullglob

          if [[ ${#node_bins[@]} -eq 0 ]]; then
            echo "::error::Unable to locate a preinstalled Node 24 toolcache entry."
            exit 1
          fi

          IFS=$'\n' sorted_node_bins=($(printf '%s\n' "${node_bins[@]}" | sort -V))
          unset IFS
          node_bin="${sorted_node_bins[${#sorted_node_bins[@]} - 1]}"
          export PATH="$node_bin:$PATH"

          echo "::group::Tool versions"
          node -v
          npm -v
          echo "::endgroup::"

          echo "::group::npm ci --no-audit --no-fund --prefer-offline"
          npm ci --no-audit --no-fund --prefer-offline
          echo "::endgroup::"

          echo "::group::npm ls -a"
          npm ls -a || true
          echo "::endgroup::"

      - name: Run Summarize Impact
        id: summarize-impact
        working-directory: after
        run: |
          npm exec --no -- summarize-impact --sourceDirectory . --targetDirectory ../before \
            --number "${{ github.event.pull_request.number }}" \
            --sourceBranch "$HEAD_REF" \
            --targetBranch "${{ github.event.pull_request.base.ref }}" \
            --sha "${{ github.event.pull_request.head.sha }}" \
            --repo "${{ github.event.repository.name }}" \
            --owner "${{ github.repository_owner }}" \
            ${{ github.event.pull_request.draft && '--isDraft' || '' }}
        env:
          # We absolutely need to avoid OOM errors due to certain inherited types from openapi-alps
          NODE_OPTIONS: "--max-old-space-size=8192"
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set job-summary artifact
        if: ${{ always() && steps.summarize-impact.outputs.summary }}
        uses: actions/upload-artifact@v7
        with:
          name: job-summary
          path: ${{ steps.summarize-impact.outputs.summary }}
          # If the file doesn't exist, just don't add the artifact
          if-no-files-found: ignore
