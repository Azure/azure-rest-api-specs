name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  skills:
    - ../../SKILL.md
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["../../../../../eng/common/mcp/azure-sdk-mcp.ps1", "-Run"]
      cwd: ./
      timeout: 50000

# Execution configuration
config:
  runs: 2                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    add a default value `21` for property age in model EmployeeProperties from a new api version 2025-11-01
  name: 001002-version-default-value
  constraints:
    max_turns: 10
    expect_tools:
    - edit
    - azsdk_run_typespec_validation
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/001002-version-default-value/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001002-version-default-value/main.tsp
      dest: main.tsp
    - src: ../fixtures/001002-version-default-value/package.json
      dest: package.json
    - src: ../fixtures/001002-version-default-value/readme.md
      dest: readme.md
    - src: ../fixtures/001002-version-default-value/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001002-version-default-value/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@removed\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@renamedFrom\(Versions\.v2025_11_01, "age"\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@added\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'age\?: int32 = 21;'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 0.5
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    prompt: 1
    file-matches: 4
  threshold: 0.7


