name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  skills:
    - ../../SKILL.md
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["../../../../../eng/common/mcp/azure-sdk-mcp.ps1", "-Run"]
      cwd: ./
      timeout: 50000

# Execution configuration
config:
  runs: 2                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- name: 001001-version-spread-property
  prompt: I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in a new API version 2025-05-04-preview only.
  environment:
    files:
    - src: ../fixtures/001001-version-spread-property/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001001-version-spread-property/main.tsp
      dest: main.tsp
    - src: ../fixtures/001001-version-spread-property/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001001-version-spread-property/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/001001-version-spread-property/package.json
      dest: package.json
    - src: ../fixtures/001001-version-spread-property/readme.md
      dest: readme.md
  graders:
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: file-matches
    config:
      path: employee.tsp
      pattern: "\\.\\.\\.ManagedServiceIdentityProperty;"
  - type: file-matches
    config:
      path: employee.tsp
      pattern: "@@added\\(Employee\\.identity, Versions\\.`2025-05-04-preview`\\);"
  - type: prompt
    config:
      prompt: Verify changes are scoped to this task only, with no unrelated edits beyond introducing preview-only identity via versioning.
      model: claude-opus-4.6-1m
      scoring: scale_1_5
      threshold: 0.5
  constraints:
    max_turns: 10
    max_tokens: 5000
    expect_tools:
    - edit
    - azsdk_run_typespec_validation
scoring:
  weights:
    file-matches: 3
    prompt: 1
  threshold: 0.7




