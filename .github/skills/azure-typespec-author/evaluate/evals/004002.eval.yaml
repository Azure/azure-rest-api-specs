name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  skills:
    - ../../SKILL.md
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000
# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    I have a property `assets: string[]` in EmployeeProperties. Add @minLength(3) @maxLength(10) constraints for any item of the assets array.
  name: 004002-decorate-length-constrains-on-array-item
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  # VP1: Custom scalar type with minLength/maxLength constraints
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'scalar.*extends string'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@minLength\(3\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@maxLength\(10\)'
  # VP2: Assets array uses custom scalar type instead of plain string
  - type: file-not-matches
    config:
      path: employee.tsp
      pattern: 'assets:\s*string\[\]'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'assets:.*\[\]'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    tool-calls: 1
    prompt: 1
    file-matches: 5
  threshold: 1.0
