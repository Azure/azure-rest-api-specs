name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  skills:
    - ../../SKILL.md
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["../../../../../eng/common/mcp/azure-sdk-mcp.ps1", "-Run"]
      cwd: ./
      timeout: 50000

# Execution configuration
config:
  runs: 2                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    change the visibility of property 'provisioningState' from Lifecycle.Read to Lifecycle.Read and Lifecycle.Create in version 2025-05-04-preview only
  name: 001004-version-property-decorator
  constraints:
    max_turns: 10
    expect_tools:
    - edit
    - azsdk_run_typespec_validation
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/001004-version-property-decorator/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/001004-version-property-decorator/main.tsp
      dest: main.tsp
    - src: ../fixtures/001004-version-property-decorator/package.json
      dest: package.json
    - src: ../fixtures/001004-version-property-decorator/readme.md
      dest: readme.md
    - src: ../fixtures/001004-version-property-decorator/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/001004-version-property-decorator/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: file-matches
    config:
      path: employee.tsp
      pattern: Lifecycle\.Read, Lifecycle\.Create
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 0.5
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    prompt: 1
    file-matches: 2
  threshold: 0.7


