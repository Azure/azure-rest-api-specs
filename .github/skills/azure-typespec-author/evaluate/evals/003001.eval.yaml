name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000

# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    Add an async delete operation for StacItems
  name: 003001-dataplane-async-delete-op
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/003001-dataplane-async-delete-op/inma.tsp
      dest: inma.tsp
    - src: ../fixtures/003001-dataplane-async-delete-op/package.json
      dest: package.json
    - src: ../fixtures/003001-dataplane-async-delete-op/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  # VP1: Async delete added to StacItems namespace
  - type: file-matches
    config:
      path: inma.tsp
      pattern: 'interface StacItems'
  - type: file-matches
    config:
      path: inma.tsp
      pattern: 'LongRunningResourceDelete<StacItem>'
  # VP2: Uses StandardResourceOperations alias
  - type: file-matches
    config:
      path: inma.tsp
      pattern: 'alias StandardResourceOperations|StandardResourceOperations\.LongRunningResourceDelete'
  # VP3: Linked to existing polling operation
  - type: file-matches
    config:
      path: inma.tsp
      pattern: '@pollingOperation\(IngestionOperations\.get\)'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    tool-calls: 1
    prompt: 1
    file-matches: 4
  threshold: 1.0
