name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000
# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    Add a move async operation to move employee, operation's request is MoveRequest, response is MoveResponse
  name: 003002-arm-action-lro
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azsdk_run_typespec_validation
  # VP1: Async move action using ArmResourceActionAsync
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'move is ArmResourceActionAsync<Employee,'
  # VP2: MoveRequest input and MoveResponse output
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'ArmResourceActionAsync<Employee,\s*MoveRequest,\s*MoveResponse'
  # VP3: Combined LRO headers with FinalResult and RetryAfterHeader
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'LroHeaders = ArmCombinedLroHeaders'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'FinalResult\s*=\s*MoveResponse'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'RetryAfterHeader'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    tool-calls: 1
    prompt: 1
    file-matches: 5
  threshold: 1.0
