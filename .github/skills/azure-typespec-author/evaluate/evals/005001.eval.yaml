name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  skills:
    - ../../SKILL.md
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000
# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    Add suppressions for the warnings produced by "tsp compile .", and set the justification to "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details".
  name: 005001-warning-suppress-warning
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/005001-warning-suppress-warning/models.tsp
      dest: models.tsp
    - src: ../fixtures/005001-warning-suppress-warning/package.json
      dest: package.json
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: models.tsp
      pattern: '#suppress'
  - type: file-matches
    config:
      path: models.tsp
      pattern: 'FIXME: Update justification, follow aka\.ms/tsp/conversion-fix for details'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    tool-calls: 1
    prompt: 1
    file-matches: 2
  threshold: 1.0


  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1

