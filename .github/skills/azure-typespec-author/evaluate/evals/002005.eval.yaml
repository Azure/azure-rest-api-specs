name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000
# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    Define a Azure resource "Employee" under the namespace "Microsoft.Widget" using TypeSpec. Properties: age (int32, optional), city (string, optional), profile (bytes, optional), provisioningState (enum, optional, read-only). Ensure the definition meets TypeSpec Azure design guidelines.
  name: 002005-ARM-define-the-resource
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/002005-ARM-define-the-resource/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: employee.tsp
      pattern: model Employee is TrackedResource<EmployeeProperties>
  # Point 3: EmployeeProperties has age, city, profile, and read-only provisioningState
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'age\?: int32'
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: '@visibility\(Lifecycle\.Read\)'
  # Point 4: ProvisioningState union includes standard ARM states
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: ResourceProvisioningState
  # Point 5: CRUD + listByResourceGroup + listBySubscription
  - type: file-matches
    config:
      path: employee.tsp
      pattern: ArmResourceCreateOrReplaceAsync<Employee>|ArmResourceCreateOrUpdateAsync<Employee>
  - type: file-matches
    config:
      path: employee.tsp
      pattern: ArmResourceListByParent<Employee>
  - type: file-matches
    config:
      path: employee.tsp
      pattern: ArmListBySubscription<Employee>
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify all five aspects: (1) Employee resource definition is written into a TSP file; (2) Employee model uses TrackedResource<EmployeeProperties> under Microsoft.Widget namespace; (3) EmployeeProperties includes age, city, profile, and a read-only provisioningState; (4) ProvisioningState is a union type incorporating standard ARM ResourceProvisioningState; (5) Employees interface includes full CRUD operations (get, create, update, delete) plus listByResourceGroup and listBySubscription.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    tool-calls: 1
    prompt: 1
    file-matches: 7
  threshold: 1.0
