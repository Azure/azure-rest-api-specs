name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  skills:
    - ../../SKILL.md
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["../../../../../eng/common/mcp/azure-sdk-mcp.ps1", "-Run"]
      env: {
        AZURE_SDK_KB_ENDPOINT: http://localhost:8088
      }
      timeout: 60000

# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    Define a Azure resource "User" under the namespace "Microsoft.Contoso" using TypeSpec. Ensure the definition meets TypeSpec Azure design guidelines.
  name: 002005-ARM-define-the-resource
  constraints:
    max_turns: 10
    expect_tools:
    - edit
    - azsdk_run_typespec_validation
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/002005-ARM-define-the-resource/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: file-matches
    config:
      path: main.tsp
      pattern: model Employee is TrackedResource<EmployeeProperties>
  - type: file-matches
    config:
      path: main.tsp
      pattern: ArmResourceCreateOrReplaceAsync<Employee>|ArmResourceCreateOrUpdateAsync<Employee>
  - type: file-matches
    config:
      path: main.tsp
      pattern: ArmListBySubscription<Employee>
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    prompt: 1
    file-matches: 3
  threshold: 1.0


