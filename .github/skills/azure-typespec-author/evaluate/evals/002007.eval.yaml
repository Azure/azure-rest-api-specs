name: azure-typespec-author-eval
description: Evaluation suite for azure-typespec-author.
version: "1.0"
type: capability               # capability | regression

# Root-level environment (merged into all stimuli)
environment:
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000

# Execution configuration
config:
  runs: 1                      # Trials per stimulus
  timeout: 1800                # Seconds per trial
  model: claude-opus-4.6-1m    #gpt-4o #claude-sonnet-4.6 # Model for agent execution
  executor: copilot-sdk        # Which executor to use

# Test cases
stimuli:
- prompt: |
    Add an additional POST action called "/notify" to the standard operations of Employee. Request body: message content (string) and priority (enum with values Low, Medium, High). Response body: notification identifier (string) and status (string). Ensure the definition meets TypeSpec Azure design guidelines.
  name: 002007-ARM-define-custom-action
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
      - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
        dest: employee.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
        dest: main.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/package.json
        dest: package.json
      - src: ../fixtures/Microsoft.Widget/Widget/readme.md
        dest: readme.md
      - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
        dest: shared.tsp
      - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
        dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azsdk_run_typespec_validation
  # VP1: Extensible enum for notification priority levels (Low, Medium, High)
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: union.*Priority|enum.*Priority
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'Low|"Low"'
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'Medium|"Medium"'
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'High|"High"'
  # VP2: Request model with message content (string) and priority fields
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: model.*Notify.*Request|model.*Notification.*Request
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'message.*:\s*string|content.*:\s*string'
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'priority.*:\s*.*Priority'
  # VP3: Response model with notification identifier (string) and status (string)
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: model.*Notify.*Response|model.*Notification.*Response
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'notificationId.*:\s*string|identifier.*:\s*string'
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'status.*:\s*string'
  # VP4: Synchronous notify action on Employees interface
  - type: file-matches
    config:
      path: 'employee.tsp'
      pattern: 'notify is ArmResourceActionSync<|notify is ArmResourceActionAsync<|notify is ArmResourceAction<'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
scoring:
  weights:
    tool-calls: 1
    prompt: 1
    file-matches: 11
  threshold: 1.0
