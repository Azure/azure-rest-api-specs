    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: employee.tsp
      pattern: Lifecycle\.Read, Lifecycle\.Create
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
  scoring:
    weights:
      tool-calls: 1
      prompt: 1
      file-matches: 2
    threshold: 1.0

