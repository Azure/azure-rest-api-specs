name: azure-typespec-author-eval
description: Combined evaluation suite for azure-typespec-author (all 30 cases).
version: "1.0"
type: capability

# Root-level environment (merged into all stimuli)
environment:
  files:
    - src: ../start-mcp.ps1
      dest: start-mcp.ps1
  mcpServers:
    azure-sdk-mcp:
      type: stdio
      command: pwsh
      args: ["./start-mcp.ps1"]
      timeout: 60000

# Execution configuration
config:
  runs: 1
  timeout: 1800
  model: claude-opus-4.6-1m
  executor: copilot-sdk

# Test cases
stimuli:
- name: 001001-version-spread-property
  prompt: I added `...Azure.ResourceManager.ManagedServiceIdentityProperty;` which updates all my existing API versions and introduces a breaking change. I want to introduce the properties of the spread model '...ManagedServiceIdentityProperty' in a new API version 2025-05-04-preview only.
  environment:
    files:
    - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: main.tsp
      pattern: 2025-05-04-preview
  - type: file-matches
    config:
      path: employee.tsp
      pattern: "\\.\\.\\.ManagedServiceIdentityProperty;"
  - type: file-matches
    config:
      path: employee.tsp
      pattern: "@@added\\(Employee\\.identity, Versions\\.(v2025_05_04_preview|`2025-05-04-preview`)\\);"
  - type: prompt
    config:
      prompt: Verify changes are scoped to this task only, with no unrelated edits beyond introducing preview-only identity via versioning.
      model: claude-opus-4.6-1m
      scoring: scale_1_5
      threshold: 1.0
  constraints:
    max_turns: 10
    max_tokens: 50000
  scoring:
    weights:
      tool-calls: 1
      file-matches: 3
      prompt: 1
    threshold: 1.0

- prompt: |
    add a default value `21` for property age in model EmployeeProperties from a new api version 2025-11-01
  name: 001002-version-default-value
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/Microsoft.Widget/Widget/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
      dest: readme.md
    - src: ../fixtures/Microsoft.Widget/Widget/shared.tsp
      dest: shared.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/tspconfig.yaml
      dest: tspconfig.yaml
  graders:
  - type: tool-calls
    config:
      required:
        - edit
        - azure-sdk-mcp-azsdk_run_typespec_validation
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@removed\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@renamedFrom\(Versions\.v2025_11_01, "age"\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: '@added\(Versions\.v2025_11_01\)'
  - type: file-matches
    config:
      path: employee.tsp
      pattern: 'age\?: int32 = 21;'
  - type: prompt
    config:
      scoring: scale_1_5
      threshold: 1.0
      prompt: 'Verify change scope and quality only: no unrelated edits, and the implemented result is semantically consistent with the task intent.'
      model: claude-opus-4.6-1m
  scoring:
    weights:
      tool-calls: 1
      prompt: 1
      file-matches: 4
    threshold: 1.0

- prompt: |
    change the property age of EmployeeProperties from required to optional for new api version 2025-05-04-preview
  name: 001003-version-required-to-optional
  constraints:
    max_turns: 10
    max_tokens: 5000
  environment:
    files:
    - src: ../fixtures/001003-version-required-to-optional/employee.tsp
      dest: employee.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/main.tsp
      dest: main.tsp
    - src: ../fixtures/Microsoft.Widget/Widget/package.json
      dest: package.json
    - src: ../fixtures/Microsoft.Widget/Widget/readme.md
