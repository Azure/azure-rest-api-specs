id: workflow-edge-001
name: Resume Workflow - Existing Release Plan
description: |
  Test that the skill detects an existing release plan and resumes
  the workflow from the correct step.
tags:
  - edge-case
  - resume
inputs:
  prompt: "I have release plan 12345 and my API spec PR is already merged in azure-rest-api-specs. Help me generate the SDKs and complete the release."
expected:
  output_contains:
    - "release plan"
    - "SDK"
    - "generate"
  output_excludes:
    - "create a new TypeSpec project"
  behavior:
    max_tool_calls: 15
    max_response_time_ms: 60000
