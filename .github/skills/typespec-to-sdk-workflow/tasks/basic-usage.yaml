id: workflow-basic-001
name: Full Release Workflow - New Service
description: |
  Test that the skill orchestrates the full end-to-end workflow
  for a new Azure service from TypeSpec to SDK release.
tags:
  - basic
  - happy-path
  - full-workflow
inputs:
  prompt: "I need to create a new TypeSpec project for my Azure service and release SDKs for all supported languages. It's a management plane service."
expected:
  output_contains:
    - "TypeSpec"
    - "SDK"
    - "release"
  behavior:
    max_tool_calls: 20
    max_response_time_ms: 120000
