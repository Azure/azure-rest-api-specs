id: custom-multi-001
name: Split Into Multiple Clients
description: |
  Test that the skill helps split operations into multiple SDK clients.
tags:
  - basic
  - client-structure
inputs:
  prompt: "My service has admin operations and user operations. I want to split them into separate AdminClient and UserClient in the generated SDKs."
expected:
  output_contains:
    - "@client"
    - "interface"
  behavior:
    max_tool_calls: 3
    max_response_time_ms: 15000
