id: custom-negative-001
name: Should Not Trigger - API Definition Change
description: |
  Test that the skill does NOT activate when user wants to change the actual API
  definition rather than SDK customization.
tags:
  - negative-test
  - anti-trigger
inputs:
  prompt: "I need to add a new GET operation to my Azure service API that lists all virtual machines in a resource group."
expected:
  output_not_contains:
    - "client.tsp"
    - "@clientName"
    - "ClientGenerator.Core"
