id: custom-edge-001
name: Language-Specific Customization
description: |
  Test that the skill handles language-specific customizations correctly
  using scope parameters.
tags:
  - edge-case
  - language-specific
inputs:
  prompt: "I need to rename an operation to 'get_items' only for Python but keep the original name for all other languages."
expected:
  output_contains:
    - "python"
    - "scope"
    - "clientName"
  behavior:
    max_tool_calls: 3
    max_response_time_ms: 15000
