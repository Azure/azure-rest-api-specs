id: authoring-edge-001
name: TypeSpec Compilation Failure Recovery
description: |
  Test that the skill handles TypeSpec compilation errors gracefully
  and provides actionable guidance to fix them.
tags:
  - edge-case
  - error-handling
inputs:
  prompt: "I ran tsp compile on my TypeSpec project and got this error: 'referencing types from versioned namespace Azure.Core.Foundations but didn't specify which versions with @useDependency'. How do I fix this?"
expected:
  output_contains:
    - "@useDependency"
    - "Versions"
  output_excludes:
    - "cannot help"
  behavior:
    max_tool_calls: 3
    max_response_time_ms: 15000
