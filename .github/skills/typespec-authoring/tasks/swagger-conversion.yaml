id: authoring-convert-001
name: Convert Swagger to TypeSpec
description: |
  Test that the skill guides swagger-to-TypeSpec conversion
  including the migration checklist steps.
tags:
  - basic
  - conversion
inputs:
  prompt: "I have an existing swagger specification for my Azure service and I want to convert it to TypeSpec. The readme is at specification/myservice/resource-manager/readme.md"
expected:
  output_contains:
    - "tsp-client convert"
    - "npm ci"
    - "migration"
  behavior:
    max_tool_calls: 5
    max_response_time_ms: 30000
