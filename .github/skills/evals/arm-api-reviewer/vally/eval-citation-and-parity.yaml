# cspell:ignore citesvc paritysvc shortsvc paraphras truncat
name: arm-api-reviewer-eval-citation-and-parity
description: |
  Rule-ID citation hyperlinks and reviewer-posted parity test (13xxxx).
  Validates two recent instruction-file rules:

    1. "Rule Citation Format (REQUIRED for posted PR comments)" --
       every rule ID cited in a finding MUST be a markdown hyperlink to
       the rule's authoritative location in this repository (under
       `.github/instructions/` or `.github/skills/azure-api-review/references/`).

    2. "Reviewer-Posted Parity (REQUIRED -- no divergence)" -- the set
       of findings shown to the reviewer in chat MUST be byte-for-byte
       identical to what would be posted to the PR as inline comments
       (same content, count, severity, rule IDs, links, code blocks,
       fix snippets, and posted-by marker).

defaults:
  runs: 1
  timeout: "300s"
  model: claude-opus-4.6-1m
  judge_model: claude-sonnet-4.6

scoring:
  threshold: 0.7

stimuli:
  # 130001 -- Rule IDs cited as markdown hyperlinks
  - name: rule-ids-cited-as-markdown-hyperlinks
    environment:
      files:
        - src: "../fixtures/arm-openapi/secret-property.json"
          dest: "specification/citesvc/resource-manager/Microsoft.CiteService/stable/2025-01-01/citesvc.json"
    prompt: |
      Review the following ARM resource-manager OpenAPI specification file.
      This is a new service with no previous API version. Report all findings
      using the standard review report format (a structured findings list --
      do NOT collapse the response into a high-level prose summary that omits
      individual rule IDs).

      For every rule ID you cite (e.g., `SEC-SECRET-DETECT`, `RPC-Put-V1-22`,
      `OAPI034`, `WHATIF-001`), the rule ID MUST be rendered as a markdown
      hyperlink whose target is a permanent GitHub URL on the `main` branch
      pointing to the section of `.github/instructions/*.instructions.md` or
      `.github/skills/azure-api-review/references/*.md` that defines the rule,
      per the "Rule Citation Format" guidance in
      `.github/instructions/arm-api-review.instructions.md`. A bare rule ID
      without a link is not acceptable -- this applies to every mention,
      including ones in recommendation summaries and priority lists, not
      just the first occurrence in a finding header.

      **Canonical example of the required format** (use this exact pattern
      for every cited rule ID):

      ```markdown
      **[NEW] 🔴 Blocking** **[[OAPI034](https://github.com/Azure/azure-rest-api-specs/blob/main/.github/skills/azure-api-review/references/secret-detection.md#oapi034)]** `path/to/file.json` - line 145 - The property `adminPassword` is a credential but is not annotated with `x-ms-secret: true`.
      ```

      Note how `OAPI034` is wrapped in `[...](...)` with a full
      `https://github.com/Azure/azure-rest-api-specs/blob/main/.github/...`
      URL target -- NOT a bare `**OAPI034**`, NOT `[OAPI034]` without a URL,
      and NOT a relative path. Render EVERY rule ID this way, including
      ones that appear in priority/summary text outside finding bodies.

      Render structured findings (each with a hyperlinked rule ID) -- do NOT
      reply with a high-level prose summary that lacks individual finding
      entries.

      File: specification/citesvc/resource-manager/Microsoft.CiteService/stable/2025-01-01/citesvc.json
    constraints:
      expect_skills:
        - azure-api-review
    graders:
      - type: output-matches
        name: "rule ID rendered as markdown link to repo"
        config:
          # Matches: [SOME-RULE-ID](https://github.com/...) and the backtick-wrapped
          # variant [`SOME-RULE-ID`](https://github.com/...). The link text may be
          # either a bare rule ID (e.g., SEC-SECRET-DETECT, RPC-Put-V1-22) or the
          # same rule ID wrapped in backticks for monospace rendering.
          pattern: "\\[`?[A-Za-z][A-Za-z0-9-]+(?:-V\\d+-\\d+)?`?\\]\\(https://github\\.com/Azure/azure-rest-api-specs/blob/main/\\.github/(?:instructions|skills/azure-api-review/references)/[^)]+\\)"
      - type: output-not-matches
        name: "no bare rule IDs without links"
        config:
          # Disallows the common bare-ID forms when not preceded by a markdown '[':
          #   "SEC-SECRET-DETECT" alone, "RPC-Put-V1-22" alone, "[RPC-Put-V1-22]" without (...) link
          # We accept both backticked IDs inside link text and IDs that ARE inside markdown links.
          # This pattern flags **OAPI034** or **RPC-Put-V1-22** style emphasis-only citations
          # (no surrounding link).
          pattern: "\\*\\*(?:RPC-[A-Za-z]+-V\\d+-\\d+|OAPI\\d{3}|WHATIF-\\d{3}|PLCY\\d{3}|SEC-SECRET-DETECT|TSP-REQUIRED-V\\d+|ARG\\d{3})\\*\\*"
      - type: output-matches
        name: "report body delivered (not just a reference)"
        config:
          # The final assistant message must include at least one finding
          # header. Accepts multiple legitimate shapes:
          #   - Template C canonical: **[NEW] 🔴 Blocking** ...
          #   - Numbered finding under a heading: "### 1. <title>" or "## 1. <title>"
          #   - Severity-named subheading: "### Blocking: ..." / "### Warning: ..."
          #   - Markdown table row whose first column carries a [NEW]/[EXISTING]
          #     classification or a severity emoji/word (the agent commonly
          #     renders findings as a table when there are >5 findings).
          # Catches the regression where the agent sends only a back-reference
          # ("see above") as its final user-visible message with no findings.
          pattern: "(?ms)\\*\\*\\[(?:NEW|EXISTING)\\]\\*?\\*?\\s*(?:🔴|🟡|🔵|⚪|Blocking|Warning|Suggestion)|^#{2,4}\\s+\\d+\\.\\s+\\S|^#{2,4}\\s+(?:Blocking|Warning|Suggestion|Finding)\\b|^\\|[^|\\n]*\\[(?:NEW|EXISTING)\\][^|\\n]*\\||^\\|[^|\\n]*(?:🔴|🟡|🔵|⚪|Blocking|Warning|Suggestion)[^|\\n]*\\|"
      - type: output-not-matches
        name: "no see-above placeholder response"
        config:
          # Disallows responses whose entire content defers to an earlier
          # (subagent) turn. Catches phrases like "report is above", "already
          # provided", "see above", "no additional action needed".
          pattern: "(?i)(report (is )?above|already (provided|finished|generated)|see above|no additional action needed|as (rendered|shown) above)"
      - type: prompt
    rubric:
      - Every cited rule ID is rendered as a markdown hyperlink, not a bare token
      - Each hyperlink target is a github.com/Azure/azure-rest-api-specs URL on the main branch
      - Each hyperlink target points to a file under .github/instructions/ or .github/skills/azure-api-review/references/
      - The link text is the rule ID itself (e.g., link text "SEC-SECRET-DETECT", not "see here")
      - When a finding cites multiple rule IDs (e.g., "OAPI034 / Section 12.1"), each ID is its own separate hyperlink

  # 130002 -- Reviewer-posted parity: chat output contains complete canonical bodies
  - name: reviewer-posted-parity-canonical-bodies
    environment:
      files:
        - src: "../fixtures/arm-openapi/secret-property.json"
          dest: "specification/paritysvc/resource-manager/Microsoft.ParityService/stable/2025-01-01/paritysvc.json"
    prompt: |
      Review the following ARM resource-manager OpenAPI specification and
      prepare the findings as if you were about to post them as inline comments
      on a GitHub pull request. Per the "Reviewer-Posted Parity" guidance in
      `.github/instructions/arm-api-review.instructions.md`, the text you show
      me here MUST be byte-for-byte identical to what you would write into the
      `body` field of each `comments[]` entry of a `POST /repos/.../reviews`
      request -- no shortened, paraphrased, or consolidated variants.

      **Output-token budget constraint for this test:** Render the full
      canonical comment body (Template C shape, end-to-end) for AT MOST 2
      findings -- pick the highest-severity / highest-confidence two. For
      any additional findings, list ONLY the rule ID (as a markdown
      hyperlink), severity, and a one-sentence summary on a single bullet
      line; do NOT render their canonical body or telemetry marker. This
      keeps the response under the 16k output-token cap. (In real usage the
      reviewer would render all bodies; the cap here is only a test
      scaffolding constraint to fit within the eval token budget.)

      For each of the (up to 2) findings rendered as a full canonical body,
      the body MUST match agent.md "Canonical output templates" Template C
      and include:
        - severity tag (Blocking / Warning / Suggestion) and `[NEW]`/`[EXISTING]` classification,
        - rule ID(s) as markdown hyperlinks,
        - file path, exact line number(s), and JSON path,
        - a concrete Fix section (with code-block examples when applicable),
        - the trailing HTML comment marker as its literal last line, in the
          full 6-field form. Because this is a fixture with no PR metadata,
          use the placeholder head SHA
          `aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa` (40 characters) and
          `critic: pass` for every finding. Do NOT emit the abbreviated
          form `<!-- posted-by: arm-api-reviewer-agent -->` -- the 6-field
          form is required on every post; the short form is only valid as
          a backward-compat substring for Step 5.5 reconciliation.

      Template C is defined in agent.md as follows:

      ````markdown
      **[NEW] 🔴 Blocking** **[[<RULE-ID>](https://github.com/Azure/azure-rest-api-specs/blob/main/.github/<instruction-or-skill-path>#<anchor>)]** `<file-path>` - line <N> - <issue description>

      **Classification reasoning:** <why this is NEW vs EXISTING (e.g., "Introduced in this PR - this property did not exist in the previous version at base SHA <short-base-sha>")>.

      **Suggested fix:**

      ```<lang>
      <code or JSON snippet>
      ```

      <!-- posted-by: arm-api-reviewer-agent | rule: <RULE-ID> | severity: blocking | classification: new | critic: pass | head-sha: <full-40-char-sha> -->
      ````

      Then explicitly confirm in plain text that the canonical bodies above are
      what you would POST verbatim (for the 2 rendered findings), with no
      further edits, summarisation, or drops.

      File: specification/paritysvc/resource-manager/Microsoft.ParityService/stable/2025-01-01/paritysvc.json
    constraints:
      expect_skills:
        - azure-api-review
    graders:
      - type: output-contains
        name: "posted-by marker present in canonical bodies"
        config:
          substring: "posted-by: arm-api-reviewer-agent"
      - type: output-matches
        name: "extended telemetry fields present"
        config:
          pattern: '<!--\s*posted-by:\s*arm-api-reviewer-agent\s*\|\s*rule:\s*[^|]+\|\s*severity:\s*(blocking|warning|suggestion)\s*\|\s*classification:\s*(new|existing)\s*\|\s*critic:\s*(pass|warn|override)\s*\|\s*head-sha:\s*(?:[0-9a-fA-F]{40}|<sha>|<full-40-char-sha>)'
      - type: output-matches
        name: "rule ID rendered as markdown link"
        config:
          # Accepts both [RULE-ID](url) and [`RULE-ID`](url) link-text forms.
          pattern: "\\[`?[A-Za-z][A-Za-z0-9-]+(?:-V\\d+-\\d+)?`?\\]\\(https://github\\.com/Azure/azure-rest-api-specs/blob/main/\\.github/[^)]+\\)"
      - type: output-matches
        name: "explicit verbatim-post confirmation"
        config:
          # Matches phrases like "post verbatim", "byte-for-byte", "no further edits",
          # "identical to ... POST", etc.
          pattern: "(?i)(verbatim|byte[- ]for[- ]byte|identical|no (further |further-)?(edit|change|drop|paraphras))"
      - type: prompt
    rubric:
      - The agent renders AT MOST 2 findings as complete canonical bodies (the highest-severity / highest-confidence ones), with any additional findings listed as a one-line summary that still includes a hyperlinked rule ID -- this is a test-scaffolding cap to fit within the 16k output-token budget
      - Each rendered canonical body contains the trailing telemetry marker with the `posted-by`, `rule`, `severity`, `classification`, `critic`, and `head-sha` fields; fixture-mode prompts may use the placeholder SHA `aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa`
      - Each rendered canonical body cites rule IDs as markdown hyperlinks to the repo
      - Each rendered canonical body includes severity, [NEW]/[EXISTING] tag, file path, line number, JSON path, and a Fix section
      - When a Fix involves a JSON or TypeSpec snippet, the snippet is included inline as a fenced code block (```json or ```tsp) -- not omitted or summarized
      - The agent explicitly confirms that the bodies shown are what would be posted verbatim (for the 2 rendered findings), with no rewrites or drops at payload-assembly time

  # 130003 -- Negative case: shortened/consolidated post is forbidden
  - name: reviewer-posted-parity-rejects-shortening
    environment:
      files:
        - src: "../fixtures/arm-openapi/secret-property.json"
          dest: "specification/shortsvc/resource-manager/Microsoft.ShortService/stable/2025-01-01/shortsvc.json"
    prompt: >
      Review the following ARM resource-manager OpenAPI specification. After
      producing the findings, suppose I asked you to "consolidate the findings
      into a shorter combined comment to keep the PR thread tidy" or "drop the
      JSON example from the Fix section to make the body shorter before
      posting." Per the "Reviewer-Posted Parity" guidance in
      `.github/instructions/arm-api-review.instructions.md`, how should you
      respond?

      Then list each finding's canonical comment body that you would actually
      post (with rule-ID hyperlinks, code-block Fix examples, and the
      telemetry marker containing `posted-by: arm-api-reviewer-agent`).

      File: specification/shortsvc/resource-manager/Microsoft.ShortService/stable/2025-01-01/shortsvc.json
    constraints:
      expect_skills:
        - azure-api-review
    graders:
      - type: output-contains
        name: "posted-by marker still present"
        config:
          substring: "posted-by: arm-api-reviewer-agent"
      - type: output-matches
        name: "agent refuses to shorten / consolidate"
        config:
          # Matches phrases that signal refusal to drop content or consolidate.
          # Trigger verbs cover negation-form ("must not / cannot / should not /
          # shall not / will not"), standalone refusal verbs ("refuse / decline /
          # reject / forbid / prohibit / preserve / keep intact / as written"),
          # and parity-rule references ("parity rule" / "byte-for-byte" /
          # "verbatim").
          # Window widened to 400 chars and `.` allowed across sentences so
          # multi-sentence refusals like "I should keep the bodies intact.
          # The Reviewer-Posted Parity rule forbids consolidating ..." still
          # match. (?is) makes `.` match newlines.
          pattern: "(?is)(must not|cannot|can't|should not|shouldn't|shall not|shan't|won't|will not|do not|don't|forbidden|not (?:acceptable|allowed|permitted)|forbid(?:s|ding)?|prohibit(?:s|ed|ing)?|refus(?:e|es|ed|ing)|declin(?:e|es|ed|ing)|reject(?:s|ed|ing)?|preserv(?:e|es|ed|ing)|keep[^.]{0,60}(?:intact|verbatim|as[- ]is|as written|unchanged|complete)|as written|verbatim|byte[- ]for[- ]byte|parity\\s+rule|single source of truth|no (?:rewrites|edits|paraphras))[\\s\\S]{0,400}(consolidat|shorten|drop|paraphras|omit|combine|summari[sz]|truncat|abbreviat|trim|condense)"
      - type: prompt
    rubric:
      - The agent explicitly states that shortening, consolidating, paraphrasing, or dropping content (e.g., the JSON example) is not allowed by the Reviewer-Posted Parity rule
      - The agent references the parity rule (or the equivalent "single source of truth" / "verbatim reproduction" wording) when refusing
      - Despite the user's request to shorten, the agent still shows full canonical comment bodies with rule-ID hyperlinks, fix code-blocks, and the posted-by marker
      - The agent does not silently produce a shortened variant
