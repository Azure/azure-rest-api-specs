# cspell:ignore fastsvc fpsvc descsvc
name: arm-api-reviewer-eval-fast-path-triage
description: |
  Fast-path vs full-review track-selection tests (15xxxx).
  Validates Step 1 of the agent workflow: trivial PRs (examples only,
  description-only edits) elect the fast path and skip breaking-change
  analysis (Step 3) and cross-file consistency (Step 5), while PRs that
  touch schema content perform the full review with version comparison.
  The critic gate (Step 7) is never skipped regardless of track.

defaults:
  runs: 1
  timeout: "240s"
  model: claude-sonnet-4.6
  judge_model: claude-sonnet-4.6

scoring:
  threshold: 0.7

stimuli:
  # 150001 — Examples-only PR elects fast path
  - name: examples-only-pr-elects-fast-path
    environment:
      files:
        - src: "../fixtures/examples/example-clean.json"
          dest: "specification/fastsvc/resource-manager/Microsoft.FastService/stable/2025-01-01/examples/Widgets_Get.json"
    prompt: >
      Review the following PR. The PR adds a single new example file under an
      existing API version directory; NO `.json` swagger files, `.tsp` files,
      `readme.md`, `tspconfig.yaml`, or `suppressions.yaml` files are modified
      by this PR. The total diff is under 50 lines.

      Per Step 1 of `.github/agents/arm-api-reviewer.agent.md` ("Choose review
      depth"), this PR qualifies for the fast-path track. Conduct the review
      accordingly. State explicitly which track you elected and which steps you
      ran or skipped. Apply Step 4's example-file checks (section 22 / EX-* of
      the OpenAPI rules) and report findings.

      At the end of your response, include this exact machine-readable decision
      block with one value per line:
      Decision-Track: FAST_PATH
      Decision-Step3: SKIPPED
      Decision-Step5: SKIPPED
      Decision-CriticGate: REQUIRED

      Changed file: specification/fastsvc/resource-manager/Microsoft.FastService/stable/2025-01-01/examples/Widgets_Get.json
    constraints:
      expect_skills:
        - azure-api-review
    graders:
      - type: output-matches
        name: "fast path elected"
        config:
          pattern: "(?im)^Decision-Track:\\s*FAST_PATH\\s*$"
      - type: output-matches
        name: "breaking-change comparison explicitly skipped or omitted"
        config:
          pattern: "(?im)^Decision-Step3:\\s*SKIPPED\\s*$"
      - type: output-matches
        name: "cross-file consistency explicitly skipped"
        config:
          pattern: "(?im)^Decision-Step5:\\s*SKIPPED\\s*$"
      - type: output-matches
        name: "critic gate still required"
        config:
          pattern: "(?im)^Decision-CriticGate:\\s*REQUIRED\\s*$"
      - type: prompt
    rubric:
      - The agent explicitly elects the fast-path track in its output (e.g., "fast path", "trivial review track")
      - The agent does NOT perform breaking-change comparison against a previous version (Step 3 is skipped)
      - The agent does NOT perform cross-file consistency analysis (Step 5 is skipped)
      - The agent still applies example-file validation rules to the changed example
      - The agent does NOT claim to have run the critic — but it also does not assert it skipped the critic; the critic gate applies to every PR

  # 150002 — Schema change forces full review (no fast path)
  - name: schema-change-forces-full-review
    environment:
      files:
        - src: "../fixtures/arm-openapi/secret-property.json"
          dest: "specification/fpsvc/resource-manager/Microsoft.FpService/stable/2025-01-01/fpsvc.json"
    prompt: >
      Review the following PR. The PR adds a new property of type `string`
      named `apiKey` to the `WidgetProperties` model in an existing ARM
      specification. The change touches schema content under `definitions:`.

      Per Step 1 of `.github/agents/arm-api-reviewer.agent.md`, schema changes
      do NOT qualify for the fast path. Conduct the full review. State which
      track you elected.

      At the end of your response, include this exact machine-readable decision
      block with one value per line:
      Decision-Track: FULL_REVIEW
      Decision-Step3: PERFORMED
      Decision-CriticGate: REQUIRED

      Changed file: specification/fpsvc/resource-manager/Microsoft.FpService/stable/2025-01-01/fpsvc.json
    constraints:
      expect_skills:
        - azure-api-review
    graders:
      - type: output-not-matches
        name: "fast path NOT elected"
        config:
          pattern: "(?im)^Decision-Track:\\s*FAST_PATH\\s*$"
      - type: output-matches
        name: "full review performed"
        config:
          pattern: "(?im)^Decision-Track:\\s*FULL_REVIEW\\s*$"
      - type: output-matches
        name: "step 3 explicitly performed"
        config:
          pattern: "(?im)^Decision-Step3:\\s*PERFORMED\\s*$"
      - type: output-matches
        name: "critic gate required"
        config:
          pattern: "(?im)^Decision-CriticGate:\\s*REQUIRED\\s*$"
      - type: output-matches
        name: "secret detection still triggered"
        config:
          pattern: "(?i)SEC-SECRET-DETECT|secret|apiKey"
      - type: prompt
    rubric:
      - The agent does NOT elect the fast path for this PR (schema change disqualifies)
      - The agent performs the full review including breaking-change comparison guidance (Step 3) even if no previous version exists for this fictional service
      - The agent still detects the `apiKey` secret property (SEC-SECRET-DETECT) — fast-path classification does not affect rule application

  # 150003 — Uncertain qualification defaults to full review
  - name: uncertain-qualification-defaults-to-full-review
    environment:
      files:
        - src: "../fixtures/arm-openapi/missing-descriptions.json"
          dest: "specification/descsvc/resource-manager/Microsoft.DescService/stable/2025-01-01/descsvc.json"
    prompt: >
      Review the following PR. The diff is small (under 50 lines) and you
      cannot tell from the diff alone whether the change is description-only
      or whether it also touches a property type. The file is a full swagger
      spec under an existing API version directory.

      Per Step 1 of `.github/agents/arm-api-reviewer.agent.md`, when you are
      uncertain whether a change qualifies for the fast path, you MUST default
      to full review. State which track you elected and your reasoning.

      At the end of your response, include this exact machine-readable decision
      block with one value per line:
      Decision-Track: FULL_REVIEW
      Decision-CriticGate: REQUIRED

      Changed file: specification/descsvc/resource-manager/Microsoft.DescService/stable/2025-01-01/descsvc.json
    constraints:
      expect_skills:
        - azure-api-review
    graders:
      - type: output-not-matches
        name: "fast path NOT elected"
        config:
          pattern: "(?im)^Decision-Track:\\s*FAST_PATH\\s*$"
      - type: output-matches
        name: "full review elected"
        config:
          pattern: "(?im)^Decision-Track:\\s*FULL_REVIEW\\s*$"
      - type: output-matches
        name: "critic gate required"
        config:
          pattern: "(?im)^Decision-CriticGate:\\s*REQUIRED\\s*$"
      - type: output-matches
        name: "defaulted to full review"
        config:
          pattern: "(?i)full[- ]review|defaulted|uncertain|safer|conservative"
      - type: output-matches
        name: "reasoning for full-review default given"
        config:
          # Requires the agent to state WHY it defaulted (the rubric criterion
          # that previously depended on the LLM judge). Accepts any phrasing
          # that pairs an uncertainty/ambiguity cue with a full-review/default
          # cue within ~200 chars.
          pattern: "(?is)(uncertain|cannot (tell|confirm|determine|verify)|not (sure|clear|certain)|ambiguous|unclear).{0,200}(full[- ]review|default(ed|ing)?|safer|conservative)|(full[- ]review|default(ed|ing)?|safer|conservative).{0,200}(uncertain|cannot (tell|confirm|determine|verify)|not (sure|clear|certain)|ambiguous|unclear)"
      - type: output-contains
        name: "rules still applied (missing-description finding produced)"
        config:
          substring: "description"
