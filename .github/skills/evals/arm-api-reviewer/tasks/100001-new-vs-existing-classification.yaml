id: 100001-new-vs-existing-classification
name: "Classification: Correctly tag NEW vs EXISTING issues"
description: |
  Two versions of a spec where "bar" has a missing description in both versions
  (existing issue) and "baz" is newly added without a description (new issue).
  The reviewer must classify them correctly.
tags:
  - classification
  - new-vs-existing
inputs:
  prompt: |
    Review the following ARM resource-manager OpenAPI specification. The new version
    is stable/2025-01-01 and the previous version is stable/2024-01-01.

    For each issue found, classify it as [NEW] (introduced in this version) or
    [EXISTING] (also present in the previous version). Always verify against
    the previous version before classifying.

    Report all findings with rule IDs, line numbers, [NEW]/[EXISTING] tags,
    and fix suggestions.
  files:
    - path: version-pairs/new-vs-existing/stable-2024-01-01.json
    - path: version-pairs/new-vs-existing/stable-2025-01-01.json
expected:
  output_contains:
    - "[NEW]"
    - "[EXISTING]"
    - "bar"
    - "baz"
graders:
  - type: prompt
    name: classification_check
    config:
      prompt: |
        Review the agent's output and verify it correctly classified issues.
        The specs have these violations:

        1. "bar" property has no description in BOTH versions (2024-01-01 and 2025-01-01).
           This should be tagged [EXISTING] because the same violation exists in the
           previous version.

        2. "baz" property is newly added in 2025-01-01 and has no description.
           This should be tagged [NEW] because baz did not exist in the previous version.

        Verify:
        - The missing description on "bar" is tagged [EXISTING]
        - The missing description on "baz" is tagged [NEW]

        If the agent correctly classified at least one issue as [EXISTING] and at least
        one as [NEW] with correct reasoning, call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details on the misclassification.
      continue_session: true
