id: 040001-breaking-removed-property
name: "Breaking: Detect removed property between versions"
description: |
  The 2025-01-01 version removes the category and priority properties
  that existed in 2024-01-01. The reviewer must flag these as breaking changes.
tags:
  - breaking-change
  - version-comparison
inputs:
  prompt: |
    Review the following ARM resource-manager OpenAPI specification files. The new version
    is stable/2025-01-01 and the previous version is stable/2024-01-01.
    Compare the two versions for breaking changes and report all findings with
    rule IDs, line numbers, and fix suggestions.

    Previous version (stable/2024-01-01):
  files:
    - path: version-pairs/removed-property/stable-2024-01-01.json
    - path: version-pairs/removed-property/stable-2025-01-01.json
expected:
  output_contains:
    - "breaking"
    - "category"
    - "priority"
    - "removed"
graders:
  - type: prompt
    name: breaking_property_check
    config:
      prompt: |
        Review the agent's output and verify it detected the breaking changes.
        Between stable-2024-01-01 and stable-2025-01-01:
        1. The "category" property was removed from WidgetProperties
        2. The "priority" property was removed from WidgetProperties

        Both are breaking changes (per ARG003 - properties must not be removed between versions).
        The agent should have flagged both removals as breaking changes.

        If the agent identified at least one removed property as a breaking change,
        call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
