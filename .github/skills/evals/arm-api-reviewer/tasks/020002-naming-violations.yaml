id: 020002-naming-violations
name: "Property: Detect naming convention violations"
description: |
  A spec has properties with incorrect casing: PascalCase (DisplayName), uppercase
  acronyms (IPAddress), underscores (HTTP_Endpoint), and snake_case (resource_group_id).
  The reviewer must flag all naming violations.
tags:
  - naming
  - conventions
  - property-design
inputs:
  prompt: "{{.Vars.review_arm_new_service}}"
  files:
    - path: arm-openapi/naming-violations.json
expected:
  output_contains:
    - "DisplayName"
    - "camelCase"
graders:
  - type: prompt
    name: naming_check
    config:
      prompt: |
        Review the agent's output and verify it flagged naming convention violations.
        The spec has these incorrectly named properties in WidgetProperties:
        1. "DisplayName" - should be "displayName" (PascalCase instead of camelCase)
        2. "IPAddress" - should be "ipAddress" (uppercase acronym)
        3. "HTTP_Endpoint" - should be "httpEndpoint" (underscores not allowed)
        4. "resource_group_id" - should be "resourceGroupId" (snake_case not allowed)

        If the agent flagged at least 3 of the 4 naming violations and recommended
        camelCase alternatives, call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
