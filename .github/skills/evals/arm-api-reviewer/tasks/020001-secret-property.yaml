id: 020001-secret-property
name: "Property: Detect secret properties"
description: |
  A spec has connectionString, adminPassword, and primaryKey properties without
  x-ms-secret annotation. The reviewer must flag all three as potential secrets.
tags:
  - security
  - secrets
  - property-design
inputs:
  prompt: |
    Review the following ARM resource-manager OpenAPI specification file for compliance
    with Azure REST API Guidelines and ARM RPC rules. Pay special attention to secret
    detection. This is a new service with no previous API version.
    Report all findings with rule IDs, line numbers, and fix suggestions.
  files:
    - path: arm-openapi/secret-property.json
expected:
  output_contains:
    - "SEC-SECRET-DETECT"
    - "connectionString"
    - "x-ms-secret"
graders:
  - type: prompt
    name: secret_detection_check
    config:
      prompt: |
        Review the agent's output and verify it detected ALL of these secret properties:
        1. connectionString - a connection string for backend access
        2. adminPassword - an administrator password
        3. primaryKey - a primary access key

        For each, the agent should have:
        - Flagged it with SEC-SECRET-DETECT or equivalent
        - Recommended adding x-ms-secret: true
        - Noted that the property should not be returned in GET responses

        If the agent detected at least 2 of the 3 secret properties and provided
        appropriate fix suggestions, call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
