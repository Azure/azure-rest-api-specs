id: 020004-enum-violations
name: "Property: Detect enum violations"
description: |
  A spec has enums without x-ms-enum, with modelAsString: false,
  with empty string values, and without PascalCase values.
tags:
  - enums
  - extensions
inputs:
  prompt: "{{.Vars.review_arm_new_service}}"
  files:
    - path: arm-openapi/enum-violations.json
expected:
  output_contains:
    - "x-ms-enum"
    - "modelAsString"
graders:
  - type: prompt
    name: enum_check
    config:
      prompt: |
        Review the agent's output and verify it detected enum violations.
        The spec has these enum issues:
        1. "status" property has an enum with NO x-ms-enum decorator at all, and includes
           an empty string value ""
        2. "tier" property has x-ms-enum but with "modelAsString": false (should be true)
        3. "category" property has an enum but NO x-ms-enum decorator, and values are
           not PascalCase ("typeA", "typeB", "typeC")

        If the agent flagged at least 2 of these 3 enum issues and recommended
        adding x-ms-enum with modelAsString: true, call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
