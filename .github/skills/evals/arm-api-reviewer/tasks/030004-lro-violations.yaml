id: 030004-lro-violations
name: "Operations: Detect LRO pattern violations"
description: |
  An async PUT returns 202 (should return 200/201 with provisioningState),
  a sync DELETE returns a response body, and a POST action that should be
  async is missing x-ms-long-running-operation.
tags:
  - lro
  - async
  - operations
inputs:
  prompt: "{{.Vars.review_arm_new_service}}"
  files:
    - path: arm-openapi/lro-violations.json
expected:
  output_contains:
    - "202"
    - "RPC-Async"
graders:
  - type: prompt
    name: lro_check
    config:
      prompt: |
        Review the agent's output and verify it detected LRO violations.
        The spec has these issues:
        1. Widgets_CreateOrUpdate (PUT) is marked x-ms-long-running-operation: true
           but returns 202 instead of 200/201. Async PUT must return 201 (create) or
           200 (update) with provisioningState, never 202 (per RPC-Async-V1-01).
        2. Widgets_Delete returns a Widget body in the 200 response. DELETE
           should have empty response bodies (per RPC-Delete-V1-04).

        If the agent flagged the async PUT returning 202 as a violation,
        call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
