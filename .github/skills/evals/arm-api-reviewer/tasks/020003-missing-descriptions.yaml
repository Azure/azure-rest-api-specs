id: 020003-missing-descriptions
name: "Property: Detect missing descriptions"
description: |
  A spec has multiple properties, operations, and models without description fields.
  The reviewer must flag the missing descriptions.
tags:
  - descriptions
  - documentation
inputs:
  prompt: "{{.Vars.review_arm_new_service}}"
  files:
    - path: arm-openapi/missing-descriptions.json
expected:
  output_contains:
    - "description"
graders:
  - type: prompt
    name: description_check
    config:
      prompt: |
        Review the agent's output and verify it detected missing descriptions.
        The spec has these elements without descriptions:
        1. The PUT operation (Widgets_CreateOrUpdate) has no description
        2. The GET operation (Widgets_Get) has no description
        3. The Widget model has no description
        4. The WidgetProperties model has no description
        5. Multiple properties (displayName, category, priority, id, name, type,
           location, tags, properties) have no descriptions
        6. The widgetName path parameter has no description
        7. The body parameter has no description

        If the agent flagged missing descriptions on at least the operations and
        the major model definitions, call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
