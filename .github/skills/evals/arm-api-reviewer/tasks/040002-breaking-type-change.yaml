id: 040002-breaking-type-change
name: "Breaking: Detect property type change between versions"
description: |
  The maxRetries property changed from string to integer between versions.
  The reviewer must flag this as a breaking change.
tags:
  - breaking-change
  - version-comparison
inputs:
  prompt: |
    Review the following ARM resource-manager OpenAPI specification files. The new version
    is stable/2025-01-01 and the previous version is stable/2024-01-01.
    Compare the two versions for breaking changes and report all findings with
    rule IDs, line numbers, and fix suggestions.
  files:
    - path: version-pairs/type-change/stable-2024-01-01.json
    - path: version-pairs/type-change/stable-2025-01-01.json
expected:
  output_contains:
    - "breaking"
    - "maxRetries"
    - "type"
graders:
  - type: prompt
    name: breaking_type_check
    config:
      prompt: |
        Review the agent's output and verify it detected the breaking type change.
        Between stable-2024-01-01 and stable-2025-01-01:
        The "maxRetries" property changed from type "string" to type "integer".
        This is a breaking change.

        If the agent identified the type change as a breaking change,
        call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
