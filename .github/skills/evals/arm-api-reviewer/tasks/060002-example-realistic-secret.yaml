id: 060002-example-realistic-secret
name: "Example: Detect realistic secrets in examples"
description: |
  An example file contains realistic-looking passwords, connection strings,
  and Base64-encoded keys. The reviewer must flag these as violations.
tags:
  - examples
  - secrets
  - security
inputs:
  prompt: |
    Review the following example JSON file for compliance with Azure REST API
    example file guidelines. This example is for a PUT operation on an ARM
    resource. Report all findings with rule IDs and fix suggestions.
  files:
    - path: examples/example-realistic-secret.json
expected:
  output_contains:
    - "secret"
    - "password"
graders:
  - type: prompt
    name: example_secret_check
    config:
      prompt: |
        Review the agent's output and verify it detected realistic secrets in the example.
        The example contains:
        1. A realistic connection string with password in connectionString
        2. A realistic password "SuperSecretP@ssw0rd123!" in adminPassword
        3. A Base64-encoded string in primaryKey that looks like a real key

        The agent should have flagged these as EX-SECRET-PLACEHOLDER violations,
        recommending placeholder values instead.

        If the agent flagged at least one realistic secret value,
        call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
