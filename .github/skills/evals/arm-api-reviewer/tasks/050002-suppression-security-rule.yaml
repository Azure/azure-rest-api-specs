id: 050002-suppression-security-rule
name: "Suppression: Detect security rule suppressions"
description: |
  A readme.md suppresses security-related rules (secret-prop, write-only)
  with vague justifications. The reviewer must flag these as blocking.
tags:
  - suppression
  - security
  - readme
inputs:
  prompt: |
    Review the following readme.md suppression file for an ARM specification.
    This is a new API version with no previous readme.md to compare against.
    Check all suppressions for proper justification per Azure suppression guidelines.
    Pay special attention to suppressions of security-related rules.
  files:
    - path: readme/readme-security-suppression.md
expected:
  output_contains:
    - "security"
    - "secret"
graders:
  - type: prompt
    name: security_suppression_check
    config:
      prompt: |
        Review the agent's output and verify it flagged the security-related suppressions.
        The readme.md has:
        1. suppress: XmsSecretNotReadBack with reason "existing pattern" - vague reason
           for a security rule
        2. suppress: SecretPropertyMustBeWriteOnly with reason "will fix later" - vague
           reason for a security rule

        The agent should have flagged both as blocking because:
        - They suppress security-related rules
        - Their reasons are vague ("existing pattern", "will fix later")

        If the agent flagged at least one security suppression as problematic,
        call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with details.
      continue_session: true
