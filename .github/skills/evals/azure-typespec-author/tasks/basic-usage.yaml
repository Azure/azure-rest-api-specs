id: basic-usage-001
name: "Versioning: Add preview after stable"
description: |
  Test that the skill handles adding a new preview version after a stable version.
tags:
  - basic
  - happy-path
  - versioning
inputs:
  prompt: "add a new preview version `2025-05-04-preview` to my service widget resource manager. Carry over all the features from the latest stable version"
  files:
    - path: Microsoft.Widget/Widget/employee.tsp
    - path: Microsoft.Widget/Widget/main.tsp
    - path: Microsoft.Widget/Widget/readme.md
    - path: Microsoft.Widget/Widget/shared.tsp
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_CreateOrUpdate_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_Delete_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_Get_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_ListByResourceGroup_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_ListByResourceGroup_MinimumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_ListBySubscription_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_ListBySubscription_MinimumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Employees_Update_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Operations_List_MaximumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/examples/Operations_List_MinimumSet_Gen.json
    - path: Microsoft.Widget/Widget/stable/2021-11-01/widget.json
    - path: Microsoft.Widget/Widget/tspconfig.yaml
expected:
  output_contains:
    - "skill"
    - "azure-typespec-author"
    - "Task Type"
    - "API Version Evolution"
---
id: basic-usage-002
name: "Versioning: Add stable after stable"
description: |
  Test adding a new stable version with a new property when the last version was stable.
  Based on benchmark case 001008-version-add-stable-after-stable.
tags:
  - versioning
inputs:
  prompt: "Add a new stable version `2025-01-01` to my service. In this new version, I want to add a new property `department` of type `string` to `EmployeeProperties`."
  files:
    - path: Microsoft.Widget/Widget/employee.tsp
    - path: Microsoft.Widget/Widget/main.tsp
    - path: Microsoft.Widget/Widget/tspconfig.yaml
expected:
  output_contains:
    - "skill"
    - "azure-typespec-author"
    - "Task Type"
    - "API Version Evolution"
