id: 001008-version-add-stable-after-stable
name: "Versioning: Add stable after stable"
description: |
  Test adding a new stable version with a new property when the last version was stable.
  Based on benchmark case 001008-version-add-stable-after-stable.
tags:
  - versioning
inputs:
  prompt: "Add a new stable version `2025-01-01` to my service. Carry over changes."
  files:
    - path: 001008-version-add-stable-after-stable\employee.tsp
    - path: 001008-version-add-stable-after-stable\main.tsp
    - path: 001008-version-add-stable-after-stable\shared.tsp
    - path: 001008-version-add-stable-after-stable\tspconfig.yaml
    - path: 001008-version-add-stable-after-stable\package.json
    - path: 001008-version-add-stable-after-stable\readme.md
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_CreateOrUpdate_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_Delete_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_Get_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_ListByResourceGroup_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_ListByResourceGroup_MinimumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_ListBySubscription_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_ListBySubscription_MinimumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Employees_Update_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Operations_List_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2021-10-01\Operations_List_MinimumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_CreateOrUpdate_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_Delete_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_Get_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_ListByResourceGroup_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_ListByResourceGroup_MinimumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_ListBySubscription_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_ListBySubscription_MinimumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Employees_Update_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Operations_List_MaximumSet_Gen.json
    - path: 001008-version-add-stable-after-stable\examples\2024-10-01\Operations_List_MinimumSet_Gen.json
expected:
  output_contains:
    - "Task Type"
    - "API Version Evolution"
graders:
  # - type: diff
  #   name: version_enum_check
  #   config:
  #     expected_files:
  #       - path: "Microsoft.Widget/Widget/main.tsp"
  #         contains:
  #           - '+v2025-01-01: "2025-01-01"'
  # - type: action_sequence
  #   name: mcp_workflow
  #   config:
  #     matching_mode: in_order_match
  #     expected_actions:
  #       - edit
  #       - azsdk_run_typespec_validation
  # Deterministic checks: version added, old stable examples retained, new stable examples created
  - type: file
    name: file_structure_check
    config:
      must_exist:
        - "001008-version-add-stable-after-stable/examples/2024-10-01/Employees_Get_MaximumSet_Gen.json"
        - "001008-version-add-stable-after-stable/examples/2025-01-01/Employees_Get_MaximumSet_Gen.json"
      content_patterns:
        - path: "001008-version-add-stable-after-stable/main.tsp"
          must_match:
            - "2021-10-01"
            - "2024-10-01"
            - "2025-01-01"
  # LLM judge: verify employee.tsp changes are scoped and aligned to stable version promotion
  - type: prompt
    name: code_scope_check
    config:
      prompt: |
        Check the modified employee.tsp and verify:
        Changes are only related to introducing stable version `2025-01-01`
        and carrying over expected behavior, with no unintended modifications.

        If correct, call set_waza_grade_pass.
        Otherwise, call set_waza_grade_fail with your reasoning.
      model: "gpt-4o-mini"
      continue_session: true
