id: openai-typespec-update-basic-001
name: Update OpenAI TypeSpec Package Exactly
description: |
  Test that the skill recommends updating the OpenAI TypeSpec package
  with an exact install command instead of a version range.
tags:
  - basic
  - happy-path
inputs:
  prompt: "Update the OpenAI TypeSpec definitions we use in this repo."
expected:
  output_contains:
    - "@azure-tools/openai-typespec"
    - "npm i @azure-tools/openai-typespec --save-exact"
  behavior:
    max_tool_calls: 6
    max_response_time_ms: 30000
