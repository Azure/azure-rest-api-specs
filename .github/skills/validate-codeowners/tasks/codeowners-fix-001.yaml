id: codeowners-fix-001
name: Fix Invalid CODEOWNERS - Less Than 2 Valid
prompt: "CODEOWNERS validation shows only 1 valid owner for my service. How do I fix this?"
expected:
  - explains minimum 2 valid owner requirement
  - directs to access docs (https://aka.ms/azsdk/access)
  - offers to add new owners via azsdk_engsys_codeowner_update
  - suggests re-validation after fix
