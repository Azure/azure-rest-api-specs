id: readiness-release-001
name: Release SDK Package
description: |
  Test that the skill guides the user through the actual release process
  after confirming readiness.
tags:
  - basic
  - release
inputs:
  prompt: "My azure-mgmt-compute Python package passed all readiness checks. I want to release it now."
expected:
  output_contains:
    - "release"
    - "pipeline"
    - "approve"
  behavior:
    max_tool_calls: 3
    max_response_time_ms: 30000
