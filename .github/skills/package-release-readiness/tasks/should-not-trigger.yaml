id: readiness-negative-001
name: Should Not Trigger - SDK Generation Request
description: |
  Test that the skill does NOT activate when user wants to generate SDK
  rather than check release readiness.
tags:
  - negative-test
  - anti-trigger
inputs:
  prompt: "Generate the Python SDK from my TypeSpec project and build it locally."
expected:
  output_not_contains:
    - "azsdk_release_sdk"
    - "release readiness"
