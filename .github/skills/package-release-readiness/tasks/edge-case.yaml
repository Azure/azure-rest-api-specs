id: readiness-edge-001
name: Package Not Ready - Missing Changelog
description: |
  Test that the skill handles a package that is not ready for release
  and provides guidance to fix issues.
tags:
  - edge-case
  - error-handling
inputs:
  prompt: "I tried to release my JavaScript SDK package @azure/arm-compute but it says the changelog is missing. How do I fix this?"
expected:
  output_contains:
    - "changelog"
  output_excludes:
    - "cannot help"
  behavior:
    max_tool_calls: 5
    max_response_time_ms: 30000
