id: readiness-basic-001
name: Check Package Release Readiness
description: |
  Test that the skill checks release readiness for a specific package and language.
tags:
  - basic
  - happy-path
inputs:
  prompt: "Check if the azure-mgmt-compute Python package is ready for release."
expected:
  output_contains:
    - "Python"
    - "azure-mgmt-compute"
  outcomes:
    - type: tool_called
      tool_name: azsdk_release_sdk
  behavior:
    max_tool_calls: 3
    max_response_time_ms: 30000
