parameters:
  "service-dir":
    default: "sdk/monitor"
  "dependencies":
    default: ""

emit:
  - "@azure-tools/typespec-autorest"

options:
  "@azure-tools/typespec-autorest":
    emit-lro-options: "none"
    emitter-output-dir: "{project-root}"
    # omit the enum type Versions from being added to versioned swagger
    omit-unreachable-types: true
    output-file: "{version-status}/{version}/livemetrics.json"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-monitor-opentelemetry-exporter/azure/monitor/opentelemetry/exporter/_quickpulse/_generated"
    package-name: "azure-monitor-opentelemetry-exporter"
    namespace: "livemetrics"
    flavor: azure
    generate-packaging-files: false
  "@azure-typespec/http-client-csharp":
    package-name: "Azure.Monitor.OpenTelemetry.LiveMetrics"
    namespace: "{package-name}"
    model-namespace: true
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/livemetrics-rest"
    generate-metadata: true
    is-modular-library: false
    package-details:
      name: "@azure-rest/livemetrics"
      description: "LiveMetrics Service"
    flavor: azure
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-applicationinsights-livemetrics"
    namespace: "com.azure.applicationinsights.livemetrics"
    flavor: azure
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
