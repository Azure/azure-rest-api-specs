emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
options:
  "@azure-tools/typespec-autorest":
    arm-types-dir: "{project-root}/../../common-types/resource-management"
    azure-resource-provider-folder: "resource-manager"
    emitter-output-dir: "{project-root}/.."
    examples-dir: "{project-root}/examples"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/eventgrid.json"
    use-read-only-status-schema: "true"
  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/eventgrid
    emitter-output-dir: "{output-dir}/{service-dir}/armeventgrid"
    module: github.com/Azure/azure-sdk-for-go/{service-dir}/armeventgrid
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-eventgrid"
    namespace: azure.mgmt.eventgrid
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-java":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-eventgrid"
    namespace: com.azure.resourcemanager.eventgrid
    service-name: Event Grid
  "@azure-tools/typespec-ts":
    flavor: azure
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-eventgrid"
    package-details:
      name: "@azure/arm-eventgrid"
parameters:
  service-dir:
    default: sdk/eventgrid
