emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/sampleResources.json"
    examples-dir: "{project-root}/examples"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/placeholder
    emitter-output-dir: "{output-dir}/{service-dir}/armplaceholder"
    module: github.com/Azure/azure-sdk-for-go/{service-dir}/armplaceholder
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-placeholder"
    namespace: azure.mgmt.placeholder
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-ts":
    flavor: azure
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-placeholder"
    package-details:
      name: "@azure/arm-placeholder"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-placeholder"
    flavor: azure
    namespace: com.azure.resourcemanager.placeholder
    service-name: Place Holder
parameters:
  service-dir:
    default: sdk/placeholder
