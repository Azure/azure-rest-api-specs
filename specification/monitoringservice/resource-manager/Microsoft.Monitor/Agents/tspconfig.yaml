parameters:
  service-dir:
    default: "sdk/monitor"
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    output-file: "{version-status}/{version}/agents.json"
    new-line: lf
    omit-unreachable-types: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-monitoragents"
    namespace: "azure.mgmt.monitoragents"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-monitoragents"
    namespace: "com.azure.resourcemanager.monitoragents"
    service-name: "Monitor Agents"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-monitoragents"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-monitoragents"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/monitor"
    emitter-output-dir: "{output-dir}/{service-dir}/armmonitor"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armmonitor"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
