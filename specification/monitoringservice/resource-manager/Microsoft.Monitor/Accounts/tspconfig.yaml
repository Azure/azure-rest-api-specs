parameters:
  service-dir:
    default: "sdk/monitor"
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    azure-resource-provider-folder: "resource-manager"
    emitter-output-dir: "{project-root}"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    output-file: "{version-status}/{version}/azuremonitorworkspace.json"
    new-line: lf
    omit-unreachable-types: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-monitorworkspaces"
    namespace: "azure.mgmt.monitorworkspaces"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-monitor-workspaces"
    namespace: "com.azure.resourcemanager.monitor.workspaces"
    service-name: "Monitor Workspaces"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-monitorworkspaces"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-monitorworkspaces"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.Monitor.Workspaces"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/monitor"
    emitter-output-dir: "{output-dir}/{service-dir}/armmonitorworkspaces"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armmonitorworkspaces"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
