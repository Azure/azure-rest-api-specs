emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    output-file: "{version-status}/{version}/openapi.json"
    new-line: lf
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/monitor"
    emitter-output-dir: "{output-dir}/{service-dir}/armslissignalpreview"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armslissignalpreview"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-monitorslissignalpreview"
    package-dir: "azure-mgmt-monitorslissignalpreview"
    namespace: "azure.mgmt.monitorslissignalpreview"
    flavor: "azure"
    generate-test: true
    generate-sample: true
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-monitor-slissignalpreview"
    namespace: "com.azure.resourcemanager.monitor.slissignalpreview"
    service-name: "SliSignalPreview"
    flavor: "azure"
  "@azure-tools/typespec-ts":
    flavor: "azure"
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-monitorslissignalpreview"
    package-details:
      name: "@azure/arm-monitorslissignalpreview"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
    flavor: azure
    namespace: "Azure.ResourceManager.Monitor.SlisSignalPreview"
    clear-output-folder: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
parameters:
  "service-dir":
    default: "sdk/monitor"
