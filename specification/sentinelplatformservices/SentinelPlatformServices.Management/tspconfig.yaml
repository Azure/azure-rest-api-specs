emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/sentinelplatformservices.json"
  "@azure-tools/typespec-csharp":
    package-dir: "Azure.ResourceManager.SentinelplatformServices"
    clear-output-folder: true
    model-namespace: false
    namespace: "{package-dir}"
    flavor: azure
  "@azure-tools/typespec-python":
    package-dir: "azure-mgmt-sentinelplatformservices"
    package-name: "{package-dir}"
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-java":
    package-dir: "azure-resourcemanager-sentinelplatformservices"
    namespace: "com.azure.resourcemanager.sentinelplatformservices"
    service-name: "sentinelplatformservices"
    flavor: azure
  "@azure-tools/typespec-ts":
    package-dir: "arm-sentinelplatformservices"
    azureSdkForJs: true
    isModularLibrary: true
    generateMetadata: true
    hierarchyClient: false
    experimentalExtensibleEnums: true
    enableOperationGroup: true
    packageDetails:
      name: "@azure/{package-dir}"
    flavor: azure
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
