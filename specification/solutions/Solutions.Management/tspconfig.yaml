parameters:
  "service-dir":
    default: "sdk/managedapplications"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/managedapplications.json"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.ManagedApplications"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-managedapplications"
    namespace: "azure.mgmt.managedapplications"
    generate-sample: true
    generate-test: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-managedapplications"
    namespace: "com.azure.resourcemanager.managedapplications"
    service-name: "Application"
    flavor: azure
    use-object-for-unknown: true
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-managedapplications"
    flavor: azure
    experimental-extensible-enums: true
    compatibility-lro: true
    package-details:
      name: "@azure/arm-managedapplications"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/solutions"
    emitter-output-dir: "{output-dir}/{service-dir}/armmanagedapplications"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armmanagedapplications"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
