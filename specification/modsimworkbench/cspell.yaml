      - teh
  - filename: '**/specification/modsimworkbench/resource-manager/Microsoft.ModSimWorkbench/preview/2021-03-01-preview/modsimworkbenches.json'
    ignoreWords:
      - teh
  - filename: '**/specification/modsimworkbench/resource-manager/Microsoft.ModSimWorkbench/preview/2024-05-01-preview/modsimworkbenches.json'
    ignoreWords:
      - teh
