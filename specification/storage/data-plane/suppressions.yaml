- tool: TypeSpecValidation
  rules: [FolderStructure]
  reason: >
    This is a custom SDK configuration directory
  paths:
    - SdkBatchCsharp
    - SdkDatalakeGo
- tool: Swagger Avocado
  paths:
    - SdkBatchCsharp/*.json
    - SdkBatchCsharp/readme.md
    - SdkDatalakeGo/*.json
    - SdkDatalakeGo/readme.md
  reason: These are typespec based SDKs, not swagger based, so avocado validation does not apply.
