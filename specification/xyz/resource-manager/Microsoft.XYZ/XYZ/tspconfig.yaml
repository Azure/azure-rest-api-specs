parameters:
  "service-dir":
    default: "sdk/xyz"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/xyz.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.XYZ"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-xyz"
    namespace: "azure.mgmt.xyz"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-xyz"
    namespace: "com.azure.resourcemanager.xyz"
    service-name: "XYZ"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-xyz"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-xyz"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/xyz"
    emitter-output-dir: "{output-dir}/{service-dir}/armxyz"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armxyz"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
