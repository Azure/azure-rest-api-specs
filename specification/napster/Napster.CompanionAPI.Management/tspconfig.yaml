emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/openapi.json"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/napstercompanionapi
    emitter-output-dir: "{output-dir}/{service-dir}/armnapstercompanionapi"
    module: github.com/Azure/azure-sdk-for-go/{service-dir}/armnapstercompanionapi
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-napstercompanionapi"
    namespace: azure.mgmt.napstercompanionapi
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-napstercompanionapi"
    flavor: azure
    namespace: com.azure.resourcemanager.napstercompanionapi
    service-name: NapsterCompanionApi
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-napstercompanionapi"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-napstercompanionapi"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.NapsterCompanionApi"
    emitter-output-dir: "{output-dir}/sdk/napstercompanionapi/{namespace}"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
parameters:
  service-dir:
    default: sdk/napstercompanionapi
