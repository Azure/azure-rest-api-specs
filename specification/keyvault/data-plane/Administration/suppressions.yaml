- tool: TypeSpecValidation
  reason: >
    KeyVault data-plane sub-projects are nested three levels under data-plane (e.g.
    data-plane/Administration/BackupRestore) as part of the unified folder structure
    refactor, which is one level deeper than the standard two-level requirement.
    Cross-folder imports from ../common/ are also required by this layout.
    Suppressed pending tsp-validation support for the new structure.
    Responsibility: Service team.
  rules: [FolderStructure]
  paths:
    - BackupRestore
    - RBAC
    - Settings
    - EKM
- tool: Swagger ModelValidation
  reason: >
    / is a valid scope for RBAC operations in Key Vault. The scope parameter starts
    with a forward slash by design, causing a false positive for double slashes.
  paths:
    - preview/2026-01-01-preview/examples/DeleteRoleDefinition-example.json
    - preview/2026-01-01-preview/examples/GetRoleDefinition-example.json