emit:
  - "@azure-tools/typespec-autorest"

linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
  # This TypeSpec was generated by converting an existing swagger spec. The
  # rules below are disabled because the existing swagger is the source of
  # truth: turning them on would force changes that alter the generated
  # swagger and break already-shipped SDKs.
  disable:
    "@azure-tools/typespec-azure-core/use-standard-operations": "Existing operations don't use Azure.Core templates. Rewriting them would change the swagger and break shipped SDKs."
    "@azure-tools/typespec-azure-core/no-openapi": "operationId values are kept as-is from the original swagger so generated SDK method names don't change."
    "@azure-tools/typespec-azure-core/use-standard-names": "The name 'startLogCollection' comes from the original swagger. Renaming it would change the SDK method name."
    "@azure-tools/typespec-azure-core/bad-record-type": "handlerProperties is typed as Record<unknown> so the swagger emits 'additionalProperties: {}' (matching the original). Record<string> would change the schema."
    "@azure-tools/typespec-azure-core/request-body-problem": "importUpdate's body is a raw array in the original swagger. Wrapping it in an object would be a breaking change."
    "@azure-tools/typespec-client-generator-core/property-name-conflict": "Error.innerError is the property name in the original swagger. Renaming it would change the JSON payload."

options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}/.."
    examples-dir: "{project-root}/examples"
    output-file: "Microsoft.DeviceUpdate/{version-status}/{version}/deviceupdate.json"
  # Uncomment this line and add "@azure-tools/typespec-python" to your package.json to generate Python code
  # "@azure-tools/typespec-python":
  #   "basic-setup-py": true
  #   "package-version":
  #   "package-name":
  #   "output-path":
  # Uncomment this line and add "@azure-tools/typespec-java" to your package.json to generate Java code
  # "@azure-tools/typespec-java": true
  # Uncomment this line and add "@azure-tools/typespec-csharp" to your package.json to generate C# code
  # "@azure-tools/typespec-csharp": true
  # Uncomment this line and add "@azure-tools/typespec-ts" to your package.json to generate Typescript code
  # "@azure-tools/typespec-ts": true
