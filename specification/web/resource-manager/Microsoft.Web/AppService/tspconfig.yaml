parameters:
  "service-dir":
    default: "sdk/appservice"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/openapi.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
    xml-strategy: "none"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-web"
    namespace: "azure.mgmt.web"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    api-version: "2025-05-01"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-appservice"
    namespace: "com.azure.resourcemanager.appservice"
    service-name: "AppService"
    flavor: azure
    premium: true
    generate-tests: false
    client-side-validations: true
    enable-sync-stack: false
    use-object-for-unknown: true
    uuid-as-string: false
    float32-as-double: false
    add-inner: AppServiceCertificate
    remove-inner: CsmDeploymentStatus
    rename-model:
      ApiKVReferencePropertiesSource: ConfigReferenceSource
      OpenIdConnectClientCredentialMethod: ClientCredentialMethod
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-appservice"
    flavor: "azure"
    compatibility-lro: true
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-appservice"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/appservice"
    emitter-output-dir: "{output-dir}/{service-dir}/armappservice"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armappservice/v5"
    fix-const-stuttering: false
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  disable:
    "@azure-tools/typespec-client-generator-core/duplicate-client-name": "ConnectorGateway and AiGateway both consume the standard Azure.ResourceManager.ManagedServiceIdentityProperty (ManagedServiceIdentity, UserAssignedIdentity, ManagedServiceIdentityType) in 2026-03-01-preview and 2026-05-01-preview. The Python client linter incorrectly flags this as a cross-version duplicate even though it's the same canonical common-types model. Suppressed pending upstream fix."
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
