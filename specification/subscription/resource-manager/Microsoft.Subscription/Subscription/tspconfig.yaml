parameters:
  "service-dir":
    default: "sdk/subscription"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{version-status}/{version}/subscriptions.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-subscription"
    namespace: "azure.mgmt.subscription"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-subscription"
    namespace: "com.azure.resourcemanager.subscription"
    service-name: "Subscription" # human-readable service name, whitespace allowed
    flavor: azure
  "@azure-tools/typespec-ts":
    service-dir: sdk/subscription
    emitter-output-dir: "{output-dir}/{service-dir}/arm-subscriptions"
    compatibility-lro: true
    flavor: "azure"
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-subscriptions"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/subscription"
    emitter-output-dir: "{output-dir}/{service-dir}/armsubscription"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armsubscription"
    fix-const-stuttering: true
    factory-gather-all-params: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
