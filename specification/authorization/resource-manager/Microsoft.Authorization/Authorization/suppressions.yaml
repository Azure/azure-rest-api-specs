- tool: TypeSpecValidation
  reason: >
    Not ready to split as independent services.
  rules: [FolderStructure]
  paths:
    - Microsoft.AttributeNamespaces
    - Microsoft.AccessReview
    - Microsoft.Authorization
    - Microsoft.ClassicAdmin
    - Microsoft.DenyAssignment
    - Microsoft.ProviderOperations
    - Microsoft.RoleAssignment
    - Microsoft.RoleDefinitions
    - Microsoft.RoleManagementAlerts

- tool: TypeSpecValidation
  reason: >
    Not ready to split as independent services.
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-go.*
    - options.@azure-tools/typespec-java.*
    - options.@azure-tools/typespec-python.*
    - options.@azure-tools/typespec-ts.*
    - parameters.service-dir.default
  paths: 
    - Microsoft.AttributeNamespaces/tspconfig.yaml
    - Microsoft.AccessReview/tspconfig.yaml
    - Microsoft.Authorization/tspconfig.yaml
    - Microsoft.ClassicAdmin/tspconfig.yaml
    - Microsoft.DenyAssignment/tspconfig.yaml
    - Microsoft.ProviderOperations/tspconfig.yaml
    - Microsoft.RoleAssignment/tspconfig.yaml
    - Microsoft.RoleDefinitions/tspconfig.yaml
    - Microsoft.RoleManagementAlerts/tspconfig.yaml