parameters:
  "service-dir":
    default: "sdk/authorization"
options:
  "@azure-tools/typespec-python":
    service-dir: "sdk/authorization"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-authorization"
    namespace: "azure.mgmt.authorization"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-authorization"
    service-dir: "sdk/authorization"
    namespace: "com.azure.resourcemanager.authorization"
    service-name: "Authorization"
    flavor: azure
    premium: true
    generate-tests: false
    client-side-validations: true
    enable-sync-stack: false
    float32-as-double: false
    use-object-for-unknown: true
    generate-samples: false
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-authorization"
    service-dir: "sdk/authorization"
    flavor: "azure"
    compatibility-lro: true
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-authorization"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/authorization"
    emitter-output-dir: "{output-dir}/{service-dir}/armauthorization"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armauthorization"
    fix-const-stuttering: false
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.Authorization"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
