emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    azure-resource-provider-folder: "./resource-manager"
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/openapi.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    omit-unreachable-types: true
    use-read-only-status-schema: true
  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/enclave
    emitter-output-dir: "{output-dir}/{service-dir}/armenclave"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armenclave"
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-enclave"
    namespace: azure.mgmt.enclave
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-java":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-enclave"
    namespace: com.azure.resourcemanager.enclave
    service-name: Enclave
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-enclave"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-enclave"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.Enclave"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
    - "@azure-tools/typespec-azure-rulesets/client-sdk"
parameters:
  service-dir:
    default: sdk/enclave
