- tool: TypeSpecValidation
  paths:
    - ./tspconfig.yaml
  rules:
    - SdkTspConfigValidation
  sub-rules:
    - options.@azure-tools/typespec-java.*
    - options.@azure-tools/typespec-python.*
    - options.@azure-tools/typespec-ts.*
    - options.@azure-typespec/http-client-csharp.*
  reason: >-
    Brownfield conversion from hand-written swagger. SDK generation continues
    to use autorest against the TypeSpec-generated swagger rather than
    TypeSpec SDK emitters directly.
