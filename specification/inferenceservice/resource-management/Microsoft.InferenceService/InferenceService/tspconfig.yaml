parameters:
  "service-dir":
    default: "sdk/inferenceservice"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{emitter-output-dir}/{version-status}/{version}/InferenceService.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.ResourceManager.InferenceService"
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.ResourceManager.InferenceService"
    flavor: azure
    generate-sample: true
    generate-test: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-inferenceservice"
    namespace: "azure.mgmt.inferenceservice"
    flavor: azure
    generate-test: true
    generate-sample: true
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-inferenceservice"
    namespace: "com.azure.resourcemanager.inferenceservice"
    service-name: "InferenceService"
    flavor: azure
    generate-samples: false
    generate-test: false
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-inferenceservice"
    experimental-extensible-enums: true
    flavor: azure
    package-details:
      name: "@azure/arm-inferenceservice"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/inferenceservice"
    emitter-output-dir: "{output-dir}/{service-dir}/arminferenceservice"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/arminferenceservice"
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
