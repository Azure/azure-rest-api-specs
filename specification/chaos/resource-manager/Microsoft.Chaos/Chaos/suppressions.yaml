- tool: LintDiff
  paths:
    - preview/2026-05-01-preview/openapi.json
  rules:
    - XMSSecretInResponse
  reason: False positive - publicNetworkAccess is not a secret. It is a simple Enabled/Disabled configuration setting for public network access control. The property name contains 'access' which may trigger the rule, but the values are not sensitive.
- tool: LintDiff
  paths:
    - preview/2026-05-01-preview/openapi.json
    - preview/2024-11-01-preview/openapi.json
    - stable/2025-01-01/openapi.json
  rules:
    - LatestVersionOfCommonTypesMustBeUsed
  reason: TypeSpec @armCommonTypesVersion is a namespace-level setting. Upgrading to v6 would change ManagedServiceIdentity model structure in already-shipped API versions, introducing breaking changes. Remaining v5 LocationParameter references are a known TypeSpec autorest emitter limitation.
- tool: LintDiff
  paths:
    - preview/2026-05-01-preview/openapi.json
  rules:
    - PathForTrackedResourceTypes
  reason: WorkspaceOperationResults is an LRO polling endpoint (final-state-via location), not a resource CRUD path. It is subscription-scoped by design because it serves as a shared polling endpoint for all workspace async operations across resource groups.
- tool: LintDiff
  paths:
    - preview/2026-05-01-preview/openapi.json
    - preview/2024-11-01-preview/openapi.json
    - stable/2025-01-01/openapi.json
  rules:
    - PostOperationIdContainsUrlVerb
  reason: The operationId Experiments_ExecutionDetails is established in previous API versions (2024-11-01-preview, 2025-01-01). Renaming would be a breaking change for existing SDKs.
