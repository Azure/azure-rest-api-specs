- tool: TypeSpecRequirement
  path: ./preview/2025-04-30-preview/*.json
  reason: >
    Suppresses the CI validation error "Output folder appears to contain TypeSpec-generated swagger files,
    not generated from the current TypeSpec sources". The preview version (2025-04-30-preview) has been
    superseded by stable (2026-04-15) and removed from the TypeSpec Versions enum, so this swagger is no
    longer generated by TypeSpec. It is retained as a static artifact because existing customers still use
    this API version.
