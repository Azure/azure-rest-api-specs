output-dir: "{project-root}/../"
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{output-dir}"
    azure-resource-provider-folder: ./resource-manager
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/openapi.json"
    examples-dir: "{project-root}/examples"
    new-line: lf
    use-read-only-status-schema: true
  "@azure-tools/typespec-providerhub-controller":
    emitter-output-dir: "{output-dir}/generated"
    code-kind: model
  "@azure-tools/typespec-csharp":
    flavor: azure
    package-dir: "AgriculturePlatform.Management"
    clear-output-folder: true
    model-namespace: false
    namespace: "{package-dir}"
  "@azure-tools/typespec-python":
    package-dir: "agricultureplatform-mgmt"
    package-name: "{package-dir}"
    generate-test: true
    generate-sample: true
    examples-dir: "{project-root}/examples"
    flavor: "azure"
  "@azure-tools/typespec-java":
    package-dir: "agricultureplatform-management"
    namespace: "com.agricultureplatform.management"
    service-name: "agricultureplatform"
    examples-directory: "{project-root}/examples"
    flavor: azure