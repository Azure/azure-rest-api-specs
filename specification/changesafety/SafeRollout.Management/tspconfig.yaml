parameters:
  "service-dir":
    default: "sdk/saferollout"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/SafeRollout/{version-status}/{version}/SafeRollout.json"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Microsoft.ChangeSafety"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-changeSafety"
    namespace: "azure.mgmt.changeSafety"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-changeSafety"
    namespace: "com.azure.resourcemanager.changeSafety"
    service-name: "changeSafety"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-changeSafety"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-changeSafety"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/changeSafety"
    emitter-output-dir: "{output-dir}/{service-dir}/armchangeSafety"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armchangeSafety"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"