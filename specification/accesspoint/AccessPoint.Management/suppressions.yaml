- tool: TypeSpecValidation
  paths:
    - tspconfig.yaml # Update this path to your actual tspconfig.yaml location
  rules:
    - SdkTspConfigValidation
  reason: >
    Preview version, SDK not required.
    Responsibility: Service team with SDK team collaboration   
    Comment: No SDK support required for this preview version
    Note: If GA without SDK, change to permanent exemption with justification

