parameters:
  "service-dir":
    default: "sdk/appcomplianceautomation"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/appcomplianceautomation.json"
  "@azure-tools/typespec-python":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-appcomplianceautomation"
    package-name: "azure-mgmt-appcomplianceautomation"
  "@azure-tools/typespec-csharp":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/Microsoft.ResourceManager.AppComplianceAutomation"
    clear-output-folder: true
    model-namespace: false
    namespace: "Microsoft.ResourceManager.AppComplianceAutomation"
  "@azure-tools/typespec-ts":
    azureSdkForJs: true
    isModularLibrary: true
    generateMetadata: true
    hierarchyClient: false
    experimentalExtensibleEnums: true
    enableOperationGroup: true
    flavor: azure
    examples-directory: "{project-root}/examples"
    generateSample: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-appcomplianceautomation"
    packageDetails:
      name: "@azure/arm-appcomplianceautomation"
  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/appcomplianceautomation
    emitter-output-dir: "{output-dir}/{service-dir}/armappcomplianceautomation"
    module: github.com/Azure/azure-sdk-for-go/{service-dir}/armappcomplianceautomation
    flavor: azure
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
