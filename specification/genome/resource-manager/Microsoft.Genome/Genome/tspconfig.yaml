emit:
  - "@azure-tools/typespec-autorest"

linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"

parameters:
  "service-dir":
    default: "{project-root}/../../.."

options:
  "@azure-tools/typespec-autorest":
    azure-resource-provider-folder: "resource-manager"
    emitter-output-dir: "{service-dir}/specification/genome"
    examples-dir: "{project-root}/examples"
    output-file: "{azure-resource-provider-folder}/Microsoft.Genome/preview/2021-08-01-preview/genome.json"