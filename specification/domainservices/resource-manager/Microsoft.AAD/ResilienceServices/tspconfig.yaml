parameters:
  service-dir:
    default: "sdk/aad"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{emitter-output-dir}/{version-status}/{version}/resilience.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.ResourceManager.AAD"
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.ResourceManager.AAD"
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-aad"
    namespace: "azure.mgmt.aad"
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-aad"
    namespace: "com.azure.resourcemanager.aad"
    service-name: "aad"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-aad"
    experimental-extensible-enums: true
    flavor: azure
    package-details:
      name: "@azure/arm-aad"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/aad"
    emitter-output-dir: "{output-dir}/{service-dir}/armaad"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armaad"
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    flavor: azure
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
