    - BedrockApplicationInferenceProfile.Management/tspconfig.yaml
    - BedrockBlueprint.Management/tspconfig.yaml
    - BedrockDataAutomationProject.Management/tspconfig.yaml
    - BedrockDataSource.Management/tspconfig.yaml
    - BedrockFlow.Management/tspconfig.yaml
    - BedrockFlowAlias.Management/tspconfig.yaml
    - BedrockGuardrail.Management/tspconfig.yaml
    - BedrockKnowledgeBase.Management/tspconfig.yaml
    - BedrockPrompt.Management/tspconfig.yaml
