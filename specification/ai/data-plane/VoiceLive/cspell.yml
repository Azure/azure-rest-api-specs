# Spell checking is not case sensitive
# Keep word lists in alphabetical order so the file is easier to manage
import:
  - ../../cspell.yaml
# Ignore OpenAI-authored example identifiers baked into x-oaiMeta example payloads
# (e.g. "event_CCXLgMZPo3qioWCeQa4WH" and "item_CCXLecNJVIVR2HUy3ABLj").
ignoreRegExpList:
  - "[A-Za-z]+_[A-Za-z0-9]{5,}"
words:
  - Aarti
  - Alaw
  - azvoicelive
  - BYOT
  - byval
  - Dall
  - Diya
  - Imend
  - Inpainting
  - logprobs
  - MCPHTTP
  - Meera
  - OpenAI
  - Pcma
  - Pcmu
  - SSML
  - Uhhm
  - Ulaw
  - Viseme
  - webrtc
  - xhigh
  - Xiaoxiao
  - Ximena
  - Yunxi
