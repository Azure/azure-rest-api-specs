        tool_choice:
          $ref: '#/components/schemas/VoiceLiveToolChoice'
          description: Tool selection behavior for this response.
        pre_generated_assistant_message:
          $ref: '#/components/schemas/OpenAI.RealtimeConversationItemMessageAssistant'
          description: Create the response with a pre-generated assistant message.
        interim_response:
          $ref: '#/components/schemas/InterimResponseConfig'
          description: Configuration for interim response generation during latency or tool calls.
        parallel_tool_calls:
          type: boolean
          description: Whether compatible realtime models may call tools in parallel.
        reasoning:
          $ref: '#/components/schemas/OpenAI.RealtimeReasoning'
          description: Reasoning configuration for compatible realtime models.
      description: Create a new VoiceLive response using the OpenAI Realtime GA wire shape.
    ResponseItem:
      oneOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeConversationItemMessage'
        - $ref: '#/components/schemas/OpenAI.RealtimeConversationItemFunctionCall'
        - $ref: '#/components/schemas/OpenAI.RealtimeConversationItemFunctionCallOutput'
        - $ref: '#/components/schemas/OpenAI.RealtimeMCPToolCall'
        - $ref: '#/components/schemas/OpenAI.RealtimeMCPListTools'
        - $ref: '#/components/schemas/OpenAI.RealtimeMCPApprovalRequest'
        - $ref: '#/components/schemas/OpenAI.RealtimeMCPApprovalResponse'
      description: |-
        A conversation item returned by the service. Message, function-call, and MCP
        response items are consumed from OpenAI's GA Realtime models; the preview
        channel additionally contributes web/file search items via `AzureResponseItem`.
    ResponseSession:
      type: object
      required:
        - type
        - id
        - object
        - model
      properties:
        type:
          type: string
          enum:
            - realtime
          description: The session type. VoiceLive v1 supports realtime sessions only.
        output_modalities:
          type: array
          items:
            $ref: '#/components/schemas/SessionModality'
          description: Modalities the service may return.
        instructions:
          type: string
          description: Session instructions.
        audio:
          $ref: '#/components/schemas/AudioConfig'
          description: Nested input and output audio configuration.
        include:
          type: array
          items:
            type: string
          description: Additional fields to include in server outputs.
        tools:
          type: array
          items:
            $ref: '#/components/schemas/VoiceLiveTool'
          description: Tools available to the model.
        tool_choice:
          $ref: '#/components/schemas/VoiceLiveToolChoice'
          description: Tool selection behavior.
        parallel_tool_calls:
          type: boolean
          description: Whether multiple tool calls may run in parallel.
        reasoning:
          $ref: '#/components/schemas/OpenAI.RealtimeReasoning'
          description: Reasoning configuration for compatible realtime models.
        max_output_tokens:
          anyOf:
            - type: integer
            - type: string
              enum:
                - inf
          description: Maximum output tokens for one response.
        animation:
          $ref: '#/components/schemas/Animation'
          description: The animation configuration for the session.
        avatar:
          $ref: '#/components/schemas/AvatarConfig'
          description: Configuration for avatar streaming and behavior during the session.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |-
            Controls randomness for compatible cascaded pipelines. Native realtime
            pipelines reject this property because the upstream realtime API does not
            support session temperature.
        interim_response:
          $ref: '#/components/schemas/InterimResponseConfig'
          description: Configuration for interim response generation during latency or tool calls.
        voice_adaptation:
          $ref: '#/components/schemas/VoiceAdaptation'
          description: Voice-optimized instruction adaptation.
        response_delimiter:
          type: string
          description: Delimiter appended to generated responses.
        metadata:
          type: object
          unevaluatedProperties:
            type: string
          description: |-
            Set of up to 16 key-value pairs that can be attached to the session. This is
            useful for storing additional information about the session in a structured format, such as
            tracking IDs, user context, or application-specific labels. These key-value pairs are also
            included in Foundry resource logs for tracing and diagnostics. Keys can be a maximum of 64
            characters long and values can be a maximum of 512 characters long.
        id:
          type: string
          description: The unique identifier for the session.
        object:
          type: string
          enum:
            - realtime.session
          description: The response object type.
        model:
          type: string
          description: The selected model.
        expires_at:
          type: integer
          format: unixtime
          description: Expiration time for the session. This value is set by the server and cannot be changed with `session.update`.
      description: Base for session configuration in the response.
    Scene:
      type: object
      properties:
        zoom:
          type: number
          format: float
          description: Zoom level of the avatar. Range is (0, +∞). Values less than 1 zoom out, values greater than 1 zoom in.
          default: 0
        position_x:
          type: number
          format: float
          description: Horizontal position of the avatar. Range is [-1, 1], as a proportion of frame width. Negative values move left, positive values move right.
          default: 0
        position_y:
          type: number
          format: float
          description: Vertical position of the avatar. Range is [-1, 1], as a proportion of frame height. Negative values move up, positive values move down.
          default: 0
        rotation_x:
          type: number
          format: float
          description: Rotation around the X-axis (pitch). Range is [-π, π] in radians. Negative values rotate up, positive values rotate down.
          default: 0
        rotation_y:
          type: number
          format: float
          description: Rotation around the Y-axis (yaw). Range is [-π, π] in radians. Negative values rotate left, positive values rotate right.
          default: 0
        rotation_z:
          type: number
          format: float
          description: Rotation around the Z-axis (roll). Range is [-π, π] in radians. Negative values rotate anticlockwise, positive values rotate clockwise.
          default: 0
        amplitude:
          type: number
          format: float
          description: Amplitude of the avatar movement. Range is (0, 1]. Values in (0, 1) mean reduced amplitude, 1 means full amplitude.
          default: 0
      description: Configuration for avatar's zoom level, position, rotation and movement amplitude in the video frame.
    ServerEvent:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ServerEventType'
          description: The type of event.
        event_id:
          type: string
      discriminator:
        propertyName: type
        mapping:
          warning: '#/components/schemas/ServerEventWarning'
          byom_credential.updated: '#/components/schemas/ServerEventBYOMCredentialUpdated'
          session.avatar.connecting: '#/components/schemas/ServerEventSessionAvatarConnecting'
          response.audio_timestamp.delta: '#/components/schemas/ServerEventResponseAudioTimestampDelta'
          response.audio_timestamp.done: '#/components/schemas/ServerEventResponseAudioTimestampDone'
          session.avatar.switch_to_speaking: '#/components/schemas/ServerEventSessionAvatarSwitchToSpeaking'
          session.avatar.switch_to_idle: '#/components/schemas/ServerEventSessionAvatarSwitchToIdle'
          response.video.delta: '#/components/schemas/ServerEventResponseVideoDelta'
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeServerEvent'
      description: A voicelive server event.
    ServerEventBYOMCredentialUpdated:
      type: object
      required:
        - type
        - authorization_headers
      properties:
        type:
          type: string
          enum:
            - byom_credential.updated
          description: The event type, must be `byom_credential.updated`.
        authorization_headers:
          type: object
          unevaluatedProperties:
            type: string
          description: Updated authorization header names with their values redacted.
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Confirms that BYOM authorization headers were updated.
    ServerEventResponseAudioTimestampDelta:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
        - audio_offset_ms
        - audio_duration_ms
        - text
        - timestamp_type
      properties:
        type:
          type: string
          enum:
            - response.audio_timestamp.delta
        response_id:
          type: string
        item_id:
          type: string
        output_index:
          type: integer
          format: int32
        content_index:
          type: integer
          format: int32
        audio_offset_ms:
          type: integer
          format: int32
        audio_duration_ms:
          type: integer
          format: int32
        text:
          type: string
        timestamp_type:
          type: string
          enum:
            - word
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Represents a word-level audio timestamp delta for a response.
    ServerEventResponseAudioTimestampDone:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
      properties:
        type:
          type: string
          enum:
            - response.audio_timestamp.done
        response_id:
          type: string
        item_id:
          type: string
        output_index:
          type: integer
          format: int32
        content_index:
          type: integer
          format: int32
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Indicates completion of audio timestamp delivery for a response.
    ServerEventResponseVideoDelta:
      type: object
      required:
        - type
        - output_index
        - codec
        - delta
      properties:
        type:
          type: string
          enum:
            - response.video.delta
          description: The event type, must be `response.video.delta`.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        codec:
          type: string
          description: The codec used for the video data.
        delta:
          type: string
          description: The base64-encoded video frame data.
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Returned when avatar video frame data is streamed.
    ServerEventSessionAvatarConnecting:
      type: object
      required:
        - type
        - server_sdp
      properties:
        type:
          type: string
          enum:
            - session.avatar.connecting
          description: The event type, must be 'session.avatar.connecting'.
        server_sdp:
          type: string
          description: The server's SDP answer for the avatar connection.
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Sent when the server is in the process of establishing an avatar media connection and provides its SDP answer.
    ServerEventSessionAvatarSwitchToIdle:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - session.avatar.switch_to_idle
          description: The event type, must be `session.avatar.switch_to_idle`.
        turn_id:
          type: string
          description: The ID of the turn associated with the avatar state change.
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Returned when the avatar switches to idle state.
    ServerEventSessionAvatarSwitchToSpeaking:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - session.avatar.switch_to_speaking
          description: The event type, must be `session.avatar.switch_to_speaking`.
        turn_id:
          type: string
          description: The ID of the turn associated with the avatar state change.
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: Returned when the avatar switches to speaking state.
    ServerEventType:
      anyOf:
        - type: string
        - type: string
          enum:
            - warning
            - byom_credential.updated
            - session.avatar.connecting
            - response.audio_timestamp.delta
            - response.audio_timestamp.done
            - session.avatar.switch_to_speaking
            - session.avatar.switch_to_idle
            - response.video.delta
      description: |-
        Azure-specific server event types. Server events that exist in OpenAI GA
        Realtime (error, `input_audio_buffer.*`, `conversation.item.created/deleted/`
        `truncated/retrieved`, `conversation.item.input_audio_transcription.*`,
        `session.created/updated`, `response.text.*`, `response.audio_transcript.*`,
        `response.content_part.*`, `response.output_item.*`, `response.created/done`,
        `response.function_call_arguments.*`, `mcp_list_tools.*`,
        `response.mcp_call*.*`, and `output_audio_buffer.cleared`) are
        consumed from OpenAI directly (with Azure payloads re-injected via `custom.tsp`
        augmentations where needed). OpenAI server events not exposed by stable v1 are
        version-fenced in `custom.tsp`; only Azure-only event types are listed here.
    ServerEventWarning:
      type: object
      required:
        - type
        - warning
      properties:
        type:
          type: string
          enum:
            - warning
          description: The event type, must be `warning`.
        warning:
          $ref: '#/components/schemas/ServerEventWarningDetails'
          description: Details of the warning.
      allOf:
        - $ref: '#/components/schemas/ServerEvent'
      description: |-
        Returned when a warning occurs that does not interrupt the conversation flow.
        Warnings are informational and the session will continue normally.
    ServerEventWarningDetails:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: A human-readable warning message.
        code:
          type: string
          description: Warning code, if any.
        param:
          type: string
          description: Parameter related to the warning, if any.
      description: Details of the warning.
    SessionBase:
      type: object
      description: VoiceLive session object configuration.
    SessionIncludeOption:
      anyOf:
        - type: string
        - type: string
          enum:
            - item.input_audio_transcription.logprobs
            - item.input_audio_transcription.phrases
            - file_search_call.results
      description: Options for what additional data to include in session responses.
    SessionModality:
      anyOf:
        - type: string
        - type: string
          enum:
            - text
            - audio
            - animation
            - avatar
      description: Output modalities supported by VoiceLive sessions.
    SessionResponseConfig:
      $ref: '#/components/schemas/ResponseSession'
      description: Session response payloads supported by VoiceLive.
    SessionUpdateConfig:
      $ref: '#/components/schemas/RequestSession'
      description: Session update payloads supported by VoiceLive.
    StaticInterimResponseConfig:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - static_interim_response
        texts:
          type: array
          items:
            type: string
          description: List of interim response text options to randomly select from.
      allOf:
        - $ref: '#/components/schemas/InterimResponseConfigBase'
      description: |-
        Configuration for static interim response generation.
        Randomly selects from configured texts when any trigger condition is met.
    TranscriptionPhrase:
      type: object
      required:
        - offset_milliseconds
        - duration_milliseconds
        - text
      properties:
        offset_milliseconds:
          type: integer
          format: int32
          description: Offset from the start of the audio in milliseconds.
        duration_milliseconds:
          type: integer
          format: int32
          description: Duration of the phrase in milliseconds.
        text:
          type: string
          description: The transcribed text of the phrase.
        words:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptionWord'
          description: The individual words in the phrase with timing information.
        locale:
          type: string
          description: The locale of the transcription (e.g., 'en-US').
        confidence:
          type: number
          format: float
          description: The confidence score of the transcription.
      description: A transcribed phrase with timing information.
    TranscriptionWord:
      type: object
      required:
        - text
        - offset_milliseconds
        - duration_milliseconds
      properties:
        text:
          type: string
          description: The transcribed word text.
        offset_milliseconds:
          type: integer
          format: int32
          description: Offset from the start of the audio in milliseconds.
        duration_milliseconds:
          type: integer
          format: int32
          description: Duration of the word in milliseconds.
      description: A time-stamped word in the transcription.
    Versions:
      type: string
      enum:
        - virtual-public-preview
        - v1
      description: API versioning.
    VideoCrop:
      type: object
      required:
        - top_left
        - bottom_right
      properties:
        top_left:
          type: array
          items:
            type: integer
            format: int32
          minItems: 2
          maxItems: 2
          description: Top-left corner of the crop region. Array of [x, y], must be non-negative integers.
        bottom_right:
          type: array
          items:
            type: integer
            format: int32
          minItems: 2
          maxItems: 2
          description: Bottom-right corner of the crop region. Array of [x, y], must be non-negative integers.
      description: Defines a video crop rectangle using top-left and bottom-right coordinates.
    VideoParams:
      type: object
      properties:
        bitrate:
          type: integer
          format: int32
          description: Bitrate in bits per second (e.g., 2000000 for 2 Mbps).
          default: 2000000
        codec:
          type: string
          enum:
            - h264
          description: Codec to use for encoding. Currently only 'h264' is supported.
          default: h264
        crop:
          $ref: '#/components/schemas/VideoCrop'
          description: Optional cropping settings for the video stream.
        resolution:
          $ref: '#/components/schemas/VideoResolution'
          description: Optional resolution settings for the video stream.
        background:
          $ref: '#/components/schemas/Background'
          description: Optional background settings for the video. Allows specifying either a solid color or an image URL.
        gop_size:
          type: integer
          format: int32
          minimum: 1
          maximum: 2000
          description: Group of Pictures (GOP) size for video encoding. Controls the interval between keyframes, affecting compression efficiency and seeking performance.
          default: 10
      description: Video streaming parameters for avatar.
    VideoResolution:
      type: object
      required:
        - width
        - height
      properties:
        width:
          type: integer
          format: int32
          description: Width of the video in pixels. Must be greater than 0.
        height:
          type: integer
          format: int32
          description: Height of the video in pixels. Must be greater than 0.
      description: Resolution of the video feed in pixels.
    Voice:
      anyOf:
        - $ref: '#/components/schemas/OAIVoice'
        - $ref: '#/components/schemas/OpenAIVoice'
        - $ref: '#/components/schemas/AzureVoice'
        - $ref: '#/components/schemas/AzureRealtimeNativeVoice'
      description: Union of all supported voice configurations.
    VoiceAdaptation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - auto
          description: Adaptation strategy.
        additional_instructions:
          type: string
          description: Server-generated voice-optimized instructions.
      description: Voice-optimized instruction adaptation.
    VoiceLiveMcpApprovalMode:
      type: string
      enum:
        - never
        - always
      description: MCP approval modes accepted by VoiceLive.
    VoiceLiveMcpApprovalRules:
      type: object
      properties:
        never:
          type: array
          items:
            type: string
        always:
          type: array
          items:
            type: string
      description: Per-tool MCP approval rules.
    VoiceLiveMcpAuthorization:
      oneOf:
        - type: string
        - $ref: '#/components/schemas/AssignedManagedIdentity'
      description: MCP authorization accepted by VoiceLive.
    VoiceLiveMcpRequireApproval:
      oneOf:
        - $ref: '#/components/schemas/VoiceLiveMcpApprovalMode'
        - $ref: '#/components/schemas/VoiceLiveMcpApprovalRules'
      description: MCP approval configuration accepted by VoiceLive.
    VoiceLiveMcpTool:
      type: object
      required:
        - type
        - server_label
        - server_url
      properties:
        type:
          type: string
          enum:
            - mcp
        server_label:
          type: string
        server_url:
          type: string
        authorization:
          $ref: '#/components/schemas/VoiceLiveMcpAuthorization'
        headers:
          type: object
          unevaluatedProperties:
            type: string
        allowed_tools:
          type: array
          items:
            type: string
        require_approval:
          $ref: '#/components/schemas/VoiceLiveMcpRequireApproval'
        response_scheduling:
          $ref: '#/components/schemas/McpResponseScheduling'
          default: silent
      description: Remote MCP server configuration supported by VoiceLive.
    VoiceLiveTool:
      oneOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeFunctionTool'
        - $ref: '#/components/schemas/VoiceLiveMcpTool'
      description: A tool available to the model during a VoiceLive session.
    VoiceLiveToolChoice:
      oneOf:
        - $ref: '#/components/schemas/OpenAI.ToolChoiceOptions'
        - $ref: '#/components/schemas/OpenAI.ToolChoiceFunction'
      description: |-
        Specifies how the model selects tools during a VoiceLive session. Consumes the
        OpenAI GA Realtime `tool_choice` models.
    VoiceType:
      anyOf:
        - type: string
        - type: string
          enum:
            - openai
            - azure-standard
            - azure-custom
            - azure-personal
            - avatar-voice-sync
            - azure-realtime-native
      description: Voice implementations available through VoiceLive.
