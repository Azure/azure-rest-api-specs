        event_id:
          type: string
          description: The unique ID of the client event used for error handling.
        type:
          type: string
          enum:
            - output_audio_buffer.clear
          description: The event type, must be `output_audio_buffer.clear`.
          x-stainless-const: true
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeClientEvent'
      description: Clears buffered VoiceLive avatar media output without stopping TTS synthesis.
      x-oaiMeta:
        name: output_audio_buffer.clear
