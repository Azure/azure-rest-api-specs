    OpenAI.RealtimeTurnDetection:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/OpenAI.RealtimeTurnDetectionType'
      discriminator:
        propertyName: type
        mapping:
          azure_semantic_vad: '#/components/schemas/AzureSemanticVad'
          azure_semantic_vad_en: '#/components/schemas/AzureSemanticVadEn'
          azure_semantic_vad_multilingual: '#/components/schemas/AzureSemanticVadMultilingual'
          server_vad: '#/components/schemas/OpenAI.RealtimeTurnDetectionServerVad'
          semantic_vad: '#/components/schemas/OpenAI.RealtimeTurnDetectionSemanticVad'
      description: |-
        Configuration for turn detection, ether Server VAD or Semantic VAD. This can be set to `null` to turn off, in which case the client must manually trigger model response.
        Server VAD means that the model will detect the start and end of speech based on audio volume and respond at the end of user speech.
        Semantic VAD is more advanced and uses a turn detection model (in conjunction with VAD) to semantically estimate whether the user has finished speaking, then dynamically sets a timeout based on this probability. For example, if user audio trails off with "uhhm", the model will score a low probability of turn end and wait longer for the user to continue speaking. This can be useful for more natural conversations, but may have a higher latency.
        For `gpt-realtime-whisper` transcription sessions, turn detection must be
        set to `null`; VAD is not supported.
      title: Realtime Turn Detection
    OpenAI.RealtimeTurnDetectionSemanticVad:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - semantic_vad
        eagerness:
          type: string
          enum:
            - low
            - medium
            - high
            - auto
          default: auto
        create_response:
          type: boolean
          default: true
        interrupt_response:
          type: boolean
          default: true
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeTurnDetection'
    OpenAI.RealtimeTurnDetectionServerVad:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - server_vad
        threshold:
          type: number
        prefix_padding_ms:
          type: integer
        silence_duration_ms:
          type: integer
        create_response:
          type: boolean
          default: true
        interrupt_response:
          type: boolean
          default: true
        idle_timeout_ms:
          anyOf:
            - type: integer
            - type: 'null'
        end_of_utterance_detection:
          $ref: '#/components/schemas/EouDetection'
          description: Configuration for end-of-utterance detection (Azure extension).
        auto_truncate:
          type: boolean
          description: Whether to automatically truncate the audio buffer when speech stops (Azure extension).
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeTurnDetection'
    OpenAI.RealtimeTurnDetectionType:
      anyOf:
        - type: string
        - type: string
          enum:
            - server_vad
            - semantic_vad
