openapi: 3.1.0
info:
  title: VoiceLive
  version: v1
tags: []
paths: {}
components:
  schemas:
    ActionFind:
      type: object
      required:
        - pattern
        - type
        - url
      properties:
        pattern:
          type: string
          description: The pattern or text to search for within the page.
        type:
          type: string
          enum:
            - find
          description: The action type. Always 'find'.
        url:
          type: string
          format: uri
          description: The URL of the page searched for the pattern.
      description: A find action to search text within a page.
    ActionOpenPage:
      type: object
      required:
        - type
        - url
      properties:
        type:
          type: string
          enum:
            - open_page
          description: The action type. Always 'open_page'.
        url:
          type: string
          format: uri
          description: The URL opened by the model.
      description: An open page action.
    ActionSearch:
      type: object
      required:
        - type
      properties:
        query:
          type: string
          description: The search query.
        type:
          type: string
          enum:
            - search
          description: The action type. Always 'search'.
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ActionSearchSource'
          description: The sources used in the search.
      description: A web search action.
    ActionSearchSource:
      type: object
      required:
        - type
        - url
      properties:
        type:
          type: string
          enum:
            - url
          description: The type of source. Always 'url'.
        url:
          type: string
          format: uri
          description: The URL of the source.
      description: A search action source URL.
    AgentConfig:
      type: object
      required:
        - type
        - name
        - agent_id
        - thread_id
      properties:
        type:
          type: string
          enum:
            - agent
          description: The type of agent to use.
        name:
          type: string
          description: The name of the agent.
        description:
          type: string
          description: Optional description of the agent.
        agent_id:
          type: string
          description: The ID of the agent.
        thread_id:
          type: string
          description: The ID of the conversation thread.
      description: Configuration for the agent.
    Animation:
      type: object
      properties:
        model_name:
          type: string
          description: The name of the animation model to use.
          default: default
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/AnimationOutputType'
          description: Set of output data types requested from the animation system.
          default:
            - blendshapes
      description: Configuration for animation outputs including blendshapes and visemes metadata.
    AnimationOutputType:
      anyOf:
        - type: string
        - type: string
          enum:
            - blendshapes
            - viseme_id
      description: Specifies the types of animation data to output.
    AssignedManagedIdentity:
      type: object
      required:
        - type
        - audience
      properties:
        type:
          type: string
          enum:
            - assigned_managed_identity
        audience:
          type: string
        client_id:
          type: string
      description: Managed identity authorization for an MCP server.
    AudioConfig:
      type: object
      properties:
        input:
          $ref: '#/components/schemas/AudioInputConfig'
          description: Input audio configuration.
        output:
          $ref: '#/components/schemas/AudioOutputConfig'
          description: Output audio configuration.
      description: GA Realtime nested audio configuration (`audio.input` / `audio.output`) for a VoiceLive session.
    AudioEchoCancellation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - server_echo_cancellation
          description: The type of echo cancellation model to use.
        reference_source:
          $ref: '#/components/schemas/EchoCancellationReferenceSource'
          description: |-
            The source of the echo cancellation reference signal.
            - `server`: EC uses the internal TTS loopback as the reference signal (default, existing behavior).
            - `client`: EC uses the client-supplied reference channel (ch1 of stereo input). Internal TTS loopback is skipped.
          default: server
        channels:
          type: integer
          format: int32
          minimum: 1
          maximum: 2
          description: |-
            Number of input audio channels.
            - `1`: Mono input (default).
            - `2`: Interleaved stereo input where channel 0 is the microphone signal and channel 1 is the echo reference signal.
            When set to 2, `reference_source` must be `client` and `input_audio_format` must be `pcm16`.
          default: 1
      description: Echo cancellation configuration for server-side audio processing.
    AudioFormat:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/AudioFormatType'
      discriminator:
        propertyName: type
        mapping:
          audio/pcm: '#/components/schemas/PcmAudioFormat'
          audio/pcmu: '#/components/schemas/PcmuAudioFormat'
          audio/pcma: '#/components/schemas/PcmaAudioFormat'
      description: Base audio format object used by VoiceLive v1.
    AudioFormatType:
      anyOf:
        - type: string
        - type: string
          enum:
            - audio/pcm
            - audio/pcmu
            - audio/pcma
      description: Audio format MIME types supported by VoiceLive v1.
    AudioInputConfig:
      type: object
      properties:
        format:
          $ref: '#/components/schemas/AudioFormat'
          description: Input audio format. Defaults to 24 kHz PCM.
        transcription:
          $ref: '#/components/schemas/AudioInputTranscriptionOptions'
          description: Configuration for input audio transcription.
        noise_reduction:
          $ref: '#/components/schemas/AudioNoiseReduction'
          description: Configuration for input audio noise reduction.
        turn_detection:
          $ref: '#/components/schemas/OpenAI.RealtimeTurnDetection'
          description: Type of turn detection to use.
        echo_cancellation:
          $ref: '#/components/schemas/AudioEchoCancellation'
          description: Configuration for echo cancellation during server-side audio processing (Azure extension).
      description: Input audio configuration (OpenAI GA Realtime `audio.input` shape, with Azure extensions).
    AudioInputTranscriptionModel:
      anyOf:
        - type: string
        - type: string
          enum:
            - whisper-1
      description: Supported audio input transcription models.
    AudioInputTranscriptionOptions:
      type: object
      required:
        - model
      properties:
        model:
          anyOf:
            - type: string
            - type: string
              enum:
                - whisper-1
                - gpt-4o-transcribe
                - gpt-4o-mini-transcribe
                - gpt-4o-transcribe-diarize
                - azure-speech
                - azure-mrs
                - mai-transcribe-1
                - mai-transcribe-1.5
                - mai-transcribe
          description: |-
            The transcription model to use. Supported values:
            'whisper-1', 'gpt-4o-transcribe', 'gpt-4o-mini-transcribe',
            'gpt-4o-transcribe-diarize', 'azure-speech', 'azure-mrs',
            'mai-transcribe-1', 'mai-transcribe-1.5', and 'mai-transcribe'.
        language:
          type: string
          description: Optional language code in BCP-47 (e.g., 'en-US'), or ISO-639-1 (e.g., 'en'), or multi languages with auto detection, (e.g., 'en,zh').
        custom_speech:
          type: object
          unevaluatedProperties:
            type: string
          description: Optional configuration for custom speech models.
        phrase_list:
          type: array
          items:
            type: string
          description: Optional list of phrase hints to bias recognition.
      description: Configuration for input audio transcription.
    AudioNoiseReduction:
      type: object
      required:
        - type
      properties:
        type:
          anyOf:
            - $ref: '#/components/schemas/OpenAI.NoiseReductionType'
            - type: string
              enum:
                - azure_deep_noise_suppression
            - type: string
          description: The type of noise reduction model.
      description: |-
        Configuration for input audio noise reduction. Consumes the OpenAI GA Realtime
        noise-reduction types (`near_field`, `far_field`) and extends them with Azure's
        `azure_deep_noise_suppression`.
    AudioOutputConfig:
      type: object
      properties:
        format:
          $ref: '#/components/schemas/AudioFormat'
          description: Output audio format. Defaults to 24 kHz PCM.
        voice:
          type: string
          description: Voice name.
          default: alloy
        voice_type:
          $ref: '#/components/schemas/VoiceType'
          description: Voice implementation selected for synthesis.
          default: openai
        speed:
          type: number
          format: float
          description: Numeric voice speed.
        voice_temperature:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Voice variation temperature.
        custom_lexicon_url:
          type: string
          description: URL of a custom pronunciation lexicon.
        custom_text_normalization_url:
          type: string
          description: URL of a custom text normalization configuration.
        prefer_locales:
          type: array
          items:
            type: string
          description: Preferred locales for multilingual synthesis.
        locale:
          type: string
          description: Enforced output locale.
        style:
          type: string
          description: Voice speaking style.
        pitch:
          type: string
          description: Voice pitch adjustment.
        volume:
          type: string
          description: Voice volume adjustment.
        custom_voice_endpoint_id:
          type: string
          description: Azure custom voice endpoint identifier.
        personal_voice_model:
          type: string
          description: Azure personal/avatar voice model.
        output_audio_timestamp_types:
          type: array
          items:
            $ref: '#/components/schemas/AudioTimestampType'
          description: Types of timestamps to include in audio response content.
      description: Output audio configuration (OpenAI GA Realtime `audio.output` shape, with Azure extensions).
    AudioTimestampType:
      anyOf:
        - type: string
        - type: string
          enum:
            - word
      description: Output timestamp types supported in audio response content.
    AvatarConfig:
      type: object
      required:
        - character
        - customized
      properties:
        type:
          $ref: '#/components/schemas/AvatarConfigTypes'
          description: Type of avatar to use.
        ice_servers:
          type: array
          items:
            $ref: '#/components/schemas/IceServer'
          description: Optional list of ICE servers to use for WebRTC connection establishment.
        character:
          type: string
          description: The character name or ID used for the avatar.
        style:
          type: string
          description: Optional avatar style, such as emotional tone or speaking style.
        model:
          $ref: '#/components/schemas/PhotoAvatarBaseModes'
          description: Base model to use for the avatar. Required for photo avatar.
        customized:
          type: boolean
          description: Indicates whether the avatar is customized or not.
        video:
          $ref: '#/components/schemas/VideoParams'
          description: Optional video configuration including resolution, bitrate, and codec.
        scene:
          $ref: '#/components/schemas/Scene'
          description: Configuration for the avatar's zoom level, position, rotation and movement amplitude in the video frame.
        output_protocol:
          $ref: '#/components/schemas/AvatarOutputProtocol'
          description: Output protocol for avatar streaming. Default is 'webrtc'.
          default: webrtc
        output_audit_audio:
          type: boolean
          description: When enabled, forwards audit audio via WebSocket for review/debugging purposes, even when avatar output is delivered via WebRTC.
          default: false
      description: Configuration for avatar streaming and behavior during the session.
    AvatarConfigTypes:
      anyOf:
        - type: string
        - type: string
          enum:
            - video-avatar
            - photo-avatar
      description: Avatar config types
    AvatarOutputProtocol:
      anyOf:
        - type: string
        - type: string
          enum:
            - webrtc
            - websocket
      description: Avatar config output protocols
    AzureAvatarVoiceSyncVoice:
      type: object
      required:
        - type
        - model
      properties:
        type:
          type: string
          enum:
            - avatar-voice-sync
        model:
          $ref: '#/components/schemas/PersonalVoiceModels'
          description: Underlying neural model to use.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Temperature must be between 0.0 and 1.0.
        custom_lexicon_url:
          type: string
          description: URL of a custom lexicon file for pronunciation customization.
        custom_text_normalization_url:
          type: string
          description: URL of a custom text normalization endpoint.
        prefer_locales:
          type: array
          items:
            type: string
          description: |-
            Preferred locales in BCP-47 format that change the accents of languages.
            If not set, TTS uses the default accent for each language (e.g., American English for English,
            Mexican Spanish for Spanish). Setting this to `["en-GB", "es-ES"]` changes the English accent
            to British English and the Spanish accent to European Spanish, while TTS can still speak other
            languages like French or Chinese with their default accents.
        locale:
          type: string
          description: |-
            Enforced locale in BCP-47 format for TTS output. If set, TTS will always use the specified
            locale to speak. For example, setting locale to `en-US` forces American English accent for all
            text content, even if the text is in another language, and TTS will output silence for
            unsupported languages (e.g., Chinese text with `en-US` locale). If not set, TTS automatically
            detects the language from the text content.
        style:
          type: string
          description: Speaking style for the voice (e.g., 'cheerful', 'sad').
        pitch:
          type: string
          description: |-
            Pitch adjustment for the voice output. Follows the same rules as the `pitch` attribute of the
            SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`x-low`, `low`, `medium`, `high`, `x-high`, `default`),
            a relative change (e.g., `+10%`, `-5%`, `+50Hz`, `-2st`), or an absolute frequency (e.g., `200Hz`).
        rate:
          type: string
          description: |-
            Speaking rate adjustment for the voice output. Follows the same rules as the `rate` attribute of
            the SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`x-slow`, `slow`, `medium`, `fast`, `x-fast`, `default`),
            a relative percentage (e.g., `+20%`, `-10%`), or a non-negative multiplier (e.g., `0.5`, `1.5`).
        volume:
          type: string
          description: |-
            Volume adjustment for the voice output. Follows the same rules as the `volume` attribute of the
            SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`silent`, `x-soft`, `soft`, `medium`, `loud`, `x-loud`, `default`),
            an absolute number from 0.0 to 100.0, or a relative change (e.g., `+10`, `-6dB`).
      allOf:
        - $ref: '#/components/schemas/AzureVoice'
      description: Azure avatar voice sync configuration. Uses personal voice synthesis with avatar character.
    AzureCustomVoice:
      type: object
      required:
        - type
        - name
        - endpoint_id
      properties:
        type:
          type: string
          enum:
            - azure-custom
        name:
          type: string
          minLength: 1
          description: Voice name cannot be empty.
        endpoint_id:
          type: string
          minLength: 1
          description: Endpoint ID cannot be empty.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Temperature must be between 0.0 and 1.0.
        custom_lexicon_url:
          type: string
          description: URL of a custom lexicon file for pronunciation customization.
        custom_text_normalization_url:
          type: string
          description: URL of a custom text normalization endpoint.
        prefer_locales:
          type: array
          items:
            type: string
          description: |-
            Preferred locales in BCP-47 format that change the accents of languages.
            If not set, TTS uses the default accent for each language (e.g., American English for English,
            Mexican Spanish for Spanish). Setting this to `["en-GB", "es-ES"]` changes the English accent
            to British English and the Spanish accent to European Spanish, while TTS can still speak other
            languages like French or Chinese with their default accents.
        locale:
          type: string
          description: |-
            Enforced locale in BCP-47 format for TTS output. If set, TTS will always use the specified
            locale to speak. For example, setting locale to `en-US` forces American English accent for all
            text content, even if the text is in another language, and TTS will output silence for
            unsupported languages (e.g., Chinese text with `en-US` locale). If not set, TTS automatically
            detects the language from the text content.
        style:
          type: string
          description: Speaking style for the voice (e.g., 'cheerful', 'sad').
        pitch:
          type: string
          description: |-
            Pitch adjustment for the voice output. Follows the same rules as the `pitch` attribute of the
            SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`x-low`, `low`, `medium`, `high`, `x-high`, `default`),
            a relative change (e.g., `+10%`, `-5%`, `+50Hz`, `-2st`), or an absolute frequency (e.g., `200Hz`).
        rate:
          type: string
          description: |-
            Speaking rate adjustment for the voice output. Follows the same rules as the `rate` attribute of
            the SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`x-slow`, `slow`, `medium`, `fast`, `x-fast`, `default`),
            a relative percentage (e.g., `+20%`, `-10%`), or a non-negative multiplier (e.g., `0.5`, `1.5`).
        volume:
          type: string
          description: |-
            Volume adjustment for the voice output. Follows the same rules as the `volume` attribute of the
            SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`silent`, `x-soft`, `soft`, `medium`, `loud`, `x-loud`, `default`),
            an absolute number from 0.0 to 100.0, or a relative change (e.g., `+10`, `-6dB`).
      allOf:
        - $ref: '#/components/schemas/AzureVoice'
      description: Azure custom voice configuration.
    AzurePersonalVoice:
      type: object
      required:
        - type
        - name
        - model
      properties:
        type:
          type: string
          enum:
            - azure-personal
        name:
          type: string
          minLength: 1
          description: Voice name cannot be empty.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Temperature must be between 0.0 and 1.0.
        model:
          $ref: '#/components/schemas/PersonalVoiceModels'
          description: Underlying neural model to use for personal voice.
        custom_lexicon_url:
          type: string
          description: URL of a custom lexicon file for pronunciation customization.
        custom_text_normalization_url:
          type: string
          description: URL of a custom text normalization endpoint.
        prefer_locales:
          type: array
          items:
            type: string
          description: |-
            Preferred locales in BCP-47 format that change the accents of languages.
            If not set, TTS uses the default accent for each language (e.g., American English for English,
            Mexican Spanish for Spanish). Setting this to `["en-GB", "es-ES"]` changes the English accent
            to British English and the Spanish accent to European Spanish, while TTS can still speak other
            languages like French or Chinese with their default accents.
        locale:
          type: string
          description: |-
            Enforced locale in BCP-47 format for TTS output. If set, TTS will always use the specified
            locale to speak. For example, setting locale to `en-US` forces American English accent for all
            text content, even if the text is in another language, and TTS will output silence for
            unsupported languages (e.g., Chinese text with `en-US` locale). If not set, TTS automatically
            detects the language from the text content.
        style:
          type: string
          description: Speaking style for the voice (e.g., 'cheerful', 'sad').
        pitch:
          type: string
          description: |-
            Pitch adjustment for the voice output. Follows the same rules as the `pitch` attribute of the
            SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`x-low`, `low`, `medium`, `high`, `x-high`, `default`),
            a relative change (e.g., `+10%`, `-5%`, `+50Hz`, `-2st`), or an absolute frequency (e.g., `200Hz`).
        rate:
          type: string
          description: |-
            Speaking rate adjustment for the voice output. Follows the same rules as the `rate` attribute of
            the SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`x-slow`, `slow`, `medium`, `fast`, `x-fast`, `default`),
            a relative percentage (e.g., `+20%`, `-10%`), or a non-negative multiplier (e.g., `0.5`, `1.5`).
        volume:
          type: string
          description: |-
            Volume adjustment for the voice output. Follows the same rules as the `volume` attribute of the
            SSML `prosody` element (see
            https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).
            Typical values: a named level (`silent`, `x-soft`, `soft`, `medium`, `loud`, `x-loud`, `default`),
            an absolute number from 0.0 to 100.0, or a relative change (e.g., `+10`, `-6dB`).
      allOf:
        - $ref: '#/components/schemas/AzureVoice'
      description: Azure personal voice configuration.
    AzureRealtimeNativeVoice:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          enum:
            - azure-realtime-native
          description: The type of the voice.
        name:
          $ref: '#/components/schemas/AzureRealtimeNativeVoiceName'
          description: The name of the Azure realtime native voice.
      description: |-
        Azure realtime native voice configuration. These voices are natively
        supported by the `azure-realtime` model and offer higher quality speech
        synthesis than standard Azure voices. Only valid when using the
        `azure-realtime` model.
    AzureRealtimeNativeVoiceName:
      anyOf:
        - type: string
        - type: string
          enum:
            - aarti
            - andrew
            - ava
            - denise
            - diya
            - elsa
            - florian
            - francisca
            - meera
            - xiaoxiao
            - yunxi
            - ximena
      description: |-
        Currently known voice names for the Azure realtime native voice type.
        This is an extensible enum; additional voice names may be accepted by the
        service in the future.
    AzureResponseItem:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ItemType'
        id:
          type: string
        object:
          type: string
          enum:
            - realtime.item
      discriminator:
        propertyName: type
      description: Base for any response item; discriminated by `type`.
    AzureSemanticDetection:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          enum:
            - semantic_detection_v1
        threshold_level:
          $ref: '#/components/schemas/EouThresholdLevel'
          description: Threshold level setting. Recommended instead of `threshold`. One of `low`, `medium`, `high`, or `default`.
        timeout_ms:
          type: integer
          format: int32
          minimum: 0
          description: Timeout in milliseconds. Recommended instead of `timeout`.
      allOf:
        - $ref: '#/components/schemas/EouDetection'
      description: Azure semantic end-of-utterance detection (default).
    AzureSemanticDetectionEn:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          enum:
            - semantic_detection_v1_en
        threshold_level:
          $ref: '#/components/schemas/EouThresholdLevel'
          description: Threshold level setting. Recommended instead of `threshold`. One of `low`, `medium`, `high`, or `default`.
        timeout_ms:
          type: integer
          format: int32
          minimum: 0
          description: Timeout in milliseconds. Recommended instead of `timeout`.
      allOf:
        - $ref: '#/components/schemas/EouDetection'
      description: Azure semantic end-of-utterance detection (English-optimized).
    AzureSemanticDetectionMultilingual:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          enum:
            - semantic_detection_v1_multilingual
        threshold_level:
          $ref: '#/components/schemas/EouThresholdLevel'
          description: Threshold level setting. Recommended instead of `threshold`. One of `low`, `medium`, `high`, or `default`.
        timeout_ms:
          type: integer
          format: int32
          minimum: 0
          description: Timeout in milliseconds. Recommended instead of `timeout`.
      allOf:
        - $ref: '#/components/schemas/EouDetection'
      description: Azure semantic end-of-utterance detection (multilingual).
    AzureSemanticVad:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - azure_semantic_vad
        threshold:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: 'Activation threshold for VAD detection. Range: 0.0 to 1.0.'
        prefix_padding_ms:
          type: integer
          format: int32
          description: Amount of audio to include before speech is detected, in milliseconds.
        silence_duration_ms:
          type: integer
          format: int32
          description: Duration of silence required to end speech detection, in milliseconds.
        end_of_utterance_detection:
          $ref: '#/components/schemas/EouDetection'
          description: Configuration for end-of-utterance detection.
        speech_duration_ms:
          type: integer
          format: int32
