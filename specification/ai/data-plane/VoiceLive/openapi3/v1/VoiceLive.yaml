      properties:
        event_id:
          type: string
          maxLength: 512
          description: Optional client-generated ID used to identify this event.
        type:
          type: string
          enum:
            - conversation.item.retrieve
          description: The event type, must be `conversation.item.retrieve`.
          x-stainless-const: true
        item_id:
          type: string
          description: The ID of the item to retrieve.
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeClientEvent'
      description: |-
        Send this event when you want to retrieve the server's representation of a specific item in the conversation history. This is useful, for example, to inspect user audio after noise cancellation and VAD.
        The server will respond with a `conversation.item.retrieved` event,
        unless the item does not exist in the conversation history, in which case the
        server will respond with an error.
      x-oaiMeta:
        name: conversation.item.retrieve
        group: realtime
        example: |
          {
              "event_id": "event_901",
              "type": "conversation.item.retrieve",
              "item_id": "item_003"
          }
    OpenAI.RealtimeClientEventConversationItemTruncate:
      type: object
      required:
        - type
        - item_id
        - content_index
        - audio_end_ms
      properties:
        event_id:
          type: string
          maxLength: 512
          description: Optional client-generated ID used to identify this event.
        type:
          type: string
          enum:
            - conversation.item.truncate
          description: The event type, must be `conversation.item.truncate`.
          x-stainless-const: true
        item_id:
          type: string
          description: |-
            The ID of the assistant message item to truncate. Only assistant message
              items can be truncated.
        content_index:
          type: integer
          description: The index of the content part to truncate. Set this to `0`.
        audio_end_ms:
          type: integer
          description: |-
            Inclusive duration up to which audio is truncated, in milliseconds. If
              the audio_end_ms is greater than the actual audio duration, the server
              will respond with an error.
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeClientEvent'
      description: |-
        Send this event to truncate a previous assistant message’s audio. The server
        will produce audio faster than realtime, so this event is useful when the user
        interrupts to truncate audio that has already been sent to the client but not
        yet played. This will synchronize the server's understanding of the audio with
        the client's playback.
        Truncating audio will delete the server-side text transcript to ensure there
        is not text in the context that hasn't been heard by the user.
        If successful, the server will respond with a `conversation.item.truncated`
        event.
      x-oaiMeta:
        name: conversation.item.truncate
        group: realtime
        example: |
          {
              "event_id": "event_678",
              "type": "conversation.item.truncate",
              "item_id": "item_002",
              "content_index": 0,
              "audio_end_ms": 1500
          }
    OpenAI.RealtimeClientEventInputAudioBufferAppend:
      type: object
      required:
        - type
        - audio
      properties:
        event_id:
          type: string
          maxLength: 512
          description: Optional client-generated ID used to identify this event.
        type:
          type: string
          enum:
            - input_audio_buffer.append
          description: The event type, must be `input_audio_buffer.append`.
          x-stainless-const: true
        audio:
          type: string
          description: |-
            Base64-encoded audio bytes. This must be in the format specified by the
              `input_audio_format` field in the session configuration.
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeClientEvent'
      description: |-
        Send this event to append audio bytes to the input audio buffer. The audio
        buffer is temporary storage you can write to and later commit. A "commit" will create a new
        user message item in the conversation history from the buffer content and clear the buffer.
        Input audio transcription (if enabled) will be generated when the buffer is committed.
        If VAD is enabled the audio buffer is used to detect speech and the server will decide
        when to commit. When Server VAD is disabled, you must commit the audio buffer
        manually. Input audio noise reduction operates on writes to the audio buffer.
        The client may choose how much audio to place in each event up to a maximum
        of 15 MiB, for example streaming smaller chunks from the client may allow the
        VAD to be more responsive. Unlike most other client events, the server will
        not send a confirmation response to this event.
      x-oaiMeta:
        name: input_audio_buffer.append
        group: realtime
        example: |
          {
              "event_id": "event_456",
              "type": "input_audio_buffer.append",
              "audio": "Base64EncodedAudioData"
          }
    OpenAI.RealtimeClientEventInputAudioBufferClear:
      type: object
      required:
        - type
      properties:
        event_id:
          type: string
          maxLength: 512
          description: Optional client-generated ID used to identify this event.
        type:
          type: string
          enum:
            - input_audio_buffer.clear
          description: The event type, must be `input_audio_buffer.clear`.
          x-stainless-const: true
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeClientEvent'
      description: |-
        Send this event to clear the audio bytes in the buffer. The server will
        respond with an `input_audio_buffer.cleared` event.
      x-oaiMeta:
        name: input_audio_buffer.clear
        group: realtime
        example: |
          {
              "event_id": "event_012",
              "type": "input_audio_buffer.clear"
          }
    OpenAI.RealtimeClientEventInputAudioBufferCommit:
      type: object
      required:
        - type
      properties:
        event_id:
          type: string
          maxLength: 512
          description: Optional client-generated ID used to identify this event.
        type:
          type: string
          enum:
            - input_audio_buffer.commit
          description: The event type, must be `input_audio_buffer.commit`.
          x-stainless-const: true
      allOf:
        - $ref: '#/components/schemas/OpenAI.RealtimeClientEvent'
      description: |-
        Send this event to commit the user input audio buffer, which will create a  new user message item in the conversation. This event will produce an error  if the input audio buffer is empty. When in Server VAD mode, the client does  not need to send this event, the server will commit the audio buffer  automatically.
        Committing the input audio buffer will trigger input audio transcription  (if enabled in session configuration), but it will not create a response  from the model. The server will respond with an `input_audio_buffer.committed` event.
      x-oaiMeta:
        name: input_audio_buffer.commit
        group: realtime
        example: |
          {
              "event_id": "event_789",
              "type": "input_audio_buffer.commit"
          }
    OpenAI.RealtimeClientEventOutputAudioBufferClear:
      type: object
