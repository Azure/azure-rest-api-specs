        name: conversation.item.added
        group: realtime
        example: |
          {
            "type": "conversation.item.added",
            "event_id": "event_C9G8pjSJCfRNEhMEnYAVy",
            "previous_item_id": null,
            "item": {
              "id": "item_C9G8pGVKYnaZu8PH5YQ9O",
              "type": "message",
              "status": "completed",
              "role": "user",
              "content": [
                {
                  "type": "input_text",
                  "text": "hi"
                }
              ]
            }
          }
    OpenAI.RealtimeServerEventConversationItemCreated:
