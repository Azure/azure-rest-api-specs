parameters:
  "service-dir":
    default: "sdk/voicelive"
  "dependencies":
    default: ""
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}"
    omit-unreachable-types: false
    output-file: "{version-status}/{version}/VoiceLive.json"
    azure-resource-provider-folder: "data-plane"
    emit-lro-options: "none"
  "@azure-tools/typespec-python":
    api-version: "2026-04-10"
    package-mode: "dataplane"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-voicelive"
    package-name: "azure-ai-voicelive"
    flavor: azure
    generate-test: false
    generate-sample: false
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.AI.VoiceLive"
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.AI.VoiceLive"
    flavor: azure
  "@azure-typespec/http-client-csharp":
    namespace: Azure.AI.VoiceLive
    model-namespace: false
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-ts":
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/ai-voicelive"
    package-details:
      name: "@azure/ai-voicelive"
    flavor: azure
    is-modular-library: true
    generate-metadata: false
    generate-test: false
    src-folder: "generated"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-voicelive"
    namespace: com.azure.ai.voicelive
    use-eclipse-language-server: false
    custom-types-subpackage: implementation.models
    flavor: azure
    partial-update: true
    dev-options:
      loglevel: info
