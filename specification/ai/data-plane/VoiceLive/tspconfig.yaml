parameters:
  "service-dir":
    default: "sdk/voicelive"
  "dependencies":
    default: ""
emit:
  - "@azure-tools/typespec-autorest"
  - "@typespec/openapi3"
# VoiceLive follows the Azure AI Foundry pattern (matching OpenAI.Assistants and
# ModelInference): it dual-emits Swagger 2.0 via `@azure-tools/typespec-autorest`
# (the standard Foundry output, into `stable/`/`preview/` folders) AND OpenAPI 3.x via
# `@typespec/openapi3` (which supports the `oneOf` unions the OpenAI GA models use —
# tools, tool_choice, voice, etc. — that Swagger 2.0 cannot represent).
imports:
  - "@azure-tools/openai-typespec/models/realtime"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
    - "@azure-tools/typespec-azure-rulesets/client-sdk"
  disable:
    "@azure-tools/typespec-azure-core/documentation-required": "Some OpenAI models do not contain docstrings."
    "@azure-tools/typespec-azure-core/no-nullable": "Some OpenAI models still contain <> | null notation."
    "@azure-tools/typespec-azure-core/no-closed-literal-union": "OpenAI incompliance"
    "@azure-tools/typespec-azure-core/no-openapi": "OpenAI GA models use @oneOf / OpenAPI extensions."
    "@azure-tools/typespec-azure-core/no-multiple-discriminator": "OpenAI contains multiple discriminators."
    "@azure-tools/typespec-azure-core/no-unknown": "unknowns are used in OpenAI package."
    "@azure-tools/typespec-azure-core/no-query-explode": "Explode is used in OpenAI package."
    "@azure-tools/typespec-client-generator-core/property-name-conflict": "OpenAI package has conflict."
    "@azure-tools/typespec-azure-core/no-enum": "OpenAI uses enums."
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/VoiceLive.json"
    omit-unreachable-types: false
  "@typespec/openapi3":
    emitter-output-dir: "{project-root}"
    output-file: "openapi3/{version}/VoiceLive.json"
    omit-unreachable-types: false
    openapi-versions:
      - "3.1.0"
  "@azure-tools/typespec-python":
    package-dir: "azure-ai-voicelive"
    namespace: "azure.ai.voicelive"
    api-version: "virtual-public-preview"
    generate-test: false
    generate-sample: false
    flavor: azure
    package-name: "azure-ai-voicelive"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-voicelive"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.AI.VoiceLive"
    api-version: "virtual-public-preview"
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.AI.VoiceLive"
    flavor: azure
  "@azure-typespec/http-client-csharp":
    namespace: Azure.AI.VoiceLive
    api-version: "virtual-public-preview"
    model-namespace: false
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-ts":
    experimental-extensible-enums: true
    api-version: "virtual-public-preview"
    emitter-output-dir: "{output-dir}/{service-dir}/ai-voicelive"
    package-details:
      name: "@azure/ai-voicelive"
    flavor: azure
    is-modular-library: true
    generate-metadata: false
    generate-test: false
    src-folder: "generated"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-voicelive"
    namespace: com.azure.ai.voicelive
    api-version: "virtual-public-preview"
    use-eclipse-language-server: false
    custom-types-subpackage: implementation.models
    flavor: azure
    partial-update: true
    dev-options:
      loglevel: info
