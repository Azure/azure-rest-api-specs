parameters:
  "service-dir":
    default: "sdk/azuredatatransfer"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/azuredatatransfer.json"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.DataTransfer"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-datatransfer"
    namespace: "azure.mgmt.datatransfer"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-datatransfer"
    namespace: "com.azure.resourcemanager.datatransfer"
    service-name: "Data Transfer" # human-readable service name, whitespace allowed
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-datatransfer"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-datatransfer"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/datatransfer"
    emitter-output-dir: "{output-dir}/{service-dir}/armdatatransfer"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armdatatransfer"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
    - "@azure-tools/typespec-azure-rulesets/client-sdk"