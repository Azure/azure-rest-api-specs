- tool: TypeSpecValidation
  reason: >
    Not ready to split as independent services.
  rules: [FolderStructure]
  paths:
    - Alerts
    - AlertsSuppressionRules
    - ApiCollections
    - Applications
    - Assessment
    - ATPSettings
    - Automations
    - Common
    - ComplianceResults
    - DefenderForStorage
    - Governance
    - HealthReports
    - IoTSecurity
    - LegacySettings
    - Locations
    - MdeOnboarding
    - Operations
    - Pricings
    - PrivateLinks
    - RegulatoryCompliance
    - SecureScore
    - SecurityConnectors
    - SecurityConnectorsDevOps
    - SecurityOperators
    - SecuritySolutions
    - SecurityStandards
    - SensitivitySettings
    - ServerVulnerabilityAssessmentsSettings
    - Settings
    - SqlVulnerabilityAssessments
    - Standards
    - SubAssessments
    - Tasks

