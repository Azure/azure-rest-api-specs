emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "../{version-status}/{version}/openapi.json"
    arm-types-dir: "{project-root}/../../../../../common-types/resource-management"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
  disable:
    "@azure-tools/typespec-azure-resource-manager/arm-resource-duplicate-base-parameter": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-resource-manager/missing-x-ms-identifiers": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-core/no-multiple-discriminator": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-core/no-string-discriminator": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-core/no-unknown": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-core/casing-style": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-core/no-legacy-usage": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-resource-manager/arm-no-record": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
    "@azure-tools/typespec-azure-resource-manager/arm-resource-patch": "FIXME: Update justification, follow aka.ms/tsp/conversion-fix for details"
