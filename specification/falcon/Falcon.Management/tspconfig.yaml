parameters:
  "service-dir":
    default: "sdk/falcon"
  "service-directory-name":
    default: "falcon"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/falcon.json"
  "@azure-tools/typespec-csharp":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.ResourceManager.Falcon"
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.ResourceManager.Falcon"
    # Added to support generic model conversion from compute VM types
    use-model-reader-writer: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-falcon"
    namespace: "azure.mgmt.falcon"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-falcon"
    namespace: com.azure.resourcemanager.falcon
    service-name: Falcon
    flavor: azure
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/falcon"
    emitter-output-dir: "{output-dir}/{service-dir}/armfalcon"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armfalcon"
    fix-const-stuttering: true
    flavor: "azure"
    generate-examples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    remove-unreferenced-types: true
    generate-samples: true #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
  "@azure-tools/typespec-ts":
    azure-sdk-for-js: true
    is-modular-library: true
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-falcon"
    flavor: "azure"
    package-details:
      name: "@azure/arm-falcon"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
