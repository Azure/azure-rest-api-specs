emit:
  - "@azure-tools/typespec-autorest"
parameters:
  service-dir:
    default: "{output-dir}/sdk/datamigration"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/postgressqlDatamigration.json"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{service-dir}/azure-resourcemanager-datamigration"
    namespace: "com.azure.resourcemanager.datamigration"
  "@azure-tools/typespec-ts":
    experimental-extensible-enums: true
    emitter-output-dir: "{service-dir}/arm-datamigration"
    package-details:
      name: "@azure/arm-datamigration"
  "@azure-tools/typespec-go":
    emitter-output-dir: "{service-dir}/armdatamigration"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    module: "github.com/Azure/azure-sdk-for-go/sdk/resourcemanager/datamigration/armdatamigration"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{service-dir}/azure-mgmt-datamigration"
    namespace: "azure.mgmt.datamigration"
    generate-sample: true
    generate-test: true
  "@azure-tools/typespec-csharp":
    namespace: "Azure.ResourceManager.DataMigration"
    clear-output-folder: true
    emitter-output-dir: "{service-dir}/Azure.ResourceManager.DataMigration"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
