parameters:
  "service-dir":
    default: "sdk/saas"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/saas.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-tools/typespec-java":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-saas"
    namespace: "com.azure.resourcemanager.saas"
    service-name: "SaaS"
  "@azure-tools/typespec-ts":
    flavor: azure
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-saas"
    package-details:
      name: "@azure/arm-saas"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/saas"
    emitter-output-dir: "{output-dir}/{service-dir}/armsaas"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armsaas"
    flavor: azure
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
  "@azure-tools/typespec-python":
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-saas"
    namespace: "azure.mgmt.saas"
    generate-sample: true
    generate-test: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
