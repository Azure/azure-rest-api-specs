parameters:
  "service-dir":
    default: "sdk/upgradeassessment"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: false
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/upgradeAssessment.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-python":
    service-dir: sdk/kubernetesconfiguration
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-kubernetesconfiguration-upgradeassessment"
    namespace: "azure.mgmt.kubernetesconfiguration.upgradeassessment"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    service-dir: sdk/kubernetesconfiguration
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-kubernetesconfiguration-upgradeassessment"
    namespace: "com.azure.resourcemanager.kubernetesconfiguration.upgradeassessment"
    service-name: "UpgradeAssessment"
    flavor: azure
  "@azure-tools/typespec-ts":
    service-dir: sdk/kubernetesconfiguration
    emitter-output-dir: "{output-dir}/{service-dir}/arm-kubernetesconfiguration-upgradeassessment"
    flavor: "azure"
    compatibility-lro: true
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-kubernetesconfiguration-upgradeassessment"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/kubernetesconfiguration"
    emitter-output-dir: "{output-dir}/{service-dir}/armupgradeassessment"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armupgradeassessment"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.KubernetesConfiguration.UpgradeAssessment"
    emitter-output-dir: "{output-dir}/sdk/kubernetesconfiguration/{namespace}"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
