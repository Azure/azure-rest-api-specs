paths:
  /agent_optimization_jobs:
    post:
      operationId: AgentOptimizationJobs_create
      summary: Create an agent optimization job
      description: Creates an optimization job and returns the queued job. Honors `Operation-Id` for idempotent retry.
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            type: string
            enum:
              - AgentsOptimization=V2Preview
        - name: Operation-Id
          in: header
          required: false
          description: Client-generated unique ID for idempotent retries. When absent, the server creates the job unconditionally.
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          headers:
            Operation-Location:
              required: true
              description: URL to poll for the job status.
              schema:
                type: string
            Location:
              required: true
              description: URL of the created job resource.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationJob'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - AgentOptimizationJobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizationJob'
        description: The job to create.
      x-ms-foundry-meta:
        conditional_previews:
          - AgentsOptimization=V2Preview
    get:
      operationId: AgentOptimizationJobs_list
      summary: List agent optimization jobs
      description: Lists optimization jobs with cursor pagination and optional status or agent name filters.
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            type: string
            enum:
              - AgentsOptimization=V2Preview
        - name: limit
          in: query
          required: false
          description: |-
            A limit on the number of objects to be returned. Limit can range between 1 and 100, and the
            default is 20.
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: order
          in: query
          required: false
          description: |-
            Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and`desc`
            for descending order.
          schema:
            $ref: '#/components/schemas/PageOrder'
          explode: false
        - name: after
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include after=obj_foo in order to fetch the next page of the list.
          schema:
            type: string
          explode: false
        - name: before
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include before=obj_foo in order to fetch the previous page of the list.
          schema:
            type: string
          explode: false
        - name: status
          in: query
          required: false
          description: Filter to jobs in this lifecycle state.
          schema:
            $ref: '#/components/schemas/JobStatus'
          explode: false
        - name: agent_name
          in: query
          required: false
          description: Filter to jobs targeting this agent name.
          schema:
            type: string
          explode: false
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OptimizationJobListItem'
                    description: The requested list of items.
                  first_id:
                    type: string
                    description: The first ID represented in this list.
                  last_id:
                    type: string
                    description: The last ID represented in this list.
                  has_more:
                    type: boolean
                    description: A value indicating whether there are additional values available not captured in this list.
                description: The response data for a requested list of items.
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - AgentOptimizationJobs
      x-ms-foundry-meta:
        conditional_previews:
          - AgentsOptimization=V2Preview
  /agent_optimization_jobs/{jobId}:
    get:
      operationId: AgentOptimizationJobs_get
      summary: Get an agent optimization job
      description: Retrieves an optimization job by its identifier.
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            type: string
            enum:
              - AgentsOptimization=V2Preview
        - name: jobId
          in: path
          required: true
          description: The ID of the job.
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          headers:
            Retry-After:
              required: false
              description: Recommended number of seconds to wait before polling again.
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationJob'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - AgentOptimizationJobs
      x-ms-foundry-meta:
        conditional_previews:
          - AgentsOptimization=V2Preview
    delete:
      operationId: AgentOptimizationJobs_delete
      summary: Delete an agent optimization job
      description: Deletes the job and its candidate artifacts, canceling the job first if it is non-terminal.
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            type: string
            enum:
              - AgentsOptimization=V2Preview
        - name: jobId
          in: path
          required: true
          description: The ID of the job to delete.
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - AgentOptimizationJobs
      x-ms-foundry-meta:
        conditional_previews:
          - AgentsOptimization=V2Preview
  /agent_optimization_jobs/{jobId}:cancel:
    post:
      operationId: AgentOptimizationJobs_cancel
      summary: Cancel an agent optimization job
      description: Requests cancellation of a running or queued job and returns an error if the job is already in a terminal state.
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            type: string
            enum:
              - AgentsOptimization=V2Preview
        - name: jobId
          in: path
          required: true
          description: The ID of the job to cancel.
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationJob'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - AgentOptimizationJobs
      x-ms-foundry-meta:
        conditional_previews:
          - AgentsOptimization=V2Preview
  /agents:
    post:
      operationId: Agents_createAgent_Agents_createAgentFromCode
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            $ref: '#/components/schemas/AgentDefinitionOptInKeys'
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
        - name: x-ms-agent-name
          in: header
          required: false
          description: The unique name that identifies the agent. Max 63 chars, must start and end with alphanumeric, hyphens allowed in the middle.
          schema:
            type: string
            maxLength: 63
        - name: x-ms-code-zip-sha256
          in: header
          required: false
          description: SHA-256 hex digest of the uploaded code zip. Used for change detection (dedup) and integrity verification.
          schema:
            type: string
      description: |-
        Creates a new agent or a new version of an existing agent. Creates a new code-based agent. Uploads the code zip and creates the agent in a single call.
        The agent name is provided in the `x-ms-agent-name` header since POST /agents has no name in the URL path.
        The SHA-256 hex digest of the zip is provided in the `x-ms-code-zip-sha256` header for integrity and dedup.
        The request body is multipart/form-data with a JSON metadata part and a binary code part (part order is irrelevant).
        Maximum upload size is 250 MB.
      summary: Create an agent Create a new code-based agent
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentObject'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      x-ms-description-override: Creates a new agent or a new version of an existing agent.
      x-ms-summary-override: Create an agent
      x-ms-foundry-meta:
        conditional_previews:
          - WorkflowAgents=V1Preview
          - ExternalAgents=V1Preview
          - DraftAgents=V1Preview
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateAgentFromCodeContent'
            encoding:
              metadata:
                contentType: application/json
        description: The content multipart request content.
    get:
      operationId: Agents_listAgents
      summary: List agents
      description: Returns a paged collection of agent resources.
      parameters:
        - name: kind
          in: query
          required: false
          description: Filter agents by kind. If not provided, all agents are returned.
          schema:
            $ref: '#/components/schemas/AgentKind'
          explode: false
        - name: limit
          in: query
          required: false
          description: |-
            A limit on the number of objects to be returned. Limit can range between 1 and 100, and the
            default is 20.
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: order
          in: query
          required: false
          description: |-
            Sort order by the `created_at` timestamp of the objects. `asc` for ascending order and`desc`
            for descending order.
          schema:
            $ref: '#/components/schemas/PageOrder'
          explode: false
        - name: after
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include after=obj_foo in order to fetch the next page of the list.
          schema:
            type: string
          explode: false
        - name: before
          in: query
          required: false
          description: |-
            A cursor for use in pagination. `before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 objects, ending with obj_foo, your
            subsequent call can include before=obj_foo in order to fetch the previous page of the list.
          schema:
            type: string
          explode: false
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - has_more
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentObject'
                    description: The requested list of items.
                  first_id:
                    type: string
                    description: The first ID represented in this list.
                  last_id:
                    type: string
                    description: The last ID represented in this list.
                  has_more:
                    type: boolean
                    description: A value indicating whether there are additional values available not captured in this list.
                description: The response data for a requested list of items.
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Agents
  /agents/{agent_name}:
    get:
      operationId: Agents_getAgent
      summary: Get an agent
      description: Retrieves an agent definition by its unique name.
      parameters:
        - name: agent_name
          in: path
          required: true
          description: The name of the agent to retrieve.
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentObject'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Agents
    post:
      operationId: Agents_updateAgent_Agents_updateAgentFromCode
      parameters:
        - name: Foundry-Features
          in: header
          required: false
          description: A feature flag opt-in required when using preview operations or modifying persisted preview resources.
          schema:
            $ref: '#/components/schemas/AgentDefinitionOptInKeys'
        - name: agent_name
          in: path
          required: true
          description: The name of the agent to retrieve.
          schema:
            type: string
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
        - name: x-ms-code-zip-sha256
          in: header
          required: false
          description: SHA-256 hex digest of the uploaded code zip. Used for change detection (dedup) and integrity verification.
          schema:
            type: string
      description: |-
        Updates the agent by adding a new version if there are any changes to the agent definition.
        If no changes, returns the existing agent version. Updates a code-based agent by uploading new code and creating a new version.
        If the code and definition are unchanged (matched by x-ms-code-zip-sha256 header), returns the existing version.
        The request body is multipart/form-data with a JSON metadata part and a binary code part (part order is irrelevant).
        Maximum upload size is 250 MB.
      summary: Update an agent Update a code-based agent
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentObject'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      x-ms-description-override: Updates the agent by adding a new version if there are any changes to the agent definition. If no changes, returns the existing agent version.
      x-ms-summary-override: Update an agent
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateAgentVersionFromCodeContent'
            encoding:
              metadata:
                contentType: application/json
        description: The content multipart request content.
    delete:
      operationId: Agents_deleteAgent
      summary: Delete an agent
      description: |-
        Deletes an agent. For hosted agents, if any version has active sessions, the request
        is rejected with HTTP 409 unless `force` is set to true. When force is true, all
        associated sessions are cascade-deleted along with the agent and its versions.
      parameters:
        - name: agent_name
          in: path
          required: true
          description: The name of the agent to delete.
          schema:
            type: string
        - name: force
          in: query
          required: false
          description: For Hosted Agents, if `true`, force-deletes the agent even if its versions have active sessions, cascading deletion to all associated sessions. The service defaults to `false` if a value is not specified by the caller. This value is not relevant for other Agent types.
          schema:
            type: boolean
            default: false
          explode: false
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAgentResponse'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Agents
    patch:
      operationId: Agents_patchAgentObject
      summary: Update an agent endpoint
      description: Applies a merge-patch update to the specified agent endpoint configuration.
      parameters:
        - name: agent_name
          in: path
          required: true
          description: The name of the agent to retrieve.
          schema:
            type: string
            title: The name of the agent to retrieve
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentObject'
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/PatchAgentRequest'
  /agents/{agent_name}/code:download:
    get:
      operationId: Agents_downloadAgentCode
      summary: Download agent code
      description: |-
        Downloads the code zip for a code-based hosted agent.
        Returns the previously-uploaded zip (`application/zip`).

        If `agent_version` is supplied, returns that version's code zip; otherwise
        returns the latest version's code zip.

        The SHA-256 digest of the returned bytes matches the `content_hash` on the
        resolved version's `code_configuration`.
      parameters:
        - name: agent_name
          in: path
          required: true
          description: The name of the agent.
          schema:
            type: string
        - name: agent_version
          in: query
          required: false
          description: |-
            The version of the agent whose code zip should be downloaded.
            If omitted, the latest version's code zip is returned.
          schema:
            type: string
          explode: false
        - name: api-version
          in: query
          required: true
          description: The API version to use for this operation.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: |-
            Response body for downloading a hosted agent's code zip.
            Body is the raw zip bytes; `Content-Type` declares `application/zip` so clients
            can route to a zip-aware handler. Streaming is preserved (`bytes` body) regardless
            of the content-type label.
          headers:
            x-ms-agent-version:
              required: true
              description: The version of the agent whose code zip is returned in the response body.
              schema:
                type: string
          content:
            application/zip:
              schema:
                contentMediaType: application/zip
        4XX:
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        5XX:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      tags:
        - Agents
  /agents/{agent_name}/endpoint/protocols/invocations:
    post:
      operationId: AgentInvocations_createAgentInvocation
      summary: Create an agent invocation
      description: Creates an invocation for the specified agent version.
      parameters:
        - name: agent_name
          in: path
          required: true
          description: The name of the agent.
          schema:
            type: string
        - name: agent_session_id
          in: query
          required: false
          description: Optional session ID returned by the session CRUD APIs to reuse an existing sandbox. If not provided, a new session ID will be auto-generated.
          schema:
            type: string
          explode: false
        - name: x-ms-user-identity
          in: header
