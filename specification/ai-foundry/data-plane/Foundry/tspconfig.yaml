parameters:
  "service-dir":
    default: "sdk/ai"
emit:
  - "@typespec/openapi3"
  - "@azure-tools/foundry-snippets-emitter"
options:
  "@typespec/openapi3":
    emitter-output-dir: "{project-root}/"
    output-file: "openapi3/{version}/microsoft-foundry-openapi3.{file-type}"
    # output-file: "openapi3/{version}/microsoft-foundry-openapi3.yaml"
    file-type: [yaml, json]
    omit-unreachable-types: true
    openapi-versions:
      - "3.2.0"
  "@azure-tools/typespec-java":
    api-version: "v1"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-projects"
    namespace: "com.azure.ai.projects"
    service-name: "AIProjects"
    partial-update: true
    enable-sync-stack: true
    generate-tests: false
    generate-samples: false
    custom-types-subpackage: "implementation.models"
    customization-class: customizations/src/main/java/ProjectsCustomizations.java
    rename-model:
      FilesFileDetails: SkillFileDetails
    flavor: azure
  "@typespec/json-schema":
    emitAllModels: true
    emitAllRefs: false
    emitter-output-dir: "{output-dir}/{service-dir}/json-schema"
    file-type: json
    bundleId: azure-ai-agents-v2.json
  "@azure-tools/foundry-snippets-emitter":
    emitter-output-dir: "{project-root}/"
    namespace: "Azure.AI.Projects"
    openapi-file: "./openapi3/virtual-public-preview/microsoft-foundry-openapi3.json"
    sdk-catalog: "../../../../../foundry-api-reference-samples/config/sdk-catalog.json"
    overrides-dir: "../../../../../foundry-api-reference-samples/config/overrides"
    operation-aliases:
      - operation-id: "Agents_createAgent_Agents_createAgentFromCode"
        target: "Azure.AI.Projects.Agents.createAgent"
      - operation-id: "Agents_updateAgent_Agents_updateAgentFromCode"
        target: "Azure.AI.Projects.Agents.updateAgent"
      - operation-id: "Agents_createAgentVersion_Agents_createAgentVersionFromCode"
        target: "Azure.AI.Projects.Agents.createAgentVersion"
      - operation-id: "createSkillVersion_createSkillVersionFromFiles"
        target: "Azure.AI.Projects.Skills.createSkillVersion"
    format-output: true
imports:
  - "@azure-tools/typespec-azure-core"
  - "@azure-tools/typespec-azure-core/experimental"
  - "@azure-tools/typespec-client-generator-core"
  # Note: Imports for OpenAI types may use alternate views per tspconfig.yaml
  - "@azure-tools/openai-typespec/models/evals"
  - "@azure-tools/openai-typespec/models/fine-tuning"
  - "@azure-tools/openai-typespec/models/responses"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
  disable:
    "@azure-tools/typespec-azure-core/casing-style": "Since we have many names in the form XxxxAIXxxx"
    "@azure-tools/typespec-azure-core/no-string-discriminator": "Use an extensible union instead of a plain string"
    "@azure-tools/typespec-azure-core/bad-record-type": "We do want to use Record<unknown>, and not Record<string>. But this needs further investigation"
    "@azure-tools/typespec-azure-core/use-standard-names": "PUT operations that return 200 should start with 'replace' or 'createOrReplace'"
    "@azure-tools/typespec-azure-core/documentation-required": "Some OpenAI models do not contain docstrings."
    "@azure-tools/typespec-azure-core/no-nullable": "Some OpenAI models still contain <> | null notation."
    "@azure-tools/typespec-azure-core/no-closed-literal-union": "OpenAI incompliance"
    "@azure-tools/typespec-azure-core/no-openapi": ".external-readonly uses OpenAI."
    "@azure-tools/typespec-azure-core/no-multiple-discriminator": "OpenAI contains multiple discriminators."
    "@azure-tools/typespec-azure-core/no-unknown": "unknowns are used in OpenAI package."
    "@azure-tools/typespec-azure-core/no-query-explode": "Explode is used in OpenAI package."
    "@azure-tools/typespec-client-generator-core/property-name-conflict": "OpenAI package has conflict."
    "@azure-tools/typespec-azure-core/no-enum": "OpenAI uses enums."
