parameters:
  "service-dir":
    default: "sdk/vast"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/Vast.Data/{version-status}/{version}/vast.json"
    examples-dir: "{project-root}/examples"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.Vast"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-vast"
    namespace: "azure.mgmt.vast"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-vast"
    namespace: "com.azure.resourcemanager.vast"
    service-name: "Vast"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-vast"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-vast"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/vast"
    emitter-output-dir: "{output-dir}/{service-dir}/armvast"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armvast"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
