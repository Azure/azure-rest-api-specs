parameters:
  "service-dir":
    default: "sdk/desktopvirtualization"
emit:
  - "@azure-tools/typespec-autorest"
  - "@azure-tools/typespec-ts"
  - "@azure-tools/typespec-go"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/desktopvirtualization.json"
    examples-dir: "{project-root}/examples"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-typespec/http-client-csharp-mgmt":
    emitter-output-dir: "{output-dir}/sdk/desktopvirtualization/{namespace}"
    namespace: "Azure.ResourceManager.DesktopVirtualization"
    enable-wire-path-attribute: true
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-desktopvirtualization"
    namespace: "com.azure.resourcemanager.desktopvirtualization"
    service-name: "DesktopVirtualization"
    use-object-for-unknown: true
    generate-async-methods: true
    flavor: azure
    add-inner: RegistrationTokenMinimal,RegistrationTokenList
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-desktopvirtualization"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-desktopvirtualization"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/desktopvirtualization"
    emitter-output-dir: "{output-dir}/{service-dir}/armdesktopvirtualization"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armdesktopvirtualization"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
