parameters:
  "service-dir":
    default: "sdk/OffAzure"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/offazure-migrate.json"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-offazure"
    namespace: "azure.mgmt.offazure"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    service-dir: "sdk/migrationdiscovery"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-migrationdiscovery"
    namespace: "com.azure.resourcemanager.migrationdiscovery"
    service-name: "Migration Discovery" # human-readable service name, whitespace allowed
    flavor: azure
    rename-model:
      "BaseResource": "ProxyResource"
  "@azure-tools/typespec-ts":
    service-dir: sdk/migrate
    emitter-output-dir: "{output-dir}/{service-dir}/arm-migrationdiscovery"
    compatibility-lro: true
    flavor: "azure"
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-migrationdiscovery"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/migrationdiscovery"
    emitter-output-dir: "{output-dir}/{service-dir}/armmigrationdiscovery"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armmigrationdiscovery"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
