- tool: TypeSpecValidation
  reason: >
    Not ready to split as independent services.
  rules: [FolderStructure]
  paths:
    - Network
    - Vmss
    
- tool: TypeSpecValidation
  reason: >
    Not ready to split as independent services.
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-go.*
    - options.@azure-tools/typespec-java.*
    - options.@azure-tools/typespec-python.*
    - options.@azure-tools/typespec-ts.*
    - parameters.service-dir.default
  paths: 
    - Network/tspconfig.yaml
    - Vmss/tspconfig.yaml   

- tool: Swagger Avocado
  reason: >
    The vmssNetwork.json (2018-10-01) is required in the default tag alongside 2025-07-01 swaggers
    for backward compatibility. This is a pre-existing condition on the Network TypeSpec release branch.
  paths:
    - Network/readme.md
