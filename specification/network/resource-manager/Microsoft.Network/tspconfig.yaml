parameters:
  "service-dir":
    default: "sdk/network"
options:
  "@azure-tools/typespec-python":
    service-dir: "sdk/network"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-network"
    namespace: "azure.mgmt.network"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-network"
    service-dir: "sdk/network"
    namespace: "com.azure.resourcemanager.network"
    service-name: "Network"
    flavor: azure
    use-object-for-unknown: true
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-network"
    service-dir: "sdk/network"
    flavor: "azure"
    compatibility-lro: true
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-network"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/network"
    emitter-output-dir: "{output-dir}/{service-dir}/armnetwork"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armnetwork"
    fix-const-stuttering: false
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"