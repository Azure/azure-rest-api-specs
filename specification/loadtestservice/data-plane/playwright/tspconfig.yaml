emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
parameters:
  "service-dir":
    default: "sdk/playwright"
  "service-name":
    default: "playwright"
  "dependencies":
    default: ""
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/playwright.json"
    omit-unreachable-types: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-playwrightworkspaces"
    namespace: "azure.playwrightworkspaces"
    generate-test: true
    generate-sample: true
    package-mode: azure-dataplane
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/playwrightworkspaces"
    title: PlaywrightServiceClient
    description: Microsoft Playwright Service Client
    generate-metadata: true
    generate-test: false
    package-details:
      name: "@azure/playwrightworkspaces"
      description: "This package contains Microsoft Playwright Service client library."
      version: 1.0.0
    flavor: azure
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.Developer.PlaywrightWorkspaces"
    flavor: azure
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-developer-playwrightworkspaces"
    namespace: com.azure.developer.playwrightworkspaces
    partial-update: true
    generate-tests: false
    service-name: Microsoft Playwright Service
    flavor: azure
