    package-dir: "arm-applicationmigration" # Must match /^arm-[^\/]+$/
    package-details:
      name: "@azure/arm-applicationmigration" # Must match /^\@azure\/arm(?:-[a-z]+)+$/
    experimental-extensible-enums: true
