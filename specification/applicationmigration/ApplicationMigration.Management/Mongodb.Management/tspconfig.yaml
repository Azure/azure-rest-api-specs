    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-mongodb"
    namespace: com.azure.resourcemanager.mongodb #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
