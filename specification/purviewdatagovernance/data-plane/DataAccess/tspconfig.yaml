parameters:
  "service-dir":
    default: "sdk/purview"
  "dependencies":
    default: ""
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
  disable:
    "@azure-tools/typespec-azure-core/use-standard-operations": "Service uses custom operation definitions matching existing API surface."
    "@azure-tools/typespec-azure-core/use-standard-names": "Operation names match existing service API conventions."
    "@azure-tools/typespec-azure-core/documentation-required": "Body parameters are self-documenting from their model types."
    "@azure-tools/typespec-azure-core/bad-record-type": "Open-ended Record types used intentionally for extensible API contracts."
    "@azure-tools/typespec-azure-core/no-rpc-path-params": "Existing service API with established path patterns that use RpcOperation with path parameters."
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}"
    examples-dir: "{project-root}/examples"
    output-file: "{version-status}/{version}/DataAccessApiService.json"
    omit-unreachable-types: true
