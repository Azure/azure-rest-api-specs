parameters:
  "service-dir":
    default: "sdk/azurearcdata"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/openapi.json"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-azurearcdata"
    namespace: "azure.mgmt.azurearcdata"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-azurearcdata"
    namespace: "com.azure.resourcemanager.azurearcdata"
    service-name: "AzureArcData" # human-readable service name, whitespace allowed
    flavor: azure
    use-object-for-unknown: true
  "@azure-tools/typespec-ts":
    service-dir: sdk/azurearcdata
    emitter-output-dir: "{output-dir}/{service-dir}/arm-azurearcdata"
    flavor: "azure"
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-azurearcdata"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/azurearcdata"
    emitter-output-dir: "{output-dir}/{service-dir}/armazurearcdata"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armazurearcdata"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
    - "@azure-tools/typespec-azure-rulesets/client-sdk"
