- tool: TypeSpecValidation
  rules: [FolderStructure]
  sub-rules: [MustUseV2]
  reason: Specs added as folder structure v1, not yet converted to v2
  paths:
    - AzureArcData.Management
- tool: TypeSpecValidation
  reason: >
    TS don't have released SDKs yet, so we need to suppress validation errors for now.
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-ts.*
    - options.@azure-tools/typespec-python.*
    - parameters.service-dir.default
  paths: 
    - AzureArcData.Management/tspconfig.yaml
