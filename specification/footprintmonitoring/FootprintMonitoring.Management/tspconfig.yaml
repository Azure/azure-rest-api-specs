parameters:
  "service-dir":
    default: "sdk/footprintmonitoring"

emit:
  - "@azure-tools/typespec-autorest"

linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"

options:
  "@azure-tools/typespec-autorest":
    azure-resource-provider-folder: "resource-manager"
    emit-lro-options: "none"
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    # examples-directory: "examples"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/footprintMonitoring.json"
  "@azure-tools/typespec-python":
    package-dir: "azure-mgmt-footprintmonitoring"
    flavor: azure
    package-name: "{package-dir}"
    generate-test: true
    generate-sample: true
    examples-directory: "{project-root}/examples"
  # "@azure-tools/typespec-csharp":
  #   package-dir: "Azure.ResourceManager.FootprintMonitoring"
  #   flavor: azure
  #   namespace: "{package-dir}"
  #   service-name: "Footprint Monitoring"
  #   examples-directory: "examples"
  # "@azure-tools/typespec-java":
  #   package-dir: "azure-resourcemanager-footprintmonitoring"
  #   flavor: "azure"
  #   namespace: "com.azure.resourcemanager.footprintmonitoring"
  #   service-name: "Footprint Monitoring"
  #   examples-directory: "{project-root}/examples"
  # "@azure-tools/typespec-ts":
  #   azureSdkForJs: true
  #   isModularLibrary: true
  #   generateMetadata: true
  #   hierarchyClient: false
  #   experimentalExtensibleEnums: true
  #   enableOperationGroup: true
  #   package-dir: "arm-footprintmonitoring"
  #   emitter-output-dir: "{project-root}/{service-dir}/{package-dir}"
  #   flavor: "azure"
  #   packageDetails:
  #     name: "@azure/arm-footprintmonitoring"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/footprintmonitoring"
    package-dir: "armfootprintmonitoring"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/{package-dir}"
    examples-directory: "{project-root}/examples"
    fix-const-stuttering: true
    flavor: "azure"
    generate-examples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    remove-unreferenced-types: true
