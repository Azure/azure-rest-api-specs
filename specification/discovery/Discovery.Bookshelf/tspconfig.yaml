output-dir: "{project-root}/../"
parameters:
  "service-dir":
    default: "sdk/discovery"
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}/.."
    omit-unreachable-types: true
    output-file: "{azure-resource-provider-folder}/Microsoft.Discovery.Bookshelf/{version-status}/{version}/discovery-bookshelf.json"
    azure-resource-provider-folder: "data-plane"
    emit-lro-options: "none"
  "@azure-tools/typespec-python":
    package-dir: "azure-ai-discovery"
    package-name: "azure-ai-discovery"
    emitter-output-dir: "{output-dir}/{service-dir}/{package-dir}/_bookshelf"
    namespace: "azure.ai.discovery"
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-csharp":
    # NOTE: /Azure.AI.Discovery suffix after _bookshelf is a workaround because @azure-typespec/http-client-csharp
    # does not support package-dir. Without it, CI derives packageName from the last path segment (_bookshelf)
    # instead of Azure.AI.Discovery, causing csproj and CHANGELOG lookup failures.
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.AI.Discovery/_bookshelf/Azure.AI.Discovery"
    namespace: Azure.AI.Discovery
    package-name: Azure.AI.Discovery
    model-namespace: false
    flavor: azure
    examples-dir: "{project-dir}/examples"
    clear-output-folder: true
  "@azure-typespec/http-client-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.AI.Discovery/_bookshelf/Azure.AI.Discovery"
    namespace: Azure.AI.Discovery
    model-namespace: false
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-discovery-bookshelf"
    is-modular-library: true
    experimental-extensible-enums: true
    flavor: azure
    package-details:
      name: "@azure/ai-discovery-bookshelf"
  "@azure-tools/typespec-java":
    package-dir: "azure-ai-discovery"
    emitter-output-dir: "{output-dir}/{service-dir}/{package-dir}/_bookshelf"
    namespace: com.azure.ai.discovery
    flavor: azure
  # "@azure-tools/typespec-go":
  #   module: "github.com/Azure/azure-sdk-for-go/{service-dir}/azaidiscoverybookshelf"
  #   emitter-output-dir: "{output-dir}/{service-dir}/azaidiscoverybookshelf"
  #   generate-fakes: true
  #   inject-spans: true
  #   single-client: true
  #   slice-elements-byval: true
  #   flavor: azure
  "@azure-tools/typespec-client-generator-cli":
    additionalDirectories: []
