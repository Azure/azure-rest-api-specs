parameters:
  "service-dir":
    default: "sdk/agentdevcompute"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{emitter-output-dir}/{version-status}/{version}/agentdevcompute.json"
    examples-dir: "{project-root}/examples"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/Azure.ResourceManager.AgentDevCompute"
    flavor: azure
    clear-output-folder: true
    model-namespace: false
    namespace: "Azure.ResourceManager.AgentDevCompute"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-agentdevcompute"
    namespace: "azure.mgmt.agentdevcompute"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    service-dir: "sdk/agentdevcompute"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-agentdevcompute"
    namespace: "com.azure.resourcemanager.agentdevcompute"
    service-name: "agentdevcompute"
    flavor: azure
    use-object-for-unknown: true
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-agentdevcompute"
    experimental-extensible-enums: true
    flavor: azure
    package-details:
      name: "@azure/arm-agentdevcompute"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/agentdevcompute"
    emitter-output-dir: "{output-dir}/{service-dir}/armagentdevcompute"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armagentdevcompute"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
