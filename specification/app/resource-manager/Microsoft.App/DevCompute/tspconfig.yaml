parameters:
  "service-dir":
    default: "sdk/devcompute"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emit-lro-options: "none"
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{emitter-output-dir}/{version-status}/{version}/devcompute.json"
    examples-dir: "{project-root}/examples"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-devcompute"
    namespace: "azure.mgmt.devcompute"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    service-dir: "sdk/devcompute"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-devcompute"
    namespace: "com.azure.resourcemanager.devcompute"
    service-name: "devcompute"
    flavor: azure
    use-object-for-unknown: true
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-devcompute"
    experimental-extensible-enums: true
    flavor: azure
    package-details:
      name: "@azure/arm-devcompute"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/devcompute"
    emitter-output-dir: "{output-dir}/{service-dir}/armdevcompute"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armdevcompute"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
