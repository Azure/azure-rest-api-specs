# This file configures spell checking for StorageInventory specification
# Items in "words" were initially populated with technical terms and acronyms
# that are valid in the context of storage inventory management
# For more information, see: https://aka.ms/ci-fix#spell-check

# Spell checking is not case sensitive
# Keep word lists in alphabetical order so the file is easier to manage
version: '0.2'
import:
  - ../../cspell.yaml
words:
  - Decom          # Short for decommission/decommissioning
  - RDMA           # Remote Direct Memory Access
  - Rdma           # Remote Direct Memory Access (camelCase)
  - RSRP           # Regional Storage Resource Provider
  - rsrp           # Regional Storage Resource Provider (lowercase)
