emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/openapi.json"
    emit-common-types-schema: "never"
    omit-unreachable-types: false
  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/clouddeviceplatform
    emitter-output-dir: "{output-dir}/{service-dir}/armclouddeviceplatform"
    module: github.com/Azure/azure-sdk-for-go/{service-dir}/armclouddeviceplatform
    fix-const-stuttering: true
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-clouddeviceplatform"
    namespace: azure.mgmt.clouddeviceplatform
    generate-test: true
    generate-sample: true
    flavor: azure
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-clouddeviceplatform"
    flavor: azure
    namespace: com.azure.resourcemanager.clouddeviceplatform
    service-name: Cloud Device Platform
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
parameters:
  service-dir:
    default: sdk/clouddeviceplatform
