# Suppression continuity notes:
# - The preview tag (package-2023-07-01-preview) had one suppression: TypeSpecRequirement.
#   This suppression is carried forward because the preview swagger is still served
#   and will remain active until traffic drops to zero — clients are not forced to migrate.
# - The stable tag (package-2026-05-01) is authored in TypeSpec, so TypeSpecRequirement
#   does not apply and no suppression is needed for it.
# - No preview-era suppressions were silently dropped; the only one (TypeSpecRequirement)
#   is retained below.

- tool: TypeSpecRequirement
  path: ./preview/2023-07-01-preview/*.json
  reason: >-
    Legacy preview spec predates TypeSpec adoption. The stable/2026-05-01 version
    is authored in TypeSpec. The preview remains active until client traffic reaches
    zero — deprecation is traffic-gated, not forced.

- tool: Azure-OpenAPI-Validator
  path: ./stable/2026-05-01/professionalservice.json
  rules:
    - ParametersInPointGet
  where:
    - $.paths["/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.SaaS/professionalServices/{resourceName}"].get
  reason: >-
    The optional `$expandCustomerData` query parameter is required to gate PII (purchaser email) per the
    ARM PII guidelines (https://aka.ms/arm-pii). The default GET response excludes customer data so that
    downstream control plane components (e.g. ARG) do not cache PII. Callers must explicitly opt in via
    `$expandCustomerData=true` to retrieve the PII. Approved with the ARM reviewer.