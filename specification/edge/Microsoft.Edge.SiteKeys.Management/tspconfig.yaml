output-dir: "{project-root}/"
parameters:
  service-dir:
    default: "sdk/edge"

emit:
  - "@azure-tools/typespec-autorest"

options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/siteKeys/{version-status}/{version}/siteKeys.json"
    arm-types-dir: "{project-root}/../../common-types/resource-management"

  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-edge"
    namespace: "com.azure.resourcemanager.edge"
    service-name: "Edge"
    flavor: azure

  "@azure-tools/typespec-ts":
    experimental-extensible-enums: true
    flavor: azure
    emitter-output-dir: "{output-dir}/{service-dir}/arm-edge"
    package-details:
      name: "@azure/arm-edge"

  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/edge"
    emitter-output-dir: "{output-dir}/{service-dir}/armedge"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armedge"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
    fix-const-stuttering: true

  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-edge"
    namespace: "azure.mgmt.edge"
    generate-sample: true
    generate-test: true
    flavor: azure

  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
    namespace: "Azure.ResourceManager.Edge"
    clear-output-folder: true
    model-namespace: false
    flavor: azure

linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
