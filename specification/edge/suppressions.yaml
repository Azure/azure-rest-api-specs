- tool: TypeSpecValidation
  reason: >
    Not ready to generate SDKs from TypeSpec.
    Responsibility: Service team with SDK team collaboration.
    More info: https://aka.ms/azsdk/spec-gen-sdk-config.
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-ts.*
  paths: 
    - Microsoft.Edge.ConfigurationManager.Management/tspconfig.yaml
    - Microsoft.Edge.Configurations.Management/tspconfig.yaml
    - Microsoft.Edge.ConnectivityStatuses.Management/tspconfig.yaml
    - Microsoft.Edge.DisconnectedOperations.Management/tspconfig.yaml
    - Microsoft.Edge.Management/tspconfig.yaml
    - Microsoft.Edge.ResourceInsights.Management/tspconfig.yaml
    - Microsoft.Edge.Updates.Management/tspconfig.yaml
    - Microsoft.Edge.Winfields.Management/tspconfig.yaml
    - Microsoft.ExposureControl.Management/tspconfig.yaml
