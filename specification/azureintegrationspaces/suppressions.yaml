- tool: TypeSpecRequirement
  path: resource-manager/Microsoft.IntegrationSpaces/preview/2023-11-14-preview/**/*.json
  reason: There's a good chance we might deprovision this RP. If not, for this Preview version, TypeSpec will be added later on.

- tool: TypeSpecValidation
  reason: >
    Not ready to generate SDKs from TypeSpec.
    Responsibility: Service team with SDK team collaboration.
    More info: https://aka.ms/azsdk/spec-gen-sdk-config.
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-ts.*
  paths: [IntegrationSpaces.Management/tspconfig.yaml]
