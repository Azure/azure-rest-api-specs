emit:
  - "@azure-tools/typespec-autorest"

options:
  "@azure-tools/typespec-ts":
    flavor: azure
    experimental-extensible-enums: true
    emitter-output-dir: "{output-dir}/{service-dir}/arm-edgemarketplace"
    package-details:
      name: "@azure/arm-edgemarketplace"

  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/edgemarketplace.json"
    examples-dir: "{project-root}/examples"
    arm-types-dir: "{project-root}/../../common-types/resource-management"

  "@azure-tools/typespec-go":
    service-dir: sdk/resourcemanager/edgemarketplace #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    package-dir: armedgemarketplace #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    emitter-output-dir: "{output-dir}/{service-dir}/{package-dir}" #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    module: github.com/Azure/azure-sdk-for-go/{service-dir}/{package-dir} #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    fix-const-stuttering: true #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    generate-samples: true #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    generate-fakes: true #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    head-as-boolean: true #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    inject-spans: true #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    flavor: azure #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation

  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-edgemarketplace"
    namespace: azure.mgmt.edgemarketplace
    generate-test: true
    generate-sample: true
    flavor: azure

  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-edgemarketplace"
    flavor: azure #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    namespace: com.azure.resourcemanager.edgemarketplace #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
    service-name: Edge Marketplace #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation

  "@azure-tools/typespec-powershell":
    service-dir: "src"
    emitter-output-dir: "{output-dir}/{service-dir}/EdgeMarketplace/EdgeMarketplace.Autorest"
    clear-output-folder: true
    debug: true
    azure: true
    module-version: 0.1.0
    prefix: "Az"
    subject-prefix: "EdgeMarketplace"
    service-name: "EdgeMarketplace"
    module-name: "{prefix}.{service-name}"
    output-folder: "{output-dir}"
    exclude-tableview-properties:
      - Id
      - Type
    directive:
      - where:
          subject: Operation
        hide: true
      - where:
          parameter-name: SubscriptionId
        set:
          default:
            script: "(Get-AzContext).Subscription.Id"
      - where:
          variant: ^(Create|Update|Export)(?!.*?(Expanded|ViaJsonString|ViaJsonFilePath))
        remove: true
      - where:
          subject: MapConnection
          variant: ^(Get)(?!.*?Expanded|ViaJsonString|ViaJsonFilePath)
        remove: true
      - where:
          variant: ^CreateViaIdentity$|^CreateViaIdentityExpanded$
        remove: true
      - where:
          verb: Set
        remove: true
      - where:
          verb: New
          subject: OfferAccessToken
        set:
          command-description: "Initiates an asynchronous disk creation process for a specified marketplace image and returns immediately with a 202 Accepted status. it can poll for completion using the returned operation status URL and its result can be used to get access token using Get-AzEdgeMarketplaceOfferAccessToken."
      - where:
          verb: Get
          subject: OfferAccessToken
        set:
          command-description: "Retrieves the access token (SAS URL) for a disk that was previously requested via New-AzEdgeMarketplaceOfferAccessToken."
      - where:
          verb: Get
          subject: Offer
        set:
          command-description: "Retrieves a list of all available marketplace offers for a given device."
      - where:
          subject: Publisher
        remove: true
      - where:
          subject: Offer
          variant: ^List1$
        remove: true
      - where:
          subject: OfferAccessToken
          parameter-name: EgeMarketPlaceResourceId
        set:
          parameter-name: EdgeMarketplaceResourceId
          parameter-description: "The ARM resource ID of the Edge Marketplace resource associated with the access token request."
      - where:
          subject: OfferAccessToken
          parameter-name: EdgeMarketPlaceRegion
        set:
          parameter-name: EdgeMarketplaceRegion
      - where:
          subject: OfferAccessToken
          parameter-name: MarketPlaceSku
        set:
          parameter-name: MarketplaceSku
      - where:
          subject: OfferAccessToken
          parameter-name: MarketPlaceSkuVersion
        set:
          parameter-name: MarketplaceSkuVersion
      - where:
          subject: OfferAccessToken
          parameter-name: RequestId
        set:
          parameter-description: "A unique identifier for a previously initiated access token operation, used to look up and retrieve the corresponding disk access token status."

  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.EdgeMarketplace"
    emitter-output-dir: "{output-dir}/sdk/edgemarketplace/{namespace}"

linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"

parameters:
  service-dir:
    default: sdk/edgemarketplace #!!!IMPORTANT!!! To ensure the emitter correctly produces SDK, this configuration is added by Azure SDK Team. Some configurations use placeholder values. For modifications, please refer to https://aka.ms/azsdk/specs/typespec-validation#sdktspconfigvalidation
