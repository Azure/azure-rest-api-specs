openapi: 3.0.0
info:
  title: Qumulo.Storage
  version: 2024-02-01-preview
tags:
  - name: Operations
  - name: FileSystemResources
paths:
  /providers/Qumulo.Storage/operations:
    get:
      tags:
        - Operations
      operationId: Operations_list
      description: List the operations for the provider
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOperation'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
  /subscriptions/{subscriptionId}/providers/Qumulo.Storage/fileSystems:
    get:
      tags:
        - FileSystemResources
      operationId: FileSystems_ListBySubscription
      description: List FileSystemResource resources by subscription ID
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.SubscriptionIdParameter'
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSystemResourceListResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Qumulo.Storage/fileSystems:
    get:
      tags:
        - FileSystemResources
      operationId: FileSystems_ListByResourceGroup
      description: List FileSystemResource resources by resource group
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.ResourceGroupParameter'
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSystemResourceListResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Qumulo.Storage/fileSystems/{fileSystemName}:
    get:
      tags:
        - FileSystemResources
      operationId: FileSystems_Get
      description: Get a FileSystemResource
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.ResourceGroupParameter'
        - name: fileSystemName
          in: path
          required: true
          description: Name of the File System resource
          schema:
            type: string
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiftrBase.Storage.FileSystemResource'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
    put:
      tags:
        - FileSystemResources
      operationId: FileSystems_CreateOrUpdate
      description: Create a FileSystemResource
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.ResourceGroupParameter'
        - name: fileSystemName
          in: path
          required: true
          description: Name of the File System resource
          schema:
            type: string
      responses:
        '200':
          description: Resource 'FileSystemResource' update operation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiftrBase.Storage.FileSystemResource'
        '201':
          description: Resource 'FileSystemResource' create operation succeeded
          headers:
            Retry-After:
              required: false
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
              schema:
                type: integer
                format: int32
            Azure-AsyncOperation:
              required: false
              description: A link to the status monitor
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiftrBase.Storage.FileSystemResource'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
      requestBody:
        description: Resource create parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiftrBase.Storage.FileSystemResource'
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      x-ms-long-running-operation: true
    patch:
      tags:
        - FileSystemResources
      operationId: FileSystems_Update
      description: Update a FileSystemResource
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.ResourceGroupParameter'
        - name: fileSystemName
          in: path
          required: true
          description: Name of the File System resource
          schema:
            type: string
      responses:
        '200':
          description: Azure operation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiftrBase.Storage.FileSystemResource'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
      requestBody:
        description: The resource properties to be updated.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiftrBase.Storage.FileSystemResourceUpdate'
    delete:
      tags:
        - FileSystemResources
      operationId: FileSystems_Delete
      description: Delete a FileSystemResource
      parameters:
        - $ref: '#/components/parameters/Azure.ResourceManager.ApiVersionParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.SubscriptionIdParameter'
        - $ref: '#/components/parameters/Azure.ResourceManager.ResourceGroupParameter'
        - name: fileSystemName
          in: path
          required: true
          description: Name of the File System resource
          schema:
            type: string
      responses:
        '200':
          description: Resource deleted successfully.
        '202':
          description: Resource deletion accepted.
          headers:
            Retry-After:
              required: false
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
              schema:
                type: integer
                format: int32
            Azure-AsyncOperation:
              required: false
              description: A link to the status monitor
              schema:
                type: string
        '204':
          description: Resource does not exist.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Azure.ResourceManager.ErrorResponse'
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-long-running-operation: true
security:
  - azure_auth:
      - user_impersonation
components:
  parameters:
    Azure.ResourceManager.ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: The API version to use for this operation.
      schema:
        type: string
        minLength: 1
    Azure.ResourceManager.ResourceGroupParameter:
      name: resourceGroupName
      in: path
      required: true
      description: The name of the resource group. The name is case insensitive.
      schema:
        type: string
        pattern: ^[-\w\._\(\)]+$
        minLength: 1
        maxLength: 90
    Azure.ResourceManager.SubscriptionIdParameter:
      name: subscriptionId
      in: path
      required: true
      description: The ID of the target subscription.
      schema:
        type: string
        minLength: 1
  schemas:
    Azure.ResourceManager.ErrorResponse:
      type: object
      properties:
        value:
          error:
            value:
              allOf:
                - $ref: '#/components/schemas/Azure.ResourceManager.Foundations.ErrorDetail'
              description: The error object.
            kind: code
        kind: code
      description: Common error response for all Azure Resource Manager APIs to return error details for failed operations.
    Azure.ResourceManager.Foundations.ActionType:
      type: string
      enum:
        - Internal
      description: Enum. Indicates the action type. "Internal" refers to actions that are for internal only APIs.
    Azure.ResourceManager.Foundations.ArmResource:
      type: object
      required:
        - id
        - type
      properties:
        value:
          id:
            value:
              type: string
              description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}
              readOnly: true
            kind: code
          type:
            value:
              type: string
              description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts"
              readOnly: true
            kind: code
          systemData:
            value:
              allOf:
                - $ref: '#/components/schemas/Azure.ResourceManager.Foundations.SystemData'
              description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
              readOnly: true
            kind: code
        kind: code
      allOf:
        - value:
            $ref: '#/components/schemas/Azure.ResourceManager.Foundations.ArmResourceBase'
          kind: code
      description: Common properties for all Azure Resource Manager resources.
    Azure.ResourceManager.Foundations.ArmResourceBase:
      type: object
      properties:
        kind: none
      description: Base class used for type definitions
    Azure.ResourceManager.Foundations.ErrorAdditionalInfo:
      type: object
      properties:
        value:
          type:
            value:
              type: string
              description: The additional info type.
              readOnly: true
            kind: code
          info:
            value:
              type: object
              properties:
                kind: none
              description: The additional info.
              readOnly: true
            kind: code
        kind: code
      description: The resource management error additional info.
    Azure.ResourceManager.Foundations.ErrorDetail:
      type: object
      properties:
        value:
          code:
            value:
              type: string
              description: The error code.
              readOnly: true
            kind: code
          message:
            value:
              type: string
              description: The error message.
              readOnly: true
            kind: code
          target:
            value:
              type: string
              description: The error target.
              readOnly: true
            kind: code
          details:
            value:
              type: array
              items:
                value:
                  $ref: '#/components/schemas/Azure.ResourceManager.Foundations.ErrorDetail'
                kind: code
              description: The error details.
              x-ms-identifiers:
                - message
                - target
              readOnly: true
            kind: code
          additionalInfo:
            value:
              type: array
              items:
                value:
                  $ref: '#/components/schemas/Azure.ResourceManager.Foundations.ErrorAdditionalInfo'
                kind: code
              description: The error additional info.
              x-ms-identifiers:
                - message
                - target
              readOnly: true
            kind: code
        kind: code
      description: The error detail.
    Azure.ResourceManager.Foundations.ExtensionResourceBase:
      type: object
      properties:
        kind: none
      allOf:
        - value:
            $ref: '#/components/schemas/Azure.ResourceManager.Foundations.ArmResource'
          kind: code
      description: The base extension resource.
    Azure.ResourceManager.Foundations.ManagedIdentityProperties:
      type: object
      required:
        - type
      properties:
        value:
          tenantId:
            value:
              type: string
              description: The Active Directory tenant id of the principal.
              readOnly: true
            kind: code
          principalId:
            value:
              type: string
              description: The active directory identifier of this principal.
              readOnly: true
            kind: code
          type:
            value:
              allOf:
                - $ref: '#/components/schemas/Azure.ResourceManager.Foundations.ManagedIdentityType'
              description: The type of managed identity assigned to this resource.
            kind: code
          userAssignedIdentities:
            value:
              type: object
              properties:
                kind: none
              additionalProperties:
                value:
                  $ref: '#/components/schemas/Azure.ResourceManager.Foundations.UserAssignedIdentity'
                kind: code
              description: The identities assigned to this resource by the user.
            kind: code
        kind: code
      description: The properties of the managed service identities assigned to this resource.
    Azure.ResourceManager.Foundations.ManagedIdentityType:
      type: string
      enum:
