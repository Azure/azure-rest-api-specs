# Remove suppressions as specs are fixed
- tool: TypeSpecValidation
  rules: [Compile]
  sub-rules: [ExtraSwagger]
  reason: Extra swaggers left behind when versions were removed from *.tsp files
  paths:
    - preview/2022-06-27-preview/Qumulo.Storage.json
    - preview/2022-10-12-preview/Qumulo.Storage.json
    - preview/2023-08-29-preview/Qumulo.Storage.json
    - preview/2024-01-30-preview/Qumulo.Storage.json
    - preview/2024-02-01-preview/Qumulo.Storage.json
    - stable/2022-10-12/Qumulo.Storage.json
    - stable/2024-06-19/Qumulo.Storage.json

- tool: TypeSpecRequirement
  path: ./preview/2022-06-27-preview/*.json
  reason: Brownfield service not ready to migrate
- tool: TypeSpecRequirement
  path: ./preview/2022-10-12-preview/*.json
  reason: Brownfield service not ready to migrate
- tool: TypeSpecRequirement
  path: ./stable/2022-10-12/*.json
  reason: Brownfield service not ready to migrate
