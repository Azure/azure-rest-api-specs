parameters:
  "service-dir":
    default: "sdk/tables"
  "dependencies":
    default: ""
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
    - "@azure-tools/typespec-azure-rulesets/client-sdk"
options:
  "@azure-tools/typespec-autorest":
    azure-resource-provider-folder: "data-plane"
    emitter-output-dir: "{project-root}"
    emit-lro-options: "none"
    examples-dir: "{project-root}/examples"
    output-file: "{version-status}/{version}/table.json"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-data-tables"
    package-name: "azure-data-tables"
    package-mode: dataplane
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/data-tables"
    generate-metadata: false
    generate-test: false
    include-headers-in-response: true
    experimental-extensible-enums: true
    package-details:
      name: "@azure/data-tables"
      description: "Azure Tables Service"
    flavor: azure
  # Uncomment this line and add "@azure-tools/typespec-java" to your package.json to generate Java code
  # "@azure-tools/typespec-java": true
  # Uncomment this line and add "@azure-tools/typespec-csharp" to your package.json to generate C# code
  # "@azure-tools/typespec-csharp": true
