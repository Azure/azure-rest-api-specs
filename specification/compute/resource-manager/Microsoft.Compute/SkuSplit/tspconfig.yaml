parameters:
  "service-dir":
    default: "sdk/computeskusplit"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}"
    output-file: "{version-status}/{version}/SkuSplitRP.json"
    examples-dir: "{project-root}/examples"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.Compute.SkuSplit"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    namespace: "azure.mgmt.computeskusplit"
    generate-test: true
    generate-sample: true
    flavor: "azure"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-computeskusplit"
  "@azure-tools/typespec-java":
    service-dir: "sdk/compute"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-compute-skusplit"
    namespace: "com.azure.resourcemanager.compute.skusplit"
    service-name: "Compute SkuSplit"
    flavor: azure
  "@azure-tools/typespec-ts":
    service-dir: "sdk/compute"
    emitter-output-dir: "{output-dir}/{service-dir}/arm-computeskusplit"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-computeskusplit"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/compute"
    emitter-output-dir: "{output-dir}/{service-dir}/armskusplit"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armskusplit"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
