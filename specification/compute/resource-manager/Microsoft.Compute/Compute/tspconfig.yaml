parameters:
  "service-dir":
    default: "sdk/compute"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{version-status}/{version}/ComputeRP.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/compute"
    emitter-output-dir: "{output-dir}/{service-dir}/armcompute"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armcompute"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-compute"
    namespace: "azure.mgmt.compute"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-compute"
    flavor: azure
    experimental-extensible-enums: true
    compatibility-lro: true
    package-details:
      name: "@azure/arm-compute"
  "@azure-tools/typespec-java":
    service-dir: "sdk/compute"
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-compute"
    namespace: "com.azure.resourcemanager.compute"
    service-name: "Compute"
    flavor: azure
    premium: true
    generate-tests: false
    client-side-validations: true
    enable-sync-stack: false
    use-object-for-unknown: true
    rename-model:
      UserAssignedIdentitiesValue: VirtualMachineIdentityUserAssignedIdentities
      VirtualMachineScaleSetIdentityUserAssignedIdentitiesValue: VirtualMachineScaleSetIdentityUserAssignedIdentities
    preserve-model: AvailabilitySetSkuTypes
    remove-inner: StorageProfile

linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
  disable:
    "@azure-tools/typespec-azure-core/casing-style": "https://github.com/Azure/typespec-azure/issues/1845"
    "@azure-tools/typespec-azure-resource-manager/arm-resource-operation": "https://github.com/Azure/typespec-azure/issues/2081"
    "@azure-tools/typespec-azure-resource-manager/lro-location-header": "https://github.com/Azure/typespec-azure/issues/1785"
    "@azure-tools/typespec-azure-resource-manager/no-response-body": "https://github.com/Azure/typespec-azure/issues/1785"
