parameters:
  "service-dir":
    default: "sdk/anyscale"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}"
    azure-resource-provider-folder: "resource-manager"
    output-file: "{version-status}/{version}/anyscale.json"
    arm-types-dir: "{project-root}/../../../../common-types/resource-management"
  "@azure-typespec/http-client-csharp-mgmt":
    namespace: "Azure.ResourceManager.Anyscale"
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-mgmt-anyscale"
    namespace: "azure.mgmt.anyscale"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-resourcemanager-anyscale"
    namespace: "com.azure.resourcemanager.anyscale"
    service-name: "Anyscale"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/arm-anyscale"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-anyscale"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/anyscale"
    emitter-output-dir: "{output-dir}/{service-dir}/armanyscale"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/armanyscale"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
