parameters:
  "service-dir":
    default: "sdk/portalservices"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    azure-resource-provider-folder: "resource-manager"
    emit-common-types-schema: "never"
    # `arm-resource-flattening` is only used for back-compat for specs existed on July 2024. All new service spec should NOT use this flag
    arm-resource-flattening: true
    emitter-output-dir: "{project-root}/.."
    omit-unreachable-types: true
    output-file: "{azure-resource-provider-folder}/{service-name}/copilots/{version-status}/{version}/copilots.json"
    use-read-only-status-schema: true
  "@azure-tools/typespec-csharp":
    flavor: azure
    package-dir: "Azure.ResourceManager.PortalServicesCopilots"
    clear-output-folder: true
    model-namespace: true
    namespace: "Azure.ResourceManager.PortalServicesCopilots"
  "@azure-tools/typespec-python":
    package-dir: "azure-mgmt-portalservicescopilots"
    namespace: "azure.mgmt.portalservicescopilots"
    generate-test: true
    generate-sample: true
    flavor: "azure"
  "@azure-tools/typespec-java":
    package-dir: "azure-resourcemanager-portalservicescopilots"
    namespace: "com.azure.resourcemanager.portalservicescopilots"
    service-name: "Portal Services Copilots"
    flavor: azure
  "@azure-tools/typespec-ts":
    package-dir: "arm-portalservicescopilots"
    flavor: azure
    experimental-extensible-enums: true
    package-details:
      name: "@azure/arm-portalservicescopilots"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/portalservicescopilots"
    package-dir: "armportalservicescopilots"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/{package-dir}"
    emitter-output-dir: "{output-dir}/{service-dir}/armportalservicescopilots"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
