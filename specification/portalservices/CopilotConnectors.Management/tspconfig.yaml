emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/copilotConnectors/{version-status}/{version}/copilotConnectors.json"
    omit-unreachable-types: true
    examples-dir: "{project-root}/examples"
  "@azure-tools/typespec-csharp":
    flavor: azure
    package-dir: "Azure.ResourceManager.CopilotConnectors"
    clear-output-folder: true
    model-namespace: true
    namespace: "{package-dir}"
  "@azure-tools/typespec-python":
    package-dir: "azure-mgmt-copilotconnectors"
    namespace: "azure.mgmt.copilotconnectors"
    flavor: "azure"
    generate-test: true
    generate-sample: true
  "@azure-tools/typespec-java":
    package-dir: "azure-resourcemanager-copilotconnectors"
    namespace: "com.azure.resourcemanager.copilotconnectors"
    service-name: "Copilot Connectors"
    flavor: "azure"
  "@azure-tools/typespec-ts":
    is-modular-library: true
    experimental-extensible-enums: true
    generate-sample: true
    package-dir: "arm-copilotconnectors"
    flavor: "azure"
    package-details:
      name: "@azure/arm-copilotconnectors"
  "@azure-tools/typespec-go":
    service-dir: "sdk/resourcemanager/copilotconnectors"
    package-dir: "armcopilotconnectors"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/{package-dir}"
    fix-const-stuttering: true
    flavor: "azure"
    generate-samples: true
    generate-fakes: true
    head-as-boolean: true
    inject-spans: true
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
