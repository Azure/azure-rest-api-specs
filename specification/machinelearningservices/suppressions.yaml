- tool: TypeSpecValidation
  reason: >
    TypeSpec Config Incomplete - Missing required emitter options in tspconfig.yaml.
    Responsibility: Spec owner would update missing configurations.
    More info: https://aka.ms/azsdk/spec-gen-sdk-config.
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-java.*
    - options.@azure-tools/typespec-ts.*
  paths:
    - AzureAI.Assets/tspconfig.yaml
    - data-plane/DatasetDataplane/tspconfig.yaml
    - data-plane/RegistryDiscovery/tspconfig.yaml
    - data-plane/RunHistory/tspconfig.yaml
    - data-plane/WorkspaceDataplane/tspconfig.yaml
    - data-plane/ModelDataplane/tspconfig.yaml
- tool: TypeSpecValidation
  reason: Python SDK for MachineLearningServices.Management intentionally targets azure-ai-ml package with custom namespace and no test/sample generation
  rules: [SdkTspConfigValidation]
  sub-rules:
    - options.@azure-tools/typespec-python.emitter-output-dir
    - options.@azure-tools/typespec-python.namespace
    - options.@azure-tools/typespec-python.generate-sample
    - options.@azure-tools/typespec-python.generate-test
  paths:
    - MachineLearningServices.Management/tspconfig.yaml
- tool: TypeSpecValidation
  rules: [FolderStructure]
  sub-rules: [MustUseV2]
  reason: >
    Brownfield horizontal conversion of frozen preview API versions (no version revving,
    no API changes). New folders match the layout of the existing v1 MachineLearningServices.Management
    and AzureAI.Assets folders in this service. Per aka.ms/convert-to-typespec.
  paths:
    - MachineLearningServices.V2022_02_01_Preview.Management
    - MachineLearningServices.V2023_02_01_Preview.Management
    - MFE.Dataplane.V2020_09_01_DataplanePreview.Management
