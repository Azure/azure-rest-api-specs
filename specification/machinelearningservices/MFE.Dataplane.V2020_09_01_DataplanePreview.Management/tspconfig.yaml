emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/mfe.json"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
  disable:
    "@azure-tools/typespec-azure-core/casing-style": "Brownfield horizontal conversion of frozen preview API 2020-09-01-dataplanepreview (MFE); names match published swagger and cannot change."
    "@azure-tools/typespec-azure-resource-manager/arm-resource-duplicate-property": "Brownfield horizontal conversion of frozen preview API 2020-09-01-dataplanepreview (MFE); structure preserved to match published swagger."
    "@azure-tools/typespec-azure-resource-manager/missing-operations-endpoint": "Brownfield horizontal conversion of frozen preview API 2020-09-01-dataplanepreview (MFE); operations endpoint matches published swagger."
    "@azure-tools/typespec-azure-resource-manager/missing-x-ms-identifiers": "Brownfield horizontal conversion of frozen preview API 2020-09-01-dataplanepreview (MFE); identifiers match published swagger."
