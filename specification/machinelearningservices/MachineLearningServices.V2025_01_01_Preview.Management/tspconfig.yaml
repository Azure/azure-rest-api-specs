emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    omit-unreachable-types: true
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "resource-manager"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/openapi.json"
    emit-lro-options: "all"
    examples-dir: "{project-root}/examples"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/resource-manager"
  disable:
    "@azure-tools/typespec-azure-core/casing-style": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; names match published swagger and cannot change."
    "@azure-tools/typespec-azure-core/no-legacy-usage": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; legacy ARM patterns retained to match published swagger."
    "@azure-tools/typespec-azure-core/no-unknown": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; unknown property types preserved from published swagger."
    "@azure-tools/typespec-azure-resource-manager/arm-resource-duplicate-property": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; structure preserved to match published swagger."
    "@azure-tools/typespec-azure-resource-manager/arm-resource-patch": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; PATCH shape preserved to match published swagger."
    "@azure-tools/typespec-azure-resource-manager/arm-resource-provisioning-state": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; provisioning-state shape preserved to match published swagger."
    "@azure-tools/typespec-azure-resource-manager/no-empty-model": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; empty object types preserved to match published swagger."
    "@azure-tools/typespec-azure-resource-manager/patch-envelope": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; PATCH envelope preserved to match published swagger."
    "@azure-tools/typespec-azure-resource-manager/secret-prop": "Brownfield horizontal conversion of frozen preview API 2025-01-01-preview; property shapes preserved to match published swagger."
