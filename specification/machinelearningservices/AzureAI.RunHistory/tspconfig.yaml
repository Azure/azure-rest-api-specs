parameters:
  "service-dir":
    default: "sdk/ml"
emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    emitter-output-dir: "{project-root}/.."
    azure-resource-provider-folder: "data-plane"
    emit-lro-options: "none"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/run-history.json"
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-ai-ml/azure/ai/ml/_restclient"
    namespace: "runhistory"
    flavor: azure
    generate-test: false
    generate-sample: false
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
